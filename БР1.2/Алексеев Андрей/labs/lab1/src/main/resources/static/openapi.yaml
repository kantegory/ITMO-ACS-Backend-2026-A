openapi: 3.0.3
info:
  title: API сервиса поиска работы
  version: 1.1.0
  description: >
    REST API сервиса поиска работы, синхронизированное с актуальной
    ER-моделью из hw1. Во внешнем API используется единый идентификатор
    `id` формата UUID; целевой вариант генерации в backend - UUID v7.
  license:
    name: Proprietary
servers:
  - url: http://localhost:8080/api/v1
    description: Локальный сервер

tags:
  - name: Auth
    description: Регистрация и аутентификация.
  - name: Users
    description: Профиль текущего пользователя.
  - name: Roles
    description: Управление ролями и их назначением пользователям.
  - name: Companies
    description: Работа с карточками компаний.
  - name: EmployerProfiles
    description: Профили работодателей.
  - name: Dictionaries
    description: Справочники и служебные каталоги.
  - name: Resumes
    description: Резюме соискателей.
  - name: Vacancies
    description: Публичный поиск и управление вакансиями.
  - name: VacancyAssignments
    description: HR-назначения по вакансиям.
  - name: Applications
    description: Отклики на вакансии.
  - name: Favorites
    description: Избранные вакансии пользователя.
  - name: VacancyViews
    description: История просмотров вакансий.

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me:
    get:
      tags: [Users]
      summary: Профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Users]
      summary: Обновление текущего пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Пользователь обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/{user_id}/roles:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Roles]
      summary: Назначение роли пользователю
      description: Доступно только пользователям с ролью `ADMIN`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignRequest'
      responses:
        '200':
          description: Роль назначена пользователю
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /roles:
    get:
      tags: [Roles]
      summary: Список ролей
      description: Доступно только пользователям с ролью `ADMIN`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список ролей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleItemsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Roles]
      summary: Создание роли
      description: Доступно только пользователям с ролью `ADMIN`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
      responses:
        '201':
          description: Роль создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /companies:
    post:
      tags: [Companies]
      summary: Создание компании
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreateRequest'
      responses:
        '201':
          description: Компания создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /companies/{company_id}:
    parameters:
      - $ref: '#/components/parameters/CompanyId'
    get:
      tags: [Companies]
      summary: Получение компании
      security: []
      responses:
        '200':
          description: Данные компании
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Companies]
      summary: Обновление компании
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdateRequest'
      responses:
        '200':
          description: Компания обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /employer-profiles:
    post:
      tags: [EmployerProfiles]
      summary: Создание профиля работодателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileCreateRequest'
      responses:
        '201':
          description: Профиль работодателя создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /employer-profiles/me:
    get:
      tags: [EmployerProfiles]
      summary: Профиль текущего работодателя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий профиль работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [EmployerProfiles]
      summary: Обновление текущего профиля работодателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileUpdateRequest'
      responses:
        '200':
          description: Профиль работодателя обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /industries:
    get:
      tags: [Dictionaries]
      summary: Список отраслей
      security: []
      responses:
        '200':
          description: Список активных отраслей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryItemsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Dictionaries]
      summary: Создание отрасли
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictionaryCreateRequest'
      responses:
        '201':
          description: Отрасль создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /industries/{industry_id}:
    parameters:
      - $ref: '#/components/parameters/IndustryId'
    patch:
      tags: [Dictionaries]
      summary: Обновление отрасли
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictionaryUpdateRequest'
      responses:
        '200':
          description: Отрасль обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /experience-levels:
    get:
      tags: [Dictionaries]
      summary: Список уровней опыта
      security: []
      responses:
        '200':
          description: Список активных уровней опыта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryItemsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Dictionaries]
      summary: Создание уровня опыта
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictionaryCreateRequest'
      responses:
        '201':
          description: Уровень опыта создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /experience-levels/{experience_level_id}:
    parameters:
      - $ref: '#/components/parameters/ExperienceLevelId'
    patch:
      tags: [Dictionaries]
      summary: Обновление уровня опыта
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictionaryUpdateRequest'
      responses:
        '200':
          description: Уровень опыта обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /skills:
    get:
      tags: [Dictionaries]
      summary: Список навыков
      security: []
      responses:
        '200':
          description: Список активных навыков
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillItemsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Dictionaries]
      summary: Создание навыка
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Навык создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /skills/{skill_id}:
    parameters:
      - $ref: '#/components/parameters/SkillId'
    patch:
      tags: [Dictionaries]
      summary: Обновление навыка
      description: Доступно только пользователям с ролью `ADMIN` или `DICTIONARY_EDITOR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
      responses:
        '200':
          description: Навык обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /resumes:
    get:
      tags: [Resumes]
      summary: Список резюме текущего соискателя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/ResumeSort'
      responses:
        '200':
          description: Список резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumePageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Resumes]
      summary: Создание резюме
      description: >
        Вложенные массивы `skill_ids`, `educations` и `work_experiences`
        сохраняются внутри того же агрегата `resume`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeCreateRequest'
      responses:
        '201':
          description: Резюме создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /resumes/{resume_id}:
    parameters:
      - $ref: '#/components/parameters/ResumeId'
    get:
      tags: [Resumes]
      summary: Получение резюме
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Resumes]
      summary: Обновление резюме
      description: >
        Если `skill_ids`, `educations` или `work_experiences` переданы, они
        трактуются как новое полное состояние соответствующей коллекции.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeUpdateRequest'
      responses:
        '200':
          description: Резюме обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Resumes]
      summary: Удаление резюме
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Резюме удалено
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies:
    get:
      tags: [Vacancies]
      summary: Публичный поиск вакансий
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/VacancySort'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SalaryFromQuery'
        - $ref: '#/components/parameters/SalaryToQuery'
      responses:
        '200':
          description: Список опубликованных вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Vacancies]
      summary: Создание вакансии
      description: >
        Вакансия создается от имени компании. После создания текущему работодателю
        автоматически добавляется `PRIMARY`-назначение в `vacancy_assignment`, а его
        `id` записывается в `vacancy_assignment_id` вакансии.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyCreateRequest'
      responses:
        '201':
          description: Вакансия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/my:
    get:
      tags: [Vacancies]
      summary: Вакансии, назначенные текущему работодателю
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/VacancySort'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SalaryFromQuery'
        - $ref: '#/components/parameters/SalaryToQuery'
      responses:
        '200':
          description: Список вакансий работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /vacancies/{vacancy_id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    get:
      tags: [Vacancies]
      summary: Детали вакансии
      security: []
      responses:
        '200':
          description: Карточка вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Vacancies]
      summary: Обновление вакансии
      description: >
        Если `skill_ids`, `requirements`, `responsibilities` или `benefits`
        переданы, они трактуются как новое полное состояние соответствующей коллекции.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyUpdateRequest'
      responses:
        '200':
          description: Вакансия обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Vacancies]
      summary: Удаление вакансии
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Вакансия удалена
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/{vacancy_id}/assignments:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    get:
      tags: [VacancyAssignments]
