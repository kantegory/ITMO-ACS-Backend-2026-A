components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CompanyId:
      name: company_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResumeId:
      name: resume_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VacancyId:
      name: vacancy_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: application_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IndustryId:
      name: industry_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExperienceLevelId:
      name: experience_level_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SkillId:
      name: skill_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ResumeSort:
      name: sort
      in: query
      description: >
        Мультисортировка для резюме в формате `sort[field]=asc|desc`.
        Пример: `sort[updated_at]=desc&sort[title]=asc`.
        Допустимые поля: `created_at`, `updated_at`, `title`,
        `salary_expectation`, `desired_position`, `city`, `status`.
        Приоритет сортировки задается порядком правил в query string.
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
          enum: [asc, desc]
      example:
        updated_at: desc
        title: asc
    VacancySort:
      name: sort
      in: query
      description: >
        Мультисортировка для вакансий в формате `sort[field]=asc|desc`.
        Пример: `sort[created_at]=desc&sort[salary_from]=desc`.
        Допустимые поля: `relevance`, `created_at`, `updated_at`,
        `salary_from`, `salary_to`, `title`, `company`, `city`, `status`.
        Приоритет сортировки задается порядком правил в query string.
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
          enum: [asc, desc]
      example:
        created_at: desc
        salary_from: desc
    Search:
      name: search
      in: query
      description: >
        Унифицированный query-map фильтров в формате `Map<String, List<String>>`.
        Рекомендуемая сериализация:
        `search[title]=Java&search[skills]=spring-boot&search[skills]=kotlin&search[work_formats]=REMOTE`.
        Значения внутри одного ключа интерпретируются как `OR/IN`, а разные ключи
        комбинируются между собой как `AND`.
        Допустимые ключи: `title`, `description`, `company`, `city`,
        `industries`, `experience_levels`, `skills`,
        `employment_types`, `work_formats`, `statuses`,
        `requirement_text`, `responsibility_text`, `benefit_text`.
        Для `industries`, `experience_levels` и `skills` используются строковые
        tech-name значения из полей `code`, а не UUID.
        Только `salary_from` и `salary_to` передаются отдельно как числовые
        query-параметры.
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: array
          items:
            type: string
      example:
        title: [Java Backend]
        skills: [spring-boot, kotlin]
        industries: [fintech]
        work_formats: [REMOTE, HYBRID]
        statuses: [PUBLISHED]
    SalaryFromQuery:
      name: salary_from
      in: query
      schema:
        type: number
        format: double
        minimum: 0
    SalaryToQuery:
      name: salary_to
      in: query
      schema:
        type: number
        format: double
        minimum: 0

  responses:
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Пользователь не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Доступ запрещен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Конфликт бизнес-правил
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [role, first_name, last_name, email, password, phone]
      properties:
        role:
          type: string
          description: >
            Стартовая прикладная роль, которая будет привязана через `user_role`.
            Допустимые значения: APPLICANT, EMPLOYER.
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        middle_name:
          type: string
          maxLength: 100
          nullable: true
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
        phone:
          type: string
          maxLength: 32

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255

    LoginResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'

    RoleResponse:
