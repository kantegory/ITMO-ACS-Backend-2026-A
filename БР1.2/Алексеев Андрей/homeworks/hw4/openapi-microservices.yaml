components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ServiceToken:
      type: apiKey
      in: header
      name: X-Service-Token

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CompanyId:
      name: companyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VacancyId:
      name: vacancyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ResumeId:
      name: resumeId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IndustryId:
      name: industryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExperienceLevelId:
      name: experienceLevelId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SkillId:
      name: skillId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example:
            code: VALIDATION
            message: Invalid request parameters
            details: [field salary_from must be greater than or equal to 0]
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: UNAUTHORIZED, message: Authentication required }
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: FORBIDDEN, message: Access denied }
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: NOT_FOUND, message: Resource not found }
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: CONFLICT, message: Resource already exists }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: INTERNAL, message: Unexpected error }

  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, INTERNAL]
        message: { type: string }
        details:
          type: array
          items: { type: string }

    PageMeta:
      type: object
      required: [page, limit, total]
      properties:
        page: { type: integer, example: 0 }
        limit: { type: integer, example: 20 }
        total: { type: integer, format: int64, example: 135 }

    SortDirection:
      type: string
      enum: [asc, desc]

    UserRole:
      type: string
      enum: [APPLICANT, EMPLOYER, ADMIN, DICTIONARY_EDITOR]
    VacancyStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED, DELETED]
    AssignmentRole:
      type: string
      enum: [PRIMARY, RECRUITER, VIEWER]
    ApplicationStatus:
      type: string
      enum: [CREATED, VIEWED, INVITED, REJECTED, ACCEPTED, WITHDRAWN]
    NotificationType:
      type: string
      enum: [NEW_APPLICATION, APPLICATION_VIEWED, APPLICATION_STATUS_CHANGED, INTERVIEW_INVITATION, VACANCY_ASSIGNED]

    RegisterRequest:
      type: object
      required: [email, password, fullName, role]
      properties:
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        password: { type: string, minLength: 8 }
        fullName: { type: string, minLength: 1 }
        role:
          type: string
          enum: [APPLICANT, EMPLOYER]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    AuthResponse:
      type: object
      required: [accessToken, tokenType, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string, nullable: true }
        tokenType: { type: string, example: Bearer }
        user: { $ref: '#/components/schemas/UserResponse' }

    UserResponse:
      type: object
      required: [id, email, fullName, roles, active]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        fullName: { type: string }
        roles:
          type: array
          items: { $ref: '#/components/schemas/UserRole' }
