openapi: 3.0.3
info:
  title: Job Search Microservices API
  version: 2.0.0
  description: |
    Полная спецификация публичных и внутренних API для целевой микросервисной архитектуры
    сервиса поиска работы. Архитектура состоит из 10 микросервисов: api-gateway,
    auth-service, user-service, company-service, vacancy-service, search-service,
    resume-service, application-service, interaction-service и notification-service.

    Публичные endpoint'ы вызываются клиентами через api-gateway. Внутренние endpoint'ы
    используются только для синхронного service-to-service взаимодействия. Асинхронная
    интеграция между сервисами выполняется через Kafka events.
servers:
  - url: http://localhost:8080/api/v1
    description: Public API through api-gateway
  - url: http://auth-service:8080/internal
    description: auth-service internal network
  - url: http://user-service:8080/internal
    description: user-service internal network
  - url: http://company-service:8080/internal
    description: company-service internal network
  - url: http://vacancy-service:8080/internal
    description: vacancy-service internal network
  - url: http://resume-service:8080/internal
    description: resume-service internal network
  - url: http://search-service:8080/internal
    description: search-service internal network
  - url: http://notification-service:8080/internal
    description: notification-service internal network

tags:
  - name: Auth Service
    description: Регистрация, логин, обновление токена.
  - name: User Service
    description: Пользователи, роли, профиль текущего пользователя.
  - name: Company Service
    description: Компании и профили работодателей.
  - name: Vacancy Service
    description: Вакансии, назначения работодателей, справочники вакансий.
  - name: Search Service
    description: Поисковая read-модель опубликованных вакансий.
  - name: Resume Service
    description: Резюме соискателей.
  - name: Application Service
    description: Отклики, статусы откликов, приглашения на собеседование.
  - name: Interaction Service
    description: Избранное и история просмотров вакансий.
  - name: Notification Service
    description: Пользовательские уведомления.
  - name: Internal API
    description: Внутренние service-to-service endpoint'ы.

security:
  - BearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth Service]
      summary: Register applicant or employer
      description: Создает учетную запись пользователя с ролью APPLICANT или EMPLOYER. После регистрации auth-service публикует событие UserRegistered.
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              applicant:
                value:
                  email: applicant@example.com
                  phone: '+79990000001'
                  password: strongPassword123
                  fullName: Ivan Applicant
                  role: APPLICANT
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/login:
    post:
      tags: [Auth Service]
      summary: Login user
      description: Проверяет учетные данные и выпускает JWT. Роли пользователя запрашиваются из user-service.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: applicant@example.com
              password: strongPassword123
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/refresh:
    post:
      tags: [Auth Service]
      summary: Refresh JWT pair
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refreshed token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /users/me:
    get:
      tags: [User Service]
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    patch:
      tags: [User Service]
      summary: Update current user profile
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /roles:
    get:
      tags: [User Service]
      summary: List roles
      operationId: getRoles
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [User Service]
      summary: Create role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Created role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /users/{userId}/roles:
    post:
      tags: [User Service]
      summary: Assign role to user
      operationId: assignRoleToUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '200':
          description: Updated user roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /companies:
    post:
      tags: [Company Service]
      summary: Create company
      operationId: createCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyRequest'
      responses:
        '201':
          description: Created company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /companies/{companyId}:
    get:
      tags: [Company Service]
      summary: Get company by id
      security: []
      operationId: getCompany
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Company Service]
      summary: Update company
      operationId: updateCompany
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyRequest'
      responses:
        '200':
          description: Updated company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /employer-profiles:
    post:
      tags: [Company Service]
      summary: Create or relink current employer profile
      operationId: createEmployerProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployerProfileRequest'
      responses:
        '201':
          description: Employer profile created or relinked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /employer-profiles/me:
    get:
      tags: [Company Service]
      summary: Get current employer profile
      operationId: getMyEmployerProfile
      responses:
        '200':
          description: Employer profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Company Service]
      summary: Update current employer profile
      operationId: updateMyEmployerProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployerProfileRequest'
      responses:
        '200':
          description: Updated employer profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /vacancies:
    get:
      tags: [Search Service]
      summary: Search public vacancies
      description: Публичная поисковая выдача вакансий. Внешний путь остается /vacancies, но gateway маршрутизирует GET-запрос в search-service.
      security: []
      operationId: searchVacancies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: sort[created_at]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: sort[updated_at]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: sort[title]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: sort[salary_from]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: sort[salary_to]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: sort[city]
          in: query
          schema: { $ref: '#/components/schemas/SortDirection' }
        - name: search[title]
          in: query
          schema: { type: string }
        - name: search[description]
          in: query
          schema: { type: string }
        - name: search[company]
          in: query
          schema: { type: string }
        - name: search[city]
          in: query
          schema: { type: string }
        - name: search[industries]
          in: query
          schema: { type: string }
        - name: search[experience_levels]
          in: query
          schema: { type: string }
        - name: search[skills]
          in: query
          schema: { type: string }
        - name: search[employment_types]
          in: query
          schema: { type: string }
        - name: search[work_formats]
          in: query
          schema: { type: string }
        - name: search[statuses]
          in: query
          schema: { type: string }
        - name: salary_from
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
        - name: salary_to
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '200':
          description: Vacancy search page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancySearchPageResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Vacancy Service]
      summary: Create vacancy
      description: Создает вакансию в vacancy-service. При создании автоматически создается primary assignment на текущего работодателя.
      operationId: createVacancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVacancyRequest'
      responses:
        '201':
          description: Created vacancy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /search/vacancies:
    get:
      tags: [Search Service]
      summary: Alternative explicit vacancy search endpoint
      description: Дублирующий явный путь для поиска. Может использоваться клиентом вместо GET /vacancies.
      security: []
      operationId: searchVacanciesExplicit
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: q
          in: query
          schema: { type: string }
        - name: city
          in: query
          schema: { type: string }
        - name: skill
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - name: salary_from
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
        - name: salary_to
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '200':
          description: Vacancy search page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancySearchPageResponse'
        '400': { $ref: '#/components/responses/ValidationError' }

  /vacancies/my:
    get:
      tags: [Vacancy Service]
      summary: Get current employer vacancies
      operationId: getMyVacancies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Employer vacancy page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyPageResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /vacancies/{vacancyId}:
    get:
      tags: [Vacancy Service]
      summary: Get vacancy card
      description: Получает карточку вакансии из vacancy-service. Публично доступна только опубликованная вакансия.
      security: []
      operationId: getVacancy
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      responses:
        '200':
          description: Vacancy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Vacancy Service]
      summary: Update vacancy
      operationId: updateVacancy
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVacancyRequest'
      responses:
        '200':
          description: Updated vacancy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    delete:
      tags: [Vacancy Service]
      summary: Delete vacancy
      operationId: deleteVacancy
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /vacancies/{vacancyId}/assignments:
    get:
      tags: [Vacancy Service]
      summary: List vacancy assignments
      operationId: getVacancyAssignments
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VacancyAssignmentResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    post:
      tags: [Vacancy Service]
      summary: Assign employer to vacancy
      operationId: createVacancyAssignment
      parameters:
        - $ref: '#/components/parameters/VacancyId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVacancyAssignmentRequest' }
      responses:
        '201':
          description: Created assignment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VacancyAssignmentResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /vacancy-assignments/{assignmentId}:
    patch:
      tags: [Vacancy Service]
      summary: Update vacancy assignment
      operationId: updateVacancyAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVacancyAssignmentRequest' }
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VacancyAssignmentResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }
    delete:
      tags: [Vacancy Service]
      summary: Delete vacancy assignment
      operationId: deleteVacancyAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      responses:
        '204': { description: Deleted }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /industries:
    get:
      tags: [Vacancy Service]
      summary: List industries
      security: []
      operationId: getIndustries
      responses:
        '200':
          description: Industries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DictionaryItemResponse' }
    post:
      tags: [Vacancy Service]
      summary: Create industry
      operationId: createIndustry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDictionaryItemRequest' }
      responses:
        '201':
          description: Created industry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DictionaryItemResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /industries/{industryId}:
    patch:
      tags: [Vacancy Service]
      summary: Update industry
      operationId: updateIndustry
      parameters:
        - $ref: '#/components/parameters/IndustryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDictionaryItemRequest' }
      responses:
        '200':
          description: Updated industry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DictionaryItemResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /experience-levels:
    get:
      tags: [Vacancy Service]
      summary: List experience levels
      security: []
      operationId: getExperienceLevels
      responses:
        '200':
          description: Experience levels
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DictionaryItemResponse' }
    post:
      tags: [Vacancy Service]
      summary: Create experience level
      operationId: createExperienceLevel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDictionaryItemRequest' }
      responses:
        '201':
          description: Created experience level
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DictionaryItemResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /experience-levels/{experienceLevelId}:
    patch:
      tags: [Vacancy Service]
      summary: Update experience level
      operationId: updateExperienceLevel
      parameters:
        - $ref: '#/components/parameters/ExperienceLevelId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDictionaryItemRequest' }
      responses:
        '200':
          description: Updated experience level
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DictionaryItemResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /skills:
    get:
      tags: [Vacancy Service]
      summary: List skills
      security: []
      operationId: getSkills
      responses:
        '200':
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DictionaryItemResponse' }
    post:
      tags: [Vacancy Service]
      summary: Create skill
      operationId: createSkill
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDictionaryItemRequest' }
      responses:
        '201':
          description: Created skill
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DictionaryItemResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
