components:
  schemas:
    Category:
      type: object
      required:
        - category_id
        - name
      properties:
        category_id:
          type: integer
          format: int32
        name:
          type: string
    Comment:
      type: object
      required:
        - comment_id
        - user_id
        - recipe_id
        - text
        - created_at
      properties:
        comment_id:
          type: integer
          format: int32
        user_id:
          type: integer
          format: int32
        recipe_id:
          type: integer
          format: int32
        text:
          type: string
        created_at:
          type: string
          format: date-time
    CreateCategory:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    CreateComment:
      type: object
      required:
        - user_id
        - recipe_id
        - text
      properties:
        user_id:
          type: integer
          format: int32
        recipe_id:
          type: integer
          format: int32
        text:
          type: string
    CreateRecipe:
      type: object
      required:
        - title
        - description
        - cooking_time
        - difficulty
        - author_id
      properties:
        title:
          type: string
        description:
          type: string
        cooking_time:
          type: integer
          format: int32
        difficulty:
          type: string
          enum:
            - easy
            - medium
            - hard
        author_id:
          type: integer
          format: int32
    CreateRecipeIngredient:
      type: object
      required:
        - recipe_id
        - ingredient_id
        - quantity
        - unit
      properties:
        recipe_id:
          type: integer
          format: int32
        ingredient_id:
          type: integer
          format: int32
        quantity:
          type: number
          format: float
        unit:
          type: string
    CreateSavedRecipe:
      type: object
      required:
        - user_id
        - recipe_id
      properties:
        user_id:
          type: integer
          format: int32
        recipe_id:
          type: integer
          format: int32
    CreateStep:
      type: object
      required:
        - recipe_id
        - step_number
        - instruction
      properties:
        recipe_id:
          type: integer
          format: int32
        step_number:
          type: integer
          format: int32
        instruction:
          type: string
    CreateSubscription:
      type: object
      required:
        - subscriber_id
        - author_id
      properties:
        subscriber_id:
          type: integer
          format: int32
        author_id:
          type: integer
          format: int32
    CreateUser:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
          format: int32
    Ingredient:
      type: object
      required:
        - ingredient_id
        - name
      properties:
        ingredient_id:
          type: integer
          format: int32
        name:
          type: string
    Like:
      type: object
      required:
        - like_id
        - user_id
        - recipe_id
        - created_at
      properties:
        like_id:
          type: integer
          format: int32
        user_id:
          type: integer
          format: int32
        recipe_id:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
    Recipe:
      type: object
      required:
        - recipe_id
        - title
        - description
        - cooking_time
        - difficulty
        - author_id
        - created_at
      properties:
        recipe_id:
          type: integer
          format: int32
        title:
          type: string
        description:
          type: string
        cooking_time:
          type: integer
          format: int32
        difficulty:
          type: string
          enum:
            - easy
            - medium
            - hard
        author_id:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
    RecipeCategory:
      type: object
      required:
        - id
        - recipe_id
        - category_id
      properties:
        id:
          type: integer
          format: int32
        recipe_id:
          type: integer
          format: int32
        category_id:
          type: integer
          format: int32
    RecipeIngredient:
      type: object
      required:
        - id
        - recipe_id
        - ingredient_id
        - quantity
        - unit
      properties:
        id:
          type: integer
          format: int32
        recipe_id:
          type: integer
