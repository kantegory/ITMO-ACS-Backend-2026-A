services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  auth-service:
    build:
      context: .
      dockerfile: deploy/auth-service/Dockerfile
    environment:
      PORT: "8081"
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  catalog-service:
    build:
      context: .
      dockerfile: deploy/catalog-service/Dockerfile
    environment:
      PORT: "8082"
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  applicant-service:
    build:
      context: .
      dockerfile: deploy/applicant-service/Dockerfile
    environment:
      PORT: "8083"
      AUTH_URL: "http://auth-service:8081"
      CATALOG_URL: "http://catalog-service:8082"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    expose:
      - "8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  employer-service:
    build:
      context: .
      dockerfile: deploy/employer-service/Dockerfile
    environment:
      PORT: "8084"
      AUTH_URL: "http://auth-service:8081"
      CATALOG_URL: "http://catalog-service:8082"
      APPLICANT_URL: "http://applicant-service:8083"
    expose:
      - "8084"
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      applicant-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  notification-service:
    build:
      context: .
      dockerfile: deploy/notification-service/Dockerfile
    environment:
      PORT: "8085"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    expose:
      - "8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

  api-gateway:
    build:
      context: .
      dockerfile: deploy/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_URL: "http://auth-service:8081"
      CATALOG_URL: "http://catalog-service:8082"
      APPLICANT_URL: "http://applicant-service:8083"
      EMPLOYER_URL: "http://employer-service:8084"
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      applicant-service:
        condition: service_healthy
      employer-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - job-search-network

networks:
  job-search-network:
    driver: bridge
