openapi: 3.0.3
info:
  title: Recipe Sharing and Culinary Blogs API
  version: 1.0.0
  description: REST API для сервиса обмена рецептами и кулинарных блогов.
servers:
  - url: http://localhost:8080/api/v1
tags:
  - name: Auth
  - name: Users
  - name: Recipes
  - name: Comments
  - name: Social
  - name: Cabinet

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me:
    get:
      tags: [Users]
      summary: Профиль текущего пользователя
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Обновить профиль текущего пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Профиль обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /recipes:
    get:
      tags: [Recipes]
      summary: Список рецептов с фильтрами
      parameters:
        - in: query
          name: dish_type
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: string
            enum: [easy, medium, hard]
        - in: query
          name: ingredients
          description: Список ингредиентов через запятую
          schema:
            type: string
            example: tomato,onion,garlic
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: sort
          schema:
            type: string
            enum: [created_at_desc, likes_desc]
            default: created_at_desc
      responses:
        '200':
          description: Список рецептов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Recipes]
      summary: Создать рецепт
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
      responses:
        '201':
          description: Рецепт создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetails'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /recipes/{recipeId}:
    get:
      tags: [Recipes]
      summary: Получить карточку рецепта
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '200':
          description: Детали рецепта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetails'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Recipes]
      summary: Обновить рецепт
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipeRequest'
      responses:
        '200':
          description: Рецепт обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetails'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Recipes]
      summary: Удалить рецепт
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '204':
          description: Рецепт удален
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /recipes/{recipeId}/comments:
    get:
      tags: [Comments]
      summary: Получить комментарии рецепта
      parameters:
        - $ref: '#/components/parameters/RecipeId'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список комментариев
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Comments]
      summary: Добавить комментарий к рецепту
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /comments/{commentId}:
    delete:
      tags: [Comments]
      summary: Удалить комментарий
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204':
          description: Комментарий удален
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /recipes/{recipeId}/like:
    post:
      tags: [Social]
      summary: Поставить лайк рецепту
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '201':
          description: Лайк добавлен
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Social]
      summary: Убрать лайк рецепта
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '204':
          description: Лайк удален
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /recipes/{recipeId}/save:
    post:
      tags: [Cabinet]
      summary: Сохранить рецепт в личный кабинет
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '201':
          description: Рецепт сохранен
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Cabinet]
      summary: Удалить рецепт из сохраненных
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '204':
          description: Рецепт удален из сохраненных
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/saved-recipes:
    get:
      tags: [Cabinet]
      summary: Получить сохраненные рецепты текущего пользователя
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список сохраненных рецептов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/recipes:
    get:
      tags: [Cabinet]
      summary: Получить публикации текущего пользователя
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список публикаций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/follow:
    post:
      tags: [Social]
      summary: Подписаться на пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Подписка оформлена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Social]
      summary: Отписаться от пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Подписка удалена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/followers:
    get:
      tags: [Social]
      summary: Получить подписчиков пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Список подписчиков
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/following:
    get:
      tags: [Social]
      summary: Получить подписки пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RecipeId:
      in: path
      name: recipeId
      required: true
      schema:
        type: integer
        minimum: 1
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        minimum: 1
    CommentId:
      in: path
      name: commentId
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Доступ запрещен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        bio:
          type: string
          maxLength: 2000
      additionalProperties: false

    AuthResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, username, email, created_at]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    IngredientInput:
      type: object
      required: [name, amount]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        amount:
          type: string
          minLength: 1
          maxLength: 64

    StepInput:
      type: object
      required: [step_number, text]
      properties:
        step_number:
          type: integer
          minimum: 1
        text:
          type: string
          minLength: 1
          maxLength: 5000

    CreateRecipeRequest:
      type: object
      required:
        - title
        - dish_type
        - difficulty
        - steps
        - ingredients
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
          maxLength: 10000
        dish_type:
          type: string
          maxLength: 64
        difficulty:
          type: string
          enum: [easy, medium, hard]
        cooking_time:
          type: integer
          minimum: 1
          description: Время в минутах
        photo_url:
          type: string
          format: uri
          nullable: true
        video_url:
          type: string
          format: uri
          nullable: true
        ingredients:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IngredientInput'
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/StepInput'

    UpdateRecipeRequest:
      allOf:
        - $ref: '#/components/schemas/CreateRecipeRequest'

    Ingredient:
      type: object
      required: [id, name, amount]
      properties:
        id:
          type: integer
        name:
          type: string
        amount:
          type: string

    Step:
      type: object
      required: [id, step_number, text]
      properties:
        id:
          type: integer
        step_number:
          type: integer
        text:
          type: string

    RecipeCard:
      type: object
      required: [id, user_id, title, dish_type, difficulty, created_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        dish_type:
          type: string
        difficulty:
          type: string
        cooking_time:
          type: integer
          nullable: true
        photo_url:
          type: string
          nullable: true
        video_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        likes_count:
          type: integer
          minimum: 0
        comments_count:
          type: integer
          minimum: 0

    RecipeDetails:
      allOf:
        - $ref: '#/components/schemas/RecipeCard'
        - type: object
          required: [ingredients, steps]
          properties:
            ingredients:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
            steps:
              type: array
              items:
                $ref: '#/components/schemas/Step'

    RecipeListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecipeCard'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    CreateCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000

    Comment:
      type: object
      required: [id, user_id, recipe_id, text, created_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        recipe_id:
          type: integer
        text:
          type: string
        created_at:
          type: string
          format: date-time

    CommentListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    UserListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer

    ErrorDetail:
      type: object
      required: [field, issue]
      properties:
        field:
          type: string
        issue:
          type: string

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
