components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Cuisine:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    UserResponse:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        full_name: { type: string }
        phone: { type: string, nullable: true }
        role: { type: string, enum: [guest, admin] }
        created_at: { type: string, format: date-time }

    RestaurantInput:
      type: object
      required: [name, city, address, cuisine_id]
      properties:
        cuisine_id: { type: integer }
        name: { type: string, maxLength: 200 }
        description: { type: string }
        city: { type: string, maxLength: 100 }
        address: { type: string }
        avg_price_per_person: { type: number, minimum: 0 }
        latitude: { type: number, format: float, minimum: -90, maximum: 90 }
        longitude: { type: number, format: float, minimum: -180, maximum: 180 }

    RestaurantListItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        city: { type: string }
        cuisine_name: { type: string }
        avg_price_per_person: { type: number, nullable: true }
        avg_rating: { type: number, nullable: true }
        main_image_url: { type: string, nullable: true }

    RestaurantDetail:
      allOf:
        - $ref: '#/components/schemas/RestaurantListItem'
        - type: object
          properties:
            description: { type: string, nullable: true }
            address: { type: string }
            latitude: { type: number, nullable: true }
            longitude: { type: number, nullable: true }
            status: { type: string, enum: [active, archived] }
            images:
              type: array
              items: { $ref: '#/components/schemas/ImageResponse' }
            menu:
              type: array
              items: { $ref: '#/components/schemas/MenuItemResponse' }
            reviews:
              type: array
              items: { $ref: '#/components/schemas/ReviewResponse' }
            created_at: { type: string, format: date-time }

    ImageResponse:
      type: object
      properties:
        id: { type: integer }
        image_url: { type: string }
        is_main: { type: boolean }

    TableResponse:
      type: object
      properties:
        id: { type: integer }
        restaurant_id: { type: integer }
        capacity: { type: integer }
        label: { type: string, nullable: true }

    MenuItemResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number }
        category: { type: string, nullable: true }

    BookingResponse:
      type: object
      properties:
        id: { type: integer }
        restaurant:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            city: { type: string }
            address: { type: string }
        table:
          $ref: '#/components/schemas/TableResponse'
        user:
          $ref: '#/components/schemas/UserResponse'
        booking_date: { type: string, format: date }
        start_time: { type: string, example: "19:00" }
        end_time: { type: string, example: "21:00" }
        guests_count: { type: integer }
        comment: { type: string, nullable: true }
        status: { type: string, enum: [pending, confirmed, cancelled, completed] }
        created_at: { type: string, format: date-time }

    ReviewResponse:
      type: object
      properties:
        id: { type: integer }
        user:
          type: object
          properties:
            id: { type: integer }
            full_name: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
