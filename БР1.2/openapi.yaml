openapi: 3.0.0
info:
  title: Restaurant Booking API
  version: 1.0.0
  description: API для сервиса бронирования столиков в ресторанах
servers:
  - url: https://api.restbook.ru/v1
    description: Production server

paths:
  /auth/register:
    post:
      summary: Регистрация нового пользователя
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                full_name: { type: string, maxLength: 100 }
                phone: { type: string, pattern: '^\+?[0-9]{10,15}$' }
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400':
          description: Некорректные данные или email уже существует
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      summary: Аутентификация
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  user: { $ref: '#/components/schemas/UserResponse' }
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      summary: Обновление access-токена
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Новая пара токенов
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
        '401':
          description: Невалидный или истёкший refresh-токен
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/me:
    get:
      summary: Получить профиль текущего пользователя
      tags: [Users]
      security: [BearerAuth: []]
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      summary: Обновить профиль текущего пользователя
      tags: [Users]
      security: [BearerAuth: []]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string, maxLength: 100 }
                phone: { type: string, pattern: '^\+?[0-9]{10,15}$' }
                password: { type: string, minLength: 6 }
      responses:
        '200':
          description: Обновлённый профиль
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/{id}/role:
    patch:
      summary: Изменить роль пользователя (только admin)
      tags: [Users]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [guest, admin] }
      responses:
        '200':
          description: Роль обновлена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400':
          description: Некорректная роль
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /cuisines:
    get:
      summary: Список всех кухонь (справочник)
      tags: [Cuisines]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cuisine' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      summary: Создать кухню (только admin)
      tags: [Cuisines]
      security: [BearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 50 }
      responses:
        '201':
          description: Кухня создана
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cuisine' }
        '400':
          description: Некорректное имя или дубликат
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /cuisines/{id}:
    delete:
      summary: Удалить кухню (только admin)
      tags: [Cuisines]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: No Content
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Кухня не найдена
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Нельзя удалить — есть привязанные рестораны
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurants:
    get:
      summary: Поиск ресторанов с фильтрацией
      tags: [Restaurants]
      parameters:
        - name: city
          in: query
          schema: { type: string }
        - name: cuisine_id
          in: query
          schema: { type: integer }
        - name: min_price
          in: query
          schema: { type: number }
        - name: max_price
          in: query
          schema: { type: number }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Список активных ресторанов
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/RestaurantListItem' }
        '400':
          description: Неверные параметры фильтрации
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    post:
      summary: Создать ресторан (только admin)
      tags: [Restaurants]
      security: [BearerAuth: []]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RestaurantInput' }
      responses:
        '201':
          description: Ресторан создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestaurantDetail' }
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurants/{id}:
    get:
      summary: Детальная информация о ресторане
      tags: [Restaurants]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestaurantDetail' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    put:
      summary: Полное обновление ресторана (только admin)
      tags: [Restaurants]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RestaurantInput' }
      responses:
        '200':
          description: Ресторан обновлён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RestaurantDetail' }
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: Удалить ресторан (только admin)
      tags: [Restaurants]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: No Content
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurants/{id}/status:
    patch:
      summary: Изменить статус ресторана (active/archived)
      tags: [Restaurants]
      security: [BearerAuth: []]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, archived] }
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  status: { type: string }
        '400':
          description: Некорректный статус
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurants/{restaurantId}/images:
    post:
      summary: Загрузить изображение ресторана (multipart/form-data)
      tags: [RestaurantImages]
      security: [BearerAuth: []]
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                is_main:
                  type: boolean
      responses:
        '201':
          description: Изображение добавлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageResponse' }
        '400':
          description: Неверный формат файла или превышен размер
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    get:
      summary: Список изображений ресторана
      tags: [RestaurantImages]
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ImageResponse' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurant-images/{imageId}:
    delete:
      summary: Удалить изображение (только admin)
      tags: [RestaurantImages]
      security: [BearerAuth: []]
      parameters:
        - name: imageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Deleted
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Изображение не найдено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    patch:
      summary: Сделать изображение главным (только admin)
      tags: [RestaurantImages]
      security: [BearerAuth: []]
      parameters:
        - name: imageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Главное фото обновлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageResponse' }
        '401':
          description: Неавторизован
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Доступ запрещён (не admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Изображение не найдено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /restaurants/{restaurantId}/tables:
    get:
      summary: Список столиков ресторана
      tags: [Tables]
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema: { type: integer }
        - name: capacity
          in: query
          description: Минимальная вместимость
          schema: { type: integer }
        - name: date
          in: query
          description: Дата для проверки доступности (необязательно)
          schema: { type: string, format: date }
        - name: start_time
          in: query
          schema: { type: string, format: time, example: "19:00" }
        - name: end_time
          in: query
          schema: { type: string, format: time, example: "21:00" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TableResponse' }
        '404':
          description: Ресторан не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Слишком много запросов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    post:
      summary: Добавить столик (только admin)
      tags: [Tables]
      security: [BearerAuth: []]
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capacity]
              properties:
                capacity: { type: integer, minimum: 1 }
