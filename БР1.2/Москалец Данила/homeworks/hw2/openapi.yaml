  # ============================================================================
  # REQUESTS (заявки)
  # ============================================================================

  /services/{service_id}/requests:
    parameters:
      - $ref: '#/components/parameters/ServiceIdPath'
    post:
      operationId: createServiceRequest
      summary: Создать заявку на услугу
      description: Нельзя создать заявку на услугу собственной компании.
      tags: [Requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequestBody'
