              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ServiceRequest'
        '403':
          description: Нельзя создать заявку на услугу своей компании
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: У пользователя уже есть активная заявка на эту услугу

  /requests/{request_id}:
    parameters:
      - $ref: '#/components/parameters/RequestIdPath'
    get:
      operationId: getRequest
      summary: Детали заявки
      description: Доступно автору заявки, OWNER компании и ADMIN.
      tags: [Requests]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ServiceRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /requests/{request_id}/status:
    parameters:
      - $ref: '#/components/parameters/RequestIdPath'
    put:
      operationId: updateRequestStatus
      summary: Изменить статус заявки
      description: |
        Только OWNER компании.
        Допустимые переходы: PENDING → ACCEPTED, PENDING → REJECTED.
        Попытка изменить статус из ACCEPTED, REJECTED или CANCELLED вернёт 400.
      tags: [Requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequestStatusBody'
      responses:
        '200':
          description: Статус изменён
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ServiceRequest'
        '400':
          description: Некорректный переход статуса
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /requests/{request_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/RequestIdPath'
    put:
      operationId: cancelRequest
      summary: Отменить заявку
      description: |
        Только автор заявки.
        Допустимый переход: PENDING → CANCELLED.
        Из статусов ACCEPTED, REJECTED, CANCELLED отмена невозможна — вернёт 400.
      tags: [Requests]
      responses:
        '200':
          description: Заявка отменена
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ServiceRequest'
        '400':
          description: Заявку нельзя отменить в текущем статусе
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

