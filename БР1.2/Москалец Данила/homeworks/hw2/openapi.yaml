        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: У услуги уже есть скидка

    put:
      operationId: updateDiscount
      summary: Обновить скидку
      description: Только OWNER компании-владельца услуги.
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscountRequest'
