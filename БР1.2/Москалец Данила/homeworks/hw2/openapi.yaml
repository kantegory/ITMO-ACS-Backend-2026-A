openapi: 3.0.0
info:
  title: Sangel API
  description: |
    Маркетплейс охранных услуг.

    ## Роли пользователей
    - **USER**: обычный пользователь: просмотр каталога, отправка заявок, отзывы, избранное
    - **OWNER**: владелец компании: управление компанией, услугами, скидками, заявками
    - **ADMIN**: системный администратор: полный доступ, отчёты, управление категориями

    ## Аутентификация
    Все защищённые эндпоинты требуют заголовок `Authorization: Bearer <access_token>`.
    Access token живёт 15 минут, refresh token - 30 дней.

    ## Пагинация
    Все списочные эндпоинты принимают параметры `page` и `page_size`.
    Ответ содержит объект `pagination` с полями `total`, `page`, `page_size`, `total_pages`.

    ## Машина состояний заявки
    Допустимые переходы статусов:
    - `PENDING` → `ACCEPTED` (OWNER компании, через PUT /requests/{id}/status)
    - `PENDING` → `REJECTED` (OWNER компании, через PUT /requests/{id}/status)
    - `PENDING` → `CANCELLED` (автор заявки, через PUT /requests/{id}/cancel)
    - Из статусов `ACCEPTED`, `REJECTED`, `CANCELLED` переходы невозможны.

    ## PATCH vs PUT
    Все эндпоинты обновления используют PUT с частичными данными:
    незаполненные поля не изменяют текущее значение (не обнуляют).
    Для явного обнуления nullable-поля передайте `null`.
  version: 1.0.0
  contact:
    name: Москалец Данила Алексеевич

servers:
  - url: https://api.sangel.ru/v1
    description: Production
  - url: http://localhost:8000/v1
    description: Development

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    # --- Пагинация ---
    PageParam:
      name: page
      in: query
      description: Номер страницы (начиная с 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: Количество элементов на странице
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    # --- Сортировка ---
    SortOrderParam:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    # --- Path params ---
    CompanyIdPath:
      name: company_id
      in: path
      required: true
      schema:
        type: integer
    ServiceIdPath:
      name: service_id
      in: path
      required: true
      schema:
        type: integer
    RequestIdPath:
      name: request_id
      in: path
      required: true
      schema:
        type: integer
    ReviewIdPath:
      name: review_id
      in: path
      required: true
      schema:
        type: integer
    CategoryIdPath:
      name: category_id
      in: path
      required: true
      schema:
        type: integer
    UserIdPath:
      name: user_id
      in: path
      required: true
      schema:
        type: integer

  schemas:

    # ── Общие ───────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
              example: 404
            message:
              type: string
              example: Resource not found
            details:
              type: object
              description: Дополнительные сведения об ошибке (поля валидации и т.п.)
              additionalProperties: true

    Pagination:
      type: object
      required: [total, page, page_size, total_pages]
      properties:
        total:
          type: integer
          description: Общее количество записей
        page:
          type: integer
          description: Текущая страница
        page_size:
          type: integer
          description: Размер страницы
        total_pages:
          type: integer
          description: Всего страниц

    # ── Auth / User ──────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, USER, OWNER]
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        is_verified:
          type: boolean
          description: Подтверждён ли email
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Минимум 8 символов, хотя бы одна цифра и одна заглавная буква
        first_name:
          type: string
          maxLength: 64
        last_name:
          type: string
          maxLength: 64
        middle_name:
          type: string
          maxLength: 64

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Время жизни access token в секундах

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 64
        last_name:
          type: string
          maxLength: 64
        middle_name:
          type: string
          maxLength: 64
          nullable: true

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    # ── Category ─────────────────────────────────────────────────────────────────

    Category:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        is_published:
          type: boolean

    CreateCategoryRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 128
        is_published:
          type: boolean
          default: true

    UpdateCategoryRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 128
        is_published:
          type: boolean

    # ── Company ──────────────────────────────────────────────────────────────────

    Company:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        logo_url:
          type: string
          format: uri
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        avg_rating:
          type: number
          format: float
          description: Средний рейтинг на основе отзывов об услугах компании
          nullable: true
        total_reviews:
          type: integer
        total_services:
          type: integer
        created_at:
          type: string
          format: date-time

    CompanyDetail:
      description: |
        Детальная карточка компании. Поле `services_preview` содержит
        не более 5 услуг. Полный список — GET /companies/{company_id}/services.
      allOf:
        - $ref: '#/components/schemas/Company'
        - type: object
          properties:
            owner:
              type: object
              properties:
                id:
                  type: integer
                first_name:
                  type: string
                last_name:
                  type: string
            services_preview:
              type: array
              maxItems: 5
              description: Первые 5 опубликованных услуг. Полный список — GET /companies/{company_id}/services.
              items:
                $ref: '#/components/schemas/ServiceSummary'

    CreateCompanyRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        logo_url:
          type: string
          format: uri
          description: URL логотипа (загружать через /uploads/image)
        website:
          type: string
          format: uri

    UpdateCompanyRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        logo_url:
          type: string
          format: uri
          nullable: true
        website:
          type: string
          format: uri
          nullable: true

    # ── Service ──────────────────────────────────────────────────────────────────

    # Краткая версия услуги — для списков и встраивания в CompanyDetail
    ServiceSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        final_price:
          type: number
          format: float
        discount_percentage:
          type: integer
          nullable: true
          description: Процент активной скидки, null если скидки нет
        is_published:
          type: boolean
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        avg_rating:
          type: number
          format: float
          nullable: true
        total_reviews:
          type: integer

    # Полная версия услуги — для детального просмотра и списка каталога
    Service:
      type: object
      properties:
        id:
          type: integer
        company_id:
          type: integer
        company_title:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
          description: Базовая цена
        final_price:
          type: number
          format: float
          description: Цена с учётом активной скидки
        discount:
          nullable: true
          description: Активная скидка, если есть. Используется DiscountShort — без service_id.
          allOf:
            - $ref: '#/components/schemas/DiscountShort'
        is_published:
          type: boolean
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        avg_rating:
          type: number
          format: float
          nullable: true
        total_reviews:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateServiceRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        price:
          type: number
          format: float
          minimum: 0
        is_published:
          type: boolean
          default: true
        category_ids:
          type: array
          items:
            type: integer

    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        price:
          type: number
          format: float
          minimum: 0
        is_published:
          type: boolean
        category_ids:
          type: array
          items:
            type: integer

    # ── Discount ─────────────────────────────────────────────────────────────────

    # Полная схема — используется в /services/{id}/discount
    Discount:
      type: object
      properties:
        id:
          type: integer
        service_id:
          type: integer
        percentage:
          type: integer
          minimum: 1
          maximum: 99
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        is_active:
          type: boolean
          description: Действует ли скидка прямо сейчас

    # Встраиваемая схема — используется внутри Service, без service_id.
    # Это разрывает потенциальную циклическую ссылку Service → Discount → service_id.
    DiscountShort:
      type: object
      properties:
        id:
          type: integer
        percentage:
          type: integer
          minimum: 1
          maximum: 99
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        is_active:
          type: boolean
          description: Действует ли скидка прямо сейчас

    CreateDiscountRequest:
      type: object
      required: [percentage, start_at, end_at]
      properties:
        percentage:
          type: integer
          minimum: 1
          maximum: 99
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time

    # ── Request (заявка) ─────────────────────────────────────────────────────────

    ServiceRequest:
      type: object
      properties:
        id:
          type: integer
        service:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            company:
              type: object
              properties:
                id:
                  type: integer
                title:
                  type: string
        user:
          type: object
          properties:
            id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED, CANCELLED]
        description:
          type: string
          nullable: true
          description: Комментарий пользователя при создании заявки
        reply:
          type: string
          nullable: true
          description: Ответ компании при смене статуса
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateServiceRequestBody:
      type: object
      properties:
        description:
          type: string
          maxLength: 2048

    UpdateRequestStatusBody:
      type: object
      required: [status]
      description: |
        Допустимые переходы: PENDING → ACCEPTED, PENDING → REJECTED.
        Попытка изменить статус из ACCEPTED, REJECTED или CANCELLED вернёт 400.
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED]
        reply:
          type: string
          maxLength: 2048
          description: Необязательный комментарий компании для пользователя

    # ── Review ───────────────────────────────────────────────────────────────────

    Review:
      type: object
      properties:
        id:
          type: integer
        service_id:
          type: integer
        service_name:
          type: string
        company_id:
          type: integer
        company_title:
          type: string
        user:
          type: object
          properties:
            id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 4096

    # ── Favorite ─────────────────────────────────────────────────────────────────

    Favorite:
      type: object
      properties:
        service_id:
          type: integer
        name:
          type: string
        company:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
        price:
          type: number
          format: float
        final_price:
          type: number
          format: float
        avg_rating:
          type: number
          format: float
          nullable: true
        added_at:
          type: string
          format: date-time

    # ── Reports ──────────────────────────────────────────────────────────────────

    ActivityReport:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        totals:
          type: object
          properties:
            users:
              type: integer
            companies:
              type: integer
            services:
              type: integer
            requests:
              type: integer
            reviews:
              type: integer
        requests_by_status:
          type: object
          properties:
            pending:
              type: integer
            accepted:
              type: integer
            rejected:
              type: integer
            cancelled:
              type: integer
        top_companies:
          type: array
          description: Топ-10 компаний по числу принятых заявок
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              requests_accepted:
                type: integer
              avg_rating:
                type: number
                format: float
                nullable: true
        new_users_dynamics:
          type: array
          description: Динамика регистраций по дням/неделям/месяцам
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer

    CompanyReport:
      type: object
      properties:
        company_id:
          type: integer
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        requests_total:
          type: integer
        requests_by_status:
          type: object
          properties:
            pending:
              type: integer
            accepted:
              type: integer
            rejected:
              type: integer
            cancelled:
              type: integer
        top_services:
          type: array
          description: Топ услуг по числу заявок
          items:
            type: object
            properties:
              service_id:
                type: integer
              name:
                type: string
              requests_count:
                type: integer
              avg_rating:
                type: number
                format: float
                nullable: true
        avg_rating:
          type: number
          format: float
          nullable: true
        total_reviews:
          type: integer

  # ── Общие ответы ──────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Доступ запрещён
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт состояния
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - bearerAuth: []

# ==============================================================================
# PATHS
# ==============================================================================
paths:

  # ============================================================================
  # AUTH
  # ============================================================================

  /auth/register:
    post:
      operationId: registerUser
      summary: Регистрация
      description: Создаёт нового пользователя. После регистрации на email отправляется письмо для подтверждения.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/UnprocessableEntity'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      operationId: loginUser
      summary: Вход
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      operationId: refreshTokens
      summary: Обновить токены
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Новая пара токенов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Выход (инвалидация refresh token)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '204':
          description: Выполнено успешно
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Подтвердить email по токену из письма
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email подтверждён
        '400':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      summary: Повторно отправить письмо с подтверждением
      tags: [Auth]
      responses:
        '204':
          description: Письмо отправлено
        '409':
          description: Email уже подтверждён

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Запрос на сброс пароля
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: Письмо отправлено (если email существует)

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Сброс пароля по токену из письма
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Пароль изменён
        '400':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Текущий пользователь
      tags: [Auth]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # PROFILE
  # ============================================================================

  /profile:
    put:
      operationId: updateProfile
      summary: Обновить профиль
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Профиль обновлён
