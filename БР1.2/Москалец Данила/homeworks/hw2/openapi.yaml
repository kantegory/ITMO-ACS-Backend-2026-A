          schema:
            type: string
            enum: [created_at, rating]
            default: created_at
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  avg_rating:
                    type: number
                    format: float
                    nullable: true
                  total_reviews:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      operationId: createReview
      summary: Оставить отзыв об услуге
      description: |
        Пользователь может оставить отзыв только если:
        - у него есть заявка на эту услугу в статусе ACCEPTED
        - он ещё не оставлял отзыв на эту услугу
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Отзыв создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Review'
        '403':
          description: Нет принятых заявок на эту услугу или отзыв уже оставлен
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/{review_id}:
    parameters:
      - $ref: '#/components/parameters/ReviewIdPath'
    delete:
      operationId: deleteReview
      summary: Удалить отзыв
      description: Только автор отзыва или ADMIN.
      tags: [Reviews]
      responses:
        '204':
          description: Удалено
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # FAVORITES
  # ============================================================================

  /favorites/{service_id}:
    parameters:
      - $ref: '#/components/parameters/ServiceIdPath'
    post:
      operationId: addToFavorites
      summary: Добавить услугу в избранное
      tags: [Favorites]
      responses:
        '201':
          description: Добавлено
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Уже в избранном

    delete:
      operationId: removeFromFavorites
      summary: Удалить услугу из избранного
      tags: [Favorites]
      responses:
        '204':
          description: Удалено
        '404':
          description: Услуга не найдена в избранном

  # ============================================================================
  # UPLOADS
  # ============================================================================

  /uploads/image:
    post:
      operationId: uploadImage
      summary: Загрузить изображение
      description: |
        Возвращает URL для использования в полях logo_url.
        Максимальный размер — 5 МБ. Форматы: JPEG, PNG, WebP.
      tags: [Uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Файл загружен
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
        '400':
          description: Неверный формат или размер файла
        '413':
          description: Файл слишком большой

  # ============================================================================
  # ADMIN
  # ============================================================================

  /admin/users:
    get:
      operationId: adminListUsers
      summary: Список пользователей
      description: Только ADMIN.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          description: Поиск по email, имени
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [ADMIN, USER, OWNER]
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, email]
            default: created_at
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      operationId: adminGetUser
      summary: Информация о пользователе
      description: Только ADMIN.
      tags: [Admin]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: adminDeleteUser
      summary: Удалить пользователя
      description: Только ADMIN.
      tags: [Admin]
      responses:
        '204':
          description: Удалено
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/companies:
    get:
      operationId: adminListCompanies
      summary: Список компаний (включая скрытые)
      description: Только ADMIN.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, rating, title]
            default: created_at
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Company'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/requests:
    get:
      operationId: adminListRequests
      summary: Все заявки на платформе
      description: Только ADMIN.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACCEPTED, REJECTED, CANCELLED]
        - name: company_id
          in: query
          schema:
            type: integer
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, status]
            default: created_at
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceRequest'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/reports/activity:
    get:
      operationId: adminGetActivityReport
      summary: Отчёт по активности платформы
      description: Только ADMIN.
      tags: [Admin]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: month
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ActivityReport'
        '403':
          $ref: '#/components/responses/Forbidden'

tags:
  - name: Auth
    description: Регистрация, вход, управление токенами
  - name: Profile
