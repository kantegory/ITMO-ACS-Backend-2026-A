version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sangel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-sangel_dev}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - sangel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sangel_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sangel_postgres_data: