openapi: 3.0.0
info:
  title: Restaurant Booking API
  version: 1.0.0

paths:

  /auth/register:
    post:
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  example: user@mail.com
                password:
                  type: string
                  example: password123
                name:
                  type: string
                  example: Ivan Ivanov
      responses:
        201:
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
        400:
          description: Ошибка валидации

  /auth/login:
    post:
      summary: Аутентификация пользователя
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        401:
          description: Неверные учетные данные

  /restaurants:
    get:
      summary: Получение списка ресторанов
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: cuisine
          in: query
          schema:
            type: string
        - name: price_range
          in: query
          schema:
            type: string
      responses:
        200:
          description: Список ресторанов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /restaurants/{id}:
    get:
      summary: Получение информации о ресторане
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Данные ресторана
        404:
          description: Ресторан не найден

  /reservations:
    post:
      summary: Создание бронирования
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [table_id, reservation_datetime, guests_count]
              properties:
                table_id:
                  type: integer
                reservation_datetime:
                  type: string
                  example: "2026-04-01T18:00:00"
                guests_count:
                  type: integer
      responses:
        201:
          description: Бронирование создано
        400:
          description: Ошибка данных

    get:
      summary: Получение списка бронирований пользователя
      responses:
        200:
          description: Список бронирований

  /reservations/{id}:
    delete:
      summary: Отмена бронирования
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Бронирование отменено
        404:
          description: Не найдено