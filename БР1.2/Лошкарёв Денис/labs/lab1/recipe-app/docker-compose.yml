version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: chefpass
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
  
  adminer:
    image: adminer
    ports:
      - "1000:8080"

  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db