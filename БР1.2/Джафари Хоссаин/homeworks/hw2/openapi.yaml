  # ---------------- Training plans ----------------
  /v1/training-plans:
    get:
      tags: [Training Plans]
      summary: Список планов + фильтрация
      description: "Фильтры: user_id(trainer), price range, duration_weeks range, search; пагинация."
      security: []
      parameters:
        - in: query
          name: user_id
          schema: { type: integer, format: int64 }
        - in: query
          name: min_price
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: max_price
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: min_duration_weeks
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: max_duration_weeks
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TrainingPlan' }
        '400':
          description: Некорректные фильтры
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      tags: [Training Plans]
      summary: Создать план (admin/trainer)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrainingPlanCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdResponse' }
        '400':
          description: Валидация
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Нет прав
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/training-plans/{training_plan_id}:
    get:
      tags: [Training Plans]
      summary: Детально план + состав (plan_workout)
      security: []
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan + workouts
          content:
            application/json:
              schema:
                type: object
                required: [plan, plan_workouts]
                properties:
                  plan: { $ref: '#/components/schemas/TrainingPlan' }
                  plan_workouts:
                    type: array
                    items: { $ref: '#/components/schemas/PlanWorkout' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Training Plans]
      summary: Обновить план (admin/trainer)
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrainingPlanUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrainingPlan' }
        '400':
          description: Валидация
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Нет прав
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      tags: [Training Plans]
      summary: Удалить план (admin)
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }
        '403':
          description: Нет прав
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/training-plans/{training_plan_id}/plan-workouts:
    get:
      tags: [Training Plans]
      summary: Состав плана (plan_workout) + фильтрация по day_number
      security: []
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: day_number
          schema: { type: number, format: double }
      responses:
        '200':
          description: Plan workouts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlanWorkout' }
    post:
      tags: [Training Plans]
      summary: Добавить тренировку в план (admin/trainer)
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlanWorkoutCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IdResponse' }
        '400':
          description: Валидация
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Нет прав
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ---------------- Progress ----------------
  /v1/me/user-workout-progress:
    get:
      tags: [Progress]
      summary: Мой прогресс по тренировкам + фильтрация
      parameters:
        - in: query
          name: workout_id
          schema: { type: integer, format: int64 }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/UserWorkoutProgressStatus' }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Progress list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserWorkoutProgress' }

  /v1/me/user-workout-progress/{workout_id}:
    patch:
      tags: [Progress]
      summary: Обновить мой прогресс по конкретной тренировке
      parameters:
        - in: path
          name: workout_id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserWorkoutProgressUpdateRequest' }
      responses:
        '200':
          description: Updated progress
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserWorkoutProgress' }
        '400':
          description: Валидация/некорректная смена статуса
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Workout not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/me/user-plan-progress:
    get:
      tags: [Progress]
      summary: Мой прогресс по планам + фильтрация
      parameters:
        - in: query
          name: training_plan_id
          schema: { type: integer, format: int64 }
        - in: query
          name: is_completed
          schema: { type: boolean, description: "true -> completed_at != null" }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Plan progress list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserPlanProgress' }

  /v1/me/user-plan-progress/{training_plan_id}:
    patch:
      tags: [Progress]
      summary: Обновить мой прогресс по плану
      parameters:
        - in: path
          name: training_plan_id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserPlanProgressUpdateRequest' }
      responses:
        '200':
          description: Updated plan progress
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPlanProgress' }
        '400':
          description: Валидация
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Training plan not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

