          schema: { type: integer, format: int64 }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/PaymentStatus' }
        - in: query
          name: min_amount
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: max_amount
          schema: { type: number, format: double, minimum: 0 }
        - in: query
          name: payment_method
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Payments
          content:
