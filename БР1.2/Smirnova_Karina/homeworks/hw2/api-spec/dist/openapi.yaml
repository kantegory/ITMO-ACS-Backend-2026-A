        listingId:
          type: integer
          format: int64
        communicationMethod:
          $ref: '#/components/schemas/CommunicationMethod'
    Rents.RentResponse:
      type: object
      required:
        - id
        - listingId
        - guestId
        - communicationMethod
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        listingId:
          type: integer
          format: int64
        guestId:
          type: integer
          format: int64
        communicationMethod:
          $ref: '#/components/schemas/CommunicationMethod'
        status:
          $ref: '#/components/schemas/RentStatus'
        createdAt:
          type: string
          format: date-time
    Rents.UpdateRentRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/RentStatus'
        communicationMethod:
          $ref: '#/components/schemas/CommunicationMethod'
    SortInfo:
      type: object
      required:
        - sorted
        - unsorted
        - empty
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
    SortOrder:
      type: object
      required:
        - property
        - direction
      properties:
        property:
          type: string
        direction:
          type: string
          enum:
            - ASC
            - DESC
        ignoreCase:
          type: boolean
        nullHandling:
          type: string
          enum:
            - NATIVE
            - NULLS_FIRST
            - NULLS_LAST
    UnauthorizedException:
      type: object
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
    Users.UpdateMeRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: ^[+]?[0-9]+$
        password:
          type: string
          minLength: 6
    Users.UserMeResponse:
      type: object
      required:
        - id
        - email
        - username
        - phone
        - verified
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        username:
          type: string
        phone:
          type: string
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Users.UserProfileResponse:
      type: object
      required:
        - id
        - username
        - phone
        - verified
        - createdAt
        - ownedListings
        - guestBookingHistory
        - guestRentHistory
        - ownerBookingHistory
        - ownerRentHistory
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        phone:
          type: string
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        ownedListings:
          type: array
          items:
            $ref: '#/components/schemas/Listings.ListingResponse'
        guestBookingHistory:
          type: array
          items:
            $ref: '#/components/schemas/Bookings.BookingResponse'
        guestRentHistory:
          type: array
          items:
            $ref: '#/components/schemas/Rents.RentResponse'
        ownerBookingHistory:
          type: array
          items:
            $ref: '#/components/schemas/Bookings.BookingResponse'
        ownerRentHistory:
          type: array
          items:
            $ref: '#/components/schemas/Rents.RentResponse'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: Bearer
servers:
  - url: http://localhost:8080/api/v1
    description: Local
    variables: {}
