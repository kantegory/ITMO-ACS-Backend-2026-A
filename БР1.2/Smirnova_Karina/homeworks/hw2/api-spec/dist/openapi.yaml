components:
  parameters:
    PageRequestParams.page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    PageRequestParams.size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    PageRequestParams.sort:
      name: sort
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
      explode: false
  schemas:
    Auth.EmailConfirmRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    Auth.LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 1
          format: email
        password:
          type: string
          minLength: 6
    Auth.LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    Auth.RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    Auth.RegisterRequest:
      type: object
      required:
        - email
        - username
        - phone
        - password
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        phone:
          type: string
          pattern: ^[+]?[0-9]+$
        password:
          type: string
          minLength: 6
    Auth.RegisterResponse:
      type: object
      required:
        - id
        - email
        - username
        - phone
        - verified
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        username:
          type: string
        phone:
          type: string
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Auth.TokensResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - accessExpiresIn
        - refreshExpiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum:
            - Bearer
        accessExpiresIn:
          type: string
        refreshExpiresIn:
          type: string
    BookingStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - CANCELED
        - COMPLETED
    Bookings.BookingResponse:
      type: object
      required:
        - id
        - listingId
        - guestId
        - status
        - startDate
        - endDate
        - pricePerNightSnapshot
        - totalAmount
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        listingId:
          type: integer
          format: int64
        guestId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/BookingStatus'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        pricePerNightSnapshot:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
    Bookings.CreateBookingRequest:
      type: object
      required:
        - listingId
        - startDate
        - endDate
      properties:
        listingId:
          type: integer
          format: int64
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
    BusinessException:
      type: object
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
    Chats.ChatResponse:
      type: object
      required:
        - id
        - user1Id
        - user2Id
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        user1Id:
          type: integer
          format: int64
        user2Id:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
    Chats.CreateChatRequest:
      type: object
      required:
        - otherUserId
      properties:
        otherUserId:
          type: integer
          format: int64
    CommunicationMethod:
      type: string
      enum:
        - CHAT
        - CALL
    ConflictException:
      type: object
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: {}
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ForbiddenException:
      type: object
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
    ForbiddenResult:
