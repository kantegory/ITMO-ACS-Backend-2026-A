openapi: 3.0.1
info:
  title: Communication Service API
  version: "1.0.0"
servers:
  - url: http://localhost:8083/api/v1
tags:
  - name: Chats
    description: Чаты
  - name: Messages
    description: Сообщения

paths:
  /chats:
    get:
      tags: [Chats]
      summary: Список чатов для пользователя
      responses:
        '200':
          description: OK
    post:
      tags: [Chats]
      summary: Создать чат
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateChatRequest' }
      responses:
        '201': { description: Created }

  /chats/{chatId}:
    delete:
      tags: [Chats]
      summary: Удалить чат
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: No Content }

  /chats/{chatId}/messages:
    get:
      tags: [Messages]
      summary: Список сообщений в чате
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
    post:
      tags: [Messages]
      summary: Отправить сообщение в чат
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '201':
          description: Created

  /internal/chats:
    post:
      tags: [Chats]
      summary: Внутренний эндпоинт для создания чата между пользователями (Property Service → Communication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user1Id, user2Id, listingId]
              properties:
                user1Id: { type: integer }
                user2Id: { type: integer }
                listingId: { type: integer }
      responses:
        '201': { description: Created }

components:
  schemas:
    CreateChatRequest:
      type: object
      required: [otherUserId, listingId]
      properties:
        otherUserId: { type: integer }
        listingId: { type: integer }
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }