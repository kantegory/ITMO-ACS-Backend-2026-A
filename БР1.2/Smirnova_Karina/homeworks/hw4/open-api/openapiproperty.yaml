openapi: 3.0.1
info:
  title: Property Service API
  version: "1.0.0"
servers:
  - url: http://localhost:8082/api/v1
tags:
  - name: Listings
    description: Объявления и фотографии
  - name: Bookings
    description: Бронирования жилья
  - name: Rents
    description: Заявки на аренду
  - name: Payments
    description: Оплаты и чеки

paths:
  # --- RENTS ---
  /rents:
    get:
      tags: [Rents]
      summary: Список заявок
      operationId: listRents
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [NEW, IN_PROGRESS, CLOSED]
      responses:
        '200':
          description: OK
    post:
      tags: [Rents]
      summary: Создать заявку
      operationId: createRent
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRentRequest' }
      responses:
        '201': { description: Created }

  /rents/{rentId}:
    get:
      tags: [Rents]
      summary: Детали заявки
      parameters:
        - in: path
          name: rentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
    patch:
      tags: [Rents]
      summary: Обновить заявку
      parameters:
        - in: path
          name: rentId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateRentRequest' }
      responses:
        '200': { description: OK }

  /rents/{rentId}/close:
    post:
      tags: [Rents]
      summary: Закрыть заявку
      parameters:
        - in: path
          name: rentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  # --- LISTINGS ---
  /listings:
    get:
      tags: [Listings]
      summary: Поиск объявлений
      operationId: searchListings
      parameters:
        - name: rentMode
          in: query
          required: false
          schema:
            type: string
            enum: [DAILY, MONTHLY]
        - name: houseType
          in: query
          required: false
          schema:
            type: string
            enum: [STUDIO, ONE_ROOM, TWO_ROOM, FOUR_ROOM, FIVE_ROOM, SIX_ROOM]
        - name: priceMin
          in: query
          required: false
          schema:
            type: number
        - name: priceMax
          in: query
          required: false
          schema:
            type: number
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
            format: double
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200': { description: OK }
    post:
      tags: [Listings]
      summary: Создать объявление
      operationId: createListing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateListingRequest' }
      responses:
        '201':
          description: Created

  /listings/{listingId}:
    get:
      tags: [Listings]
      summary: Детали объявления
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
    patch:
      tags: [Listings]
      summary: Обновить объявление
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateListingRequest' }
      responses:
        '200': { description: OK }

  /listings/{listingId}/deactivate:
    post:
      tags: [Listings]
      summary: Деактивировать объявление
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: No Content }

  /listings/{listingId}/activate:
    post:
      tags: [Listings]
      summary: Активировать объявление
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: No Content }

  /listings/{listingId}/photos:
    get:
      tags: [Listings]
      summary: Список фото
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
    post:
      tags: [Listings]
      summary: Добавить фото
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddPhotoRequest' }
      responses:
        '201': { description: Created }

  /listings/{listingId}/photos/{photoId}:
    delete:
      tags: [Listings]
      summary: Удалить фото
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
        - in: path
          name: photoId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: No Content }
    patch:
      tags: [Listings]
      summary: Обновить фото
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: integer }
        - in: path
          name: photoId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePhotoRequest' }
      responses:
        '200': { description: OK }

  # --- BOOKINGS ---
  /bookings:
    get:
      tags: [Bookings]
      summary: Список бронирований
      responses:
        '200': { description: OK }
    post:
      tags: [Bookings]
      summary: Создать бронирование
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookingRequest' }
      responses:
        '201': { description: Created }

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Детали бронирования
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  /bookings/{bookingId}/complete:
    post:
      tags: [Bookings]
      summary: Завершить бронирование
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  /bookings/{bookingId}/cancel:
    post:
      tags: [Bookings]
      summary: Отменить бронирование
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  # --- PAYMENTS ---
  /bookings/{bookingId}/payments:
    get:
      tags: [Payments]
      summary: Список оплат по бронированию
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
    post:
      tags: [Payments]
      summary: Создать оплату по бронированию
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentRequest' }
      responses:
        '201': { description: Created }

  /payments/{paymentId}/retry:
    post:
      tags: [Payments]
      summary: Повторить оплату
      parameters:
        - in: path
          name: paymentId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentRetryRequest' }
      responses:
        '201': { description: Created }

  /payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Детали оплаты
      parameters:
        - in: path
          name: paymentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  /payments/{paymentId}/receipt:
    get:
      tags: [Payments]
      summary: Получить чек
      parameters:
        - in: path
          name: paymentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

components:
  schemas:
    CreateRentRequest:
      type: object
      properties:
        listingId: { type: integer }
        communicationMethod: { type: string, enum: [CHAT, CALL] }
      required: [listingId, communicationMethod]
    UpdateRentRequest:
      type: object
      properties:
        status: { type: string, enum: [NEW, IN_PROGRESS, CLOSED] }
        communicationMethod: { type: string, enum: [CHAT, CALL] }
    ListingResponse:
      type: object
      properties:
        id: { type: integer }
        ownerId: { type: integer }
        address: { type: string }
        title: { type: string }
        houseType: { type: string }
        rentMode: { type: string }
    CreateListingRequest:
      type: object
      properties:
        address: { type: string }
        houseType: { type: string }
        rentMode: { type: string }
        title: { type: string }
      required: [address, houseType, rentMode, title]
    UpdateListingRequest:
      type: object
      properties:
        address: { type: string }
        houseType: { type: string }
        title: { type: string }
    AddPhotoRequest:
      type: object
      properties:
        url: { type: string }
        isMain: { type: boolean }
    UpdatePhotoRequest:
      type: object
      properties:
        isMain: { type: boolean }
    CreateBookingRequest:
      type: object
      properties:
        listingId: { type: integer }
        startDate: { type: string }
        endDate: { type: string }
      required: [listingId, startDate, endDate]
    PaymentRetryRequest:
      type: object
      properties:
        paymentMethod: { type: string }
    RentResponse:
      type: object
      properties:
        id: { type: integer }
        listingId: { type: integer }
        guestId: { type: integer }
        communicationMethod:
          type: string
          enum: [CHAT, CALL]
        status:
          type: string
          enum: [NEW, IN_PROGRESS, CLOSED]
        createdAt:
          type: string
          format: date-time
    BookingResponse:
      type: object
      properties:
        id: { type: integer }
        listingId: { type: integer }
        guestId: { type: integer }
        status:
          type: string
          enum: [PENDING, ACCEPTED, CANCELED, COMPLETED]
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        pricePerNightSnapshot: { type: number }
        totalAmount: { type: number }
        createdAt: { type: string, format: date-time }
    PaymentResponse:
      type: object
      properties:
        id: { type: integer }
        bookingId: { type: integer }
        paymentSystemId: { type: string }
        amount: { type: number }
        commission: { type: number }
        status:
          type: string
          enum: [NEW, SUCCESS, CANCELED, FAILED]
        paymentMethod:
          type: string
          enum: [CARD, SPB]
        failureReason: { type: string }
        createdAt: { type: string, format: date-time }
        paidAt: { type: string, format: date-time }
    PhotoResponse:
      type: object
      properties:
        id: { type: integer }
        listingId: { type: integer }
        url: { type: string }
        uploadedAt: { type: string, format: date-time }
        main: { type: boolean }
    Pageable:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        sort:
          type: array
          items: { type: string }
    PageResponseBookingResponse:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/BookingResponse" }
        pageable: { $ref: "#/components/schemas/PageableInfo" }
        totalElements: { type: integer }
        totalPages: { type: integer }
        last: { type: boolean }
        first: { type: boolean }
        number: { type: integer }
        size: { type: integer }
        numberOfElements: { type: integer }
        empty: { type: boolean }
        sort: { $ref: "#/components/schemas/SortInfo" }
    PageResponseRentResponse:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/RentResponse" }
        pageable: { $ref: "#/components/schemas/PageableInfo" }
        totalElements: { type: integer }
        totalPages: { type: integer }
        last: { type: boolean }
        first: { type: boolean }
        number: { type: integer }
        size: { type: integer }
        numberOfElements: { type: integer }
        empty: { type: boolean }
        sort: { $ref: "#/components/schemas/SortInfo" }
    PageResponsePaymentResponse:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/PaymentResponse" }
        pageable: { $ref: "#/components/schemas/PageableInfo" }
        totalElements: { type: integer }
        totalPages: { type: integer }
        last: { type: boolean }
        first: { type: boolean }
        number: { type: integer }
        size: { type: integer }
        numberOfElements: { type: integer }
        empty: { type: boolean }
        sort: { $ref: "#/components/schemas/SortInfo" }
    PageResponseListingResponse:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/ListingResponse" }
        pageable: { $ref: "#/components/schemas/PageableInfo" }
        totalElements: { type: integer }
        totalPages: { type: integer }
        last: { type: boolean }
        first: { type: boolean }
        number: { type: integer }
        size: { type: integer }
        numberOfElements: { type: integer }
        empty: { type: boolean }
        sort: { $ref: "#/components/schemas/SortInfo" }
    PageableInfo:
      type: object
      properties:
        pageNumber: { type: integer }
        pageSize: { type: integer }
        offset: { type: integer }
        paged: { type: boolean }
        unpaged: { type: boolean }
        sort: { $ref: "#/components/schemas/SortInfo" }
    SortInfo:
      type: object
      properties:
        sorted: { type: boolean }
        unsorted: { type: boolean }
        empty: { type: boolean }
    PaymentReceiptResponse:
      type: object
      properties:
        paymentId: { type: integer }
        bookingId: { type: integer }
        amount: { type: number }
        commission: { type: number }
        paidAt: { type: string, format: date-time }
        paymentMethod:
          type: string
          enum: [CARD, SPB]