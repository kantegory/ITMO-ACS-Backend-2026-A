openapi: 3.0.1
info:
  title: Notification Service API
  version: "1.0.0"
  description: |
    Notification Service слушает события из RabbitMQ (EventBus).
    Ниже указаны контракты событий, которые сервис обрабатывает.
    Это **не публичные REST API**, а описание внутренних событийных сообщений.

servers:
  - url: http://localhost:8084/api/v1
tags:
  - name: Notifications
    description: Monitoring endpoints

paths:
  /internal/notifications/health:
    get:
      tags: [Notifications]
      summary: Health check
      responses:
        '200':
          description: OK

x-events:
  - name: BookingPaid
    description: |
      Не публичный API!  
      Event, публикуемый Property Service после успешного платежа бронирования.
      Notification Service по этому событию отправляет email owner'у — "ваш объект арендован".
    payload:
      type: object
      properties:
        bookingId: { type: integer }
        ownerEmail: { type: string, format: email }
        ownerId: { type: integer }
        listingTitle: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
      required:
        - bookingId
        - ownerEmail
        - ownerId
        - listingTitle
        - startDate
        - endDate

  - name: RentCreated
    description: |
      Не публичный API!  
      Event, публикуемый Property Service при создании заявки на долгосрочную аренду.
      Notification Service по этому событию отправляет email owner'у — "ваш объект хотят арендовать".
    payload:
      type: object
      properties:
        rentId: { type: integer }
        ownerEmail: { type: string, format: email }
        ownerId: { type: integer }
        listingTitle: { type: string }
      required:
        - rentId
        - ownerEmail
        - ownerId
        - listingTitle
