worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  upstream user_service {
    server user-service:8080;
  }

  upstream property_service {
    server property-service:8080;
  }

  upstream communication_service {
    server communication-service:8080;
  }

  server {
    listen 80;
    absolute_redirect off;

    location /api/v1/auth {
      proxy_pass http://user_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/users {
      proxy_pass http://user_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/listings {
      proxy_pass http://property_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/rents {
      proxy_pass http://property_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/bookings {
      proxy_pass http://property_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/payments {
      proxy_pass http://property_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/chats {
      proxy_pass http://communication_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/internal/chats {
      proxy_pass http://communication_service;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/user/ {
      rewrite ^/docs/user/(.*)$ /api/v1/$1 break;
      proxy_pass http://user_service;
      proxy_redirect ~^/api/v1/(.*)$ /docs/user/$1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Port 8080;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /docs/user;
    }

    location /docs/property/ {
      rewrite ^/docs/property/(.*)$ /api/v1/$1 break;
      proxy_pass http://property_service;
      proxy_redirect ~^/api/v1/(.*)$ /docs/property/$1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Port 8080;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /docs/property;
    }

    location /docs/communication/ {
      rewrite ^/docs/communication/(.*)$ /api/v1/$1 break;
      proxy_pass http://communication_service;
      proxy_redirect ~^/api/v1/(.*)$ /docs/communication/$1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Port 8080;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /docs/communication;
    }

    location = /api/v1/swagger-ui.html {
      return 302 /docs/property/swagger-ui.html;
    }

    location = /v3/api-docs {
      return 302 /docs/property/api-docs;
    }

    location = /docs/user/swagger-ui.html {
      return 302 /docs/user/swagger-ui/index.html?configUrl=/docs/user/api-docs/swagger-config;
    }

    location = /docs/property/swagger-ui.html {
      return 302 /docs/property/swagger-ui/index.html?configUrl=/docs/property/api-docs/swagger-config;
    }

    location = /docs/communication/swagger-ui.html {
      return 302 /docs/communication/swagger-ui/index.html?configUrl=/docs/communication/api-docs/swagger-config;
    }

    location / {
      return 404;
    }
  }
}
