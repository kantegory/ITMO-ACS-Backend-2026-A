spring:
  application:
    name: ${SERVICE_NAME:renting-service}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:renting_service}
    username: ${DB_USER:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    queryConfigEnabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-secret-key-at-least-32-chars-long}
    access-ttl: PT15M
    refresh-ttl: P7D
  services:
    user-service-base-url: ${USER_SERVICE_BASE_URL:http://localhost:8080/api/v1}
    property-service-base-url: ${PROPERTY_SERVICE_BASE_URL:http://localhost:8080/api/v1}
    communication-service-base-url: ${COMMUNICATION_SERVICE_BASE_URL:http://localhost:8080/api/v1}
  payment:
    commission-percent: ${PAYMENT_COMMISSION_PERCENT:5}
    mock-success-rate: ${PAYMENT_MOCK_SUCCESS_RATE:0.9}

logging:
  level:
    org.renting.rentingservice: INFO
    org.springframework.security: WARN
