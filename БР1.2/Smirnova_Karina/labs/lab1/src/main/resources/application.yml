spring:
  application:
    name: RentingService
  docker:
    compose:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/renting_service
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P7D}
  payment:
    commission-percent: ${PAYMENT_COMMISSION_PERCENT:5}
    mock-success-rate: ${PAYMENT_MOCK_SUCCESS_RATE:0.9}

logging:
  level:
    org.renting.rentingservice: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
