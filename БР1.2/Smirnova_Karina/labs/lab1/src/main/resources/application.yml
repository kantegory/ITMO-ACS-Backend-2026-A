spring:
  application:
    name: RentingService
  docker:
    compose:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/renting_service
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}

server:
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: PT15M
    refresh-ttl: P7D
  payment:
    commission-percent: ${PAYMENT_COMMISSION_PERCENT}
    mock-success-rate: ${PAYMENT_MOCK_SUCCESS_RATE}

logging:
  level:
    org.renting.rentingservice: INFO
    org.springframework.security: WARN
