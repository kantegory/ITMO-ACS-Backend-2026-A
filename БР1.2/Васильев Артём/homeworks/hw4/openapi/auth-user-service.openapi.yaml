openapi: 3.0.3
info:
  title: Auth/User Service API
  version: 1.0.0
  description: >
    API сервиса пользователей и авторизации. Сервис владеет таблицей users в users_db
    и является source of truth для учетных записей, ролей и JWT.
servers:
  - url: /api/v1
    description: Public API
tags:
  - name: Auth
  - name: Users
  - name: InternalUsers
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      description: Создает пользователя с ролью APPLICANT или EMPLOYER.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      description: Проверяет email и пароль, возвращает JWT.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная авторизация.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me:
    get:
      tags: [Users]
      summary: Получить текущего пользователя
      description: Возвращает профиль пользователя из users_db по user_id из JWT.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Профиль пользователя.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Обновить текущего пользователя
      description: Обновляет базовые поля профиля пользователя.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Профиль обновлен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/v1/users/{user_id}:
    get:
      tags: [InternalUsers]
      summary: Получить пользователя для межсервисных проверок
      description: Internal endpoint. Возвращает минимальные данные пользователя. user_id используется другими сервисами как external ID, а не как FK.
      operationId: getInternalUser
      security:
        - serviceTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Internal user view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: External ID пользователя из Auth/User Service.
  responses:
    ValidationError:
      description: ValidationError.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    Unauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: User not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServiceUnavailableError'
  schemas:
    UserRole:
      type: string
      enum: [ADMIN, APPLICANT, EMPLOYER]
    User:
      type: object
      required: [id, role, first_name, last_name, email, password, phone, is_verified, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        password:
          type: string
          description: Хэш пароля. Не возвращается в public API.
        phone:
          type: string
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserPublic:
      description: Public-представление пользователя без password.
      type: object
      required: [id, role, first_name, last_name, email, phone, is_verified, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      required: [role, first_name, last_name, email, password, phone]
      properties:
        role:
          type: string
          enum: [APPLICANT, EMPLOYER]
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        middle_name:
          type: string
          maxLength: 255
          nullable: true
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        phone:
          type: string
          maxLength: 50
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserPublic'
    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        middle_name:
          type: string
          maxLength: 255
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 50
    InternalUserResponse:
      type: object
      required: [id, role, email, is_verified]
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/UserRole'
        email:
          type: string
          format: email
        is_verified:
          type: boolean
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    ServiceUnavailableError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Service unavailable
