
openapi: 3.0.3
info:
  title: API сервиса поиска работы
  version: 1.0.0
  description: >
    Спецификация REST API, спроектированная на основе ER-диаграммы базы данных
    сервиса поиска работы. API покрывает сценарии регистрации и входа,
    управления профилем пользователя и работодателя, работы с резюме,
    вакансиями, откликами, избранными вакансиями и историей просмотров.
servers:
  - url: http://localhost:8000/api/v1
    description: Локальный сервер

tags:
  - name: Auth
    description: Аутентификация и авторизация
  - name: Users
    description: Профиль текущего пользователя
  - name: Companies
    description: Компании работодателей
  - name: EmployerProfiles
    description: Профили работодателей
  - name: Dictionaries
    description: Справочники предметной области
  - name: Resumes
    description: Резюме соискателей
  - name: Vacancies
    description: Вакансии
  - name: Applications
    description: Отклики на вакансии
  - name: Favorites
    description: Избранные вакансии
  - name: VacancyViews
    description: История просмотров вакансий

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      description: Создает нового пользователя сервиса с ролью APPLICANT или EMPLOYER.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      description: Выполняет аутентификацию пользователя по email и паролю.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Пользователь успешно авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me:
    get:
      tags: [Users]
      summary: Получение профиля текущего пользователя
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Профиль текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags: [Users]
      summary: Обновление профиля текущего пользователя
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Профиль успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /companies:
    post:
      tags: [Companies]
      summary: Создание компании
      description: Создает карточку компании работодателя.
      operationId: createCompany
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreateRequest'
      responses:
        '201':
          description: Компания успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /companies/{company_id}:
    parameters:
      - $ref: '#/components/parameters/CompanyId'
    get:
      tags: [Companies]
      summary: Получение компании
      operationId: getCompanyById
      responses:
        '200':
          description: Данные компании
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Companies]
      summary: Обновление компании
      description: Обновляет компанию, к которой привязан текущий работодатель.
      operationId: updateCompany
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUpdateRequest'
      responses:
        '200':
          description: Компания успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /employer-profiles:
    post:
      tags: [EmployerProfiles]
      summary: Создание профиля работодателя
      operationId: createEmployerProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileCreateRequest'
      responses:
        '201':
          description: Профиль работодателя успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /employer-profiles/me:
    get:
      tags: [EmployerProfiles]
      summary: Получение профиля текущего работодателя
      operationId: getCurrentEmployerProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Профиль работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [EmployerProfiles]
      summary: Обновление профиля текущего работодателя
      operationId: updateCurrentEmployerProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployerProfileUpdateRequest'
      responses:
        '200':
          description: Профиль работодателя успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /industries:
    get:
      tags: [Dictionaries]
      summary: Получение списка отраслей
      operationId: listIndustries
      responses:
        '200':
          description: Список отраслей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryListResponse'

  /experience-levels:
    get:
      tags: [Dictionaries]
      summary: Получение списка уровней опыта
      operationId: listExperienceLevels
      responses:
        '200':
          description: Список уровней опыта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperienceLevelListResponse'

  /resumes:
    get:
      tags: [Resumes]
      summary: Получение списка резюме текущего пользователя
      operationId: listCurrentUserResumes
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Resumes]
      summary: Создание резюме
      operationId: createResume
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeCreateRequest'
      responses:
        '201':
          description: Резюме успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /resumes/{resume_id}:
    parameters:
      - $ref: '#/components/parameters/ResumeId'
    get:
      tags: [Resumes]
      summary: Получение резюме по идентификатору
      operationId: getResumeById
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Resumes]
      summary: Обновление резюме
      operationId: updateResume
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeUpdateRequest'
      responses:
        '200':
          description: Резюме успешно обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Resumes]
      summary: Удаление резюме
      operationId: deleteResume
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Резюме успешно удалено
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies:
    get:
      tags: [Vacancies]
      summary: Получение списка опубликованных вакансий
      description: >
        Возвращает опубликованные вакансии с поддержкой пагинации и фильтрации
        по параметрам, предусмотренным предметной областью.
      operationId: listVacancies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/IndustryIdQuery'
        - $ref: '#/components/parameters/ExperienceLevelIdQuery'
        - $ref: '#/components/parameters/EmploymentTypeQuery'
        - $ref: '#/components/parameters/WorkFormatQuery'
        - $ref: '#/components/parameters/SalaryFromQuery'
        - $ref: '#/components/parameters/SalaryToQuery'
      responses:
        '200':
          description: Список вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Vacancies]
      summary: Создание вакансии
      operationId: createVacancy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyCreateRequest'
      responses:
        '201':
          description: Вакансия успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/my:
    get:
      tags: [Vacancies]
      summary: Получение списка вакансий текущего работодателя
      operationId: listCurrentEmployerVacancies
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/IndustryIdQuery'
        - $ref: '#/components/parameters/ExperienceLevelIdQuery'
        - $ref: '#/components/parameters/EmploymentTypeQuery'
        - $ref: '#/components/parameters/WorkFormatQuery'
        - $ref: '#/components/parameters/IsPublishedQuery'
      responses:
        '200':
          description: Список вакансий работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /vacancies/{vacancy_id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    get:
      tags: [Vacancies]
      summary: Получение вакансии по идентификатору
      description: Возвращает опубликованную вакансию по идентификатору.
      operationId: getVacancyById
      responses:
        '200':
          description: Данные вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Vacancies]
      summary: Обновление вакансии
      operationId: updateVacancy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyUpdateRequest'
      responses:
        '200':
          description: Вакансия успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Vacancies]
      summary: Удаление вакансии
      operationId: deleteVacancy
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Вакансия успешно удалена
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancies/{vacancy_id}/applications:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [Applications]
      summary: Создание отклика на вакансию
      operationId: createApplication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
      responses:
        '201':
          description: Отклик успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
    get:
      tags: [Applications]
      summary: Получение откликов на вакансию работодателя
      operationId: listVacancyApplications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список откликов по вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /applications/my:
    get:
      tags: [Applications]
      summary: Получение списка откликов текущего пользователя
      operationId: listCurrentUserApplications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список откликов пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /applications/{application_id}/status:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    patch:
      tags: [Applications]
      summary: Изменение статуса отклика
      operationId: updateApplicationStatus
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationStatusUpdateRequest'
      responses:
        '200':
          description: Статус отклика успешно изменен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /favorites:
    get:
      tags: [Favorites]
      summary: Получение списка избранных вакансий
      operationId: listFavoriteVacancies
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Список избранных вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteVacancyListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /favorites/{vacancy_id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [Favorites]
      summary: Добавление вакансии в избранное
      operationId: addVacancyToFavorites
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Вакансия добавлена в избранное
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteVacancyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
    delete:
      tags: [Favorites]
      summary: Удаление вакансии из избранного
      operationId: removeVacancyFromFavorites
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Вакансия удалена из избранного
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /vacancy-views:
    get:
      tags: [VacancyViews]
      summary: Получение истории просмотров вакансий текущего пользователя
      operationId: listCurrentUserVacancyViews
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: История просмотров вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyViewListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /vacancies/{vacancy_id}/views:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      tags: [VacancyViews]
      summary: Фиксация просмотра вакансии
      operationId: createVacancyView
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Просмотр вакансии успешно зафиксирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyViewResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CompanyId:
      name: company_id
      in: path
      required: true
      description: Идентификатор компании
      schema:
        type: string
        format: uuid
    ResumeId:
      name: resume_id
      in: path
      required: true
      description: Идентификатор резюме
      schema:
        type: string
        format: uuid
    VacancyId:
      name: vacancy_id
      in: path
      required: true
      description: Идентификатор вакансии
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: application_id
      in: path
      required: true
      description: Идентификатор отклика
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      description: Номер страницы
      schema:
        type: integer
