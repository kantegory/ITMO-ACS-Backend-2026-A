openapi: 3.0.3
info:
  title: Dictionary Service API
  version: 1.0.0
  description: Published industries and experience levels.
servers:
  - url: http://localhost:3003/api/v1
tags:
  - name: Dictionaries
paths:
  /industries:
    get:
      tags: [Dictionaries]
      summary: List published industries
      responses:
        '200':
          description: Industry list
  /experience-levels:
    get:
      tags: [Dictionaries]
      summary: List published experience levels
      responses:
        '200':
          description: Experience level list
  /industries/{industry_id}:
    get:
      tags: [Dictionaries]
      summary: Get published industry
      parameters:
        - name: industry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Industry found
  /experience-levels/{experience_level_id}:
    get:
      tags: [Dictionaries]
      summary: Get published experience level
      parameters:
        - name: experience_level_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Experience level found
