$kind: http-request
url: "{{baseUrl}}/vacancies/my?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{employerToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and created vacancy is in employer list', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j).to.include.keys(['items','meta']); const found =
      j.items.find((x) => x.id === pm.collectionVariables.get('vacancyId'));
      pm.expect(found).to.exist;
      pm.expect(found.title).to.eql(pm.collectionVariables.get('vacancyTitle'));
      });
    language: text/javascript
order: 8000
