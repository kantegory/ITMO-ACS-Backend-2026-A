$kind: http-request
url: "{{baseUrl}}/favorites?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{applicantToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and deleted favorite is absent', function () {
      pm.response.to.have.status(200); const j = pm.response.json(); const found
      = j.items.find((x) => x.vacancy_id ===
      pm.collectionVariables.get('vacancyId')); pm.expect(found).to.not.exist;
      });
    language: text/javascript
order: 23000
