$kind: http-request
url: "{{baseUrl}}/vacancies/{{vacancyId}}/views"
method: POST
auth:
  type: bearer
  credentials:
    token: "{{applicantToken}}"
scripts:
  - type: afterResponse
    code: pm.test('201 and vacancy view links applicant to vacancy', function () {
      pm.response.to.have.status(201); const j = pm.response.json();
      pm.expect(j).to.include.keys(['id','user_id','vacancy_id','created_at']);
      pm.expect(j.user_id).to.eql(pm.collectionVariables.get('applicantUserId'));
      pm.expect(j.vacancy_id).to.eql(pm.collectionVariables.get('vacancyId'));
      pm.collectionVariables.set('viewId', j.id); });
    language: text/javascript
order: 14000
