$kind: http-request
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "role": "APPLICANT",
      "first_name": "Alice",
      "last_name": "Applicant",
      "email": "{{applicantEmail}}",
      "password": "{{password}}",
      "phone": "+79990000102"
    }
scripts:
  - type: afterResponse
    code: pm.test('201 and applicant user fields', function () {
      pm.response.to.have.status(201); const j = pm.response.json();
      pm.expect(j).to.include.keys(['id','role','first_name','last_name','email','phone']);
      pm.expect(j.role).to.eql('APPLICANT');
      pm.expect(j.email).to.eql(pm.collectionVariables.get('applicantEmail'));
      pm.collectionVariables.set('applicantUserId', j.id); });
    language: text/javascript
order: 9000
