$kind: http-request
url: "{{baseUrl}}/experience-levels"
method: GET
scripts:
  - type: afterResponse
    code: pm.test('200 and first experience level saved', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j.items).to.be.an('array').and.not.empty;
      pm.expect(j.items[0]).to.include.keys(['id','title','is_published']);
      pm.collectionVariables.set('experienceLevelId', j.items[0].id); });
    language: text/javascript
order: 6000
