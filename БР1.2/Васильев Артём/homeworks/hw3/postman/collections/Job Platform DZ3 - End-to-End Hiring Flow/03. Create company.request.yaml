$kind: http-request
url: "{{baseUrl}}/companies"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "title": "{{companyTitle}}",
      "description": "Company created by Postman DZ3 scenario.",
      "website": "https://dz3-example.com",
      "industry_text": "IT",
      "address": "Moscow, Postman street 3",
      "employee_count": 42
    }
auth:
  type: bearer
  credentials:
    token: "{{employerToken}}"
scripts:
  - type: afterResponse
    code: pm.test('201 and company fields', function () {
      pm.response.to.have.status(201); const j = pm.response.json();
      pm.expect(j).to.include.keys(['id','title','employee_count','created_at','updated_at']);
      pm.expect(j.title).to.eql(pm.collectionVariables.get('companyTitle'));
      pm.expect(j.employee_count).to.eql(42);
      pm.collectionVariables.set('companyId', j.id); });
    language: text/javascript
order: 3000
