$kind: http-request
url: "{{baseUrl}}/applications/my?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{applicantToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and applicant sees INVITED status', function () {
      pm.response.to.have.status(200); const j = pm.response.json(); const found
      = j.items.find((x) => x.id ===
      pm.collectionVariables.get('applicationId')); pm.expect(found).to.exist;
      pm.expect(found.status).to.eql('INVITED'); });
    language: text/javascript
order: 21000
