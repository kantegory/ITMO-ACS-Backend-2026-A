$kind: http-request
url: "{{baseUrl}}/vacancies/{{vacancyId}}/applications?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{employerToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and employer sees application for own vacancy', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j).to.include.keys(['items','meta']); const found =
      j.items.find((x) => x.id === pm.collectionVariables.get('applicationId'));
      pm.expect(found).to.exist;
      pm.expect(found.vacancy_id).to.eql(pm.collectionVariables.get('vacancyId'));
      pm.expect(found.resume_id).to.eql(pm.collectionVariables.get('resumeId'));
      });
    language: text/javascript
order: 19000
