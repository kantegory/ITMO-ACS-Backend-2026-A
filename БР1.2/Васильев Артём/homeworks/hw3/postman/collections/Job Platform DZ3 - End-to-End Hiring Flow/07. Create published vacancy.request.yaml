$kind: http-request
url: "{{baseUrl}}/vacancies"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "company_id": "{{companyId}}",
      "employer_profile_id": "{{employerProfileId}}",
      "industry_id": "{{industryId}}",
      "experience_level_id": "{{experienceLevelId}}",
      "title": "{{vacancyTitle}}",
      "description": "Develop backend services for a job search platform.",
      "requirements": "TypeScript, Node.js, PostgreSQL, REST API",
      "responsibilities": "Implement API endpoints, review code and improve reliability.",
      "salary_from": 180000,
      "salary_to": 260000,
      "city": "{{vacancyCity}}",
      "employment_type": "FULL_TIME",
      "work_format": "HYBRID",
      "is_published": true
    }
auth:
  type: bearer
  credentials:
    token: "{{employerToken}}"
scripts:
  - type: afterResponse
    code: pm.test('201 and vacancy links company/profile/dictionaries', function ()
      { pm.response.to.have.status(201); const j = pm.response.json();
      pm.expect(j).to.include.keys(['id','company_id','employer_profile_id','industry_id','experience_level_id','title','salary_from','salary_to','city','employment_type','work_format','is_published']);
      pm.expect(j.company_id).to.eql(pm.collectionVariables.get('companyId'));
      pm.expect(j.employer_profile_id).to.eql(pm.collectionVariables.get('employerProfileId'));
      pm.expect(j.industry_id).to.eql(pm.collectionVariables.get('industryId'));
      pm.expect(j.experience_level_id).to.eql(pm.collectionVariables.get('experienceLevelId'));
      pm.expect(j.is_published).to.eql(true);
      pm.expect(Number(j.salary_to)).to.be.at.least(Number(j.salary_from));
      pm.collectionVariables.set('vacancyId', j.id); });
    language: text/javascript
order: 7000
