$kind: http-request
url: "{{baseUrl}}/employer-profiles"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "company_id": "{{companyId}}",
      "position": "HR Manager"
    }
auth:
  type: bearer
  credentials:
    token: "{{employerToken}}"
scripts:
  - type: afterResponse
    code: pm.test('201 and profile links employer to company', function () {
      pm.response.to.have.status(201); const j = pm.response.json();
      pm.expect(j).to.include.keys(['id','user_id','company_id','position','created_at','updated_at']);
      pm.expect(j.user_id).to.eql(pm.collectionVariables.get('employerUserId'));
      pm.expect(j.company_id).to.eql(pm.collectionVariables.get('companyId'));
      pm.collectionVariables.set('employerProfileId', j.id); });
    language: text/javascript
order: 4000
