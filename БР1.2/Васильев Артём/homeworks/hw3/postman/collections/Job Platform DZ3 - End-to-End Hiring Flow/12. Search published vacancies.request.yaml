$kind: http-request
url: "{{baseUrl}}/vacancies?search=Backend&city={{vacancyCity}}&employment_type\
  =FULL_TIME&work_format=HYBRID&page=1&limit=20"
method: GET
queryParams:
  search: Backend
  city: "{{vacancyCity}}"
  employment_type: FULL_TIME
  work_format: HYBRID
  page: "1"
  limit: "20"
scripts:
  - type: afterResponse
    code: pm.test('200 and created published vacancy appears in filtered search',
      function () { pm.response.to.have.status(200); const j =
      pm.response.json(); pm.expect(j).to.include.keys(['items','meta']); const
      found = j.items.find((x) => x.id ===
      pm.collectionVariables.get('vacancyId')); pm.expect(found).to.exist;
      pm.expect(found.city).to.eql(pm.collectionVariables.get('vacancyCity'));
      pm.expect(found.is_published).to.eql(true); });
    language: text/javascript
order: 12000
