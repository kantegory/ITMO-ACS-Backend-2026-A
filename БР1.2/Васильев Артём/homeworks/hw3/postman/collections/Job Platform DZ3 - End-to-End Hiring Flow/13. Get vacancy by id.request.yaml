$kind: http-request
url: "{{baseUrl}}/vacancies/{{vacancyId}}"
method: GET
scripts:
  - type: afterResponse
    code: pm.test('200 and vacancy details match created vacancy', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j.id).to.eql(pm.collectionVariables.get('vacancyId'));
      pm.expect(j.title).to.eql(pm.collectionVariables.get('vacancyTitle'));
      pm.expect(j.company_id).to.eql(pm.collectionVariables.get('companyId'));
      pm.expect(j.is_published).to.eql(true); });
    language: text/javascript
order: 13000
