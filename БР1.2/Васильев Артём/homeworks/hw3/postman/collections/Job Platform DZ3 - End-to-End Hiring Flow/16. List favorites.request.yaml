$kind: http-request
url: "{{baseUrl}}/favorites?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{applicantToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and created favorite is present', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j).to.include.keys(['items','meta']); const found =
      j.items.find((x) => x.vacancy_id ===
      pm.collectionVariables.get('vacancyId')); pm.expect(found).to.exist;
      pm.expect(found.id).to.eql(pm.collectionVariables.get('favoriteId')); });
    language: text/javascript
order: 16000
