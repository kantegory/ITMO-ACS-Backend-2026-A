$kind: http-request
url: "{{baseUrl}}/applications/my?page=1&limit=20"
method: GET
queryParams:
  page: "1"
  limit: "20"
auth:
  type: bearer
  credentials:
    token: "{{applicantToken}}"
scripts:
  - type: afterResponse
    code: pm.test('200 and applicant sees PENDING application', function () {
      pm.response.to.have.status(200); const j = pm.response.json();
      pm.expect(j).to.include.keys(['items','meta']); const found =
      j.items.find((x) => x.id === pm.collectionVariables.get('applicationId'));
      pm.expect(found).to.exist; pm.expect(found.status).to.eql('PENDING'); });
    language: text/javascript
order: 18000
