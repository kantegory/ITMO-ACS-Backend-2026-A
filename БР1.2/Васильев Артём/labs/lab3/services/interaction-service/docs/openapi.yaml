openapi: 3.0.3
info:
  title: Interaction Service API
  version: 1.0.0
  description: Favorite vacancies, vacancy views and interaction counters.
servers:
  - url: http://localhost:3007/api/v1
tags:
  - name: Favorites
  - name: VacancyViews
  - name: Internal
paths:
  /favorites:
    get:
      tags: [Favorites]
      summary: List current user favorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorite list
  /favorites/{vacancy_id}:
    post:
      tags: [Favorites]
      summary: Add vacancy to favorites
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/vacancyId'
      responses:
        '201':
          description: Favorite created
    delete:
      tags: [Favorites]
      summary: Remove vacancy from favorites
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/vacancyId'
      responses:
        '204':
          description: Favorite removed
  /vacancy-views:
    get:
      tags: [VacancyViews]
      summary: List current user vacancy views
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vacancy view list
  /vacancies/{vacancy_id}/views:
    post:
      tags: [VacancyViews]
      summary: Record vacancy view
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/vacancyId'
      responses:
        '201':
          description: Vacancy view recorded
  /internal/v1/vacancies/{vacancy_id}/favorites/count:
    get:
      tags: [Internal]
      summary: Count vacancy favorites
      security:
        - serviceToken: []
      parameters:
        - $ref: '#/components/parameters/vacancyId'
      responses:
        '200':
          description: Favorites count
  /internal/v1/vacancies/{vacancy_id}/views/count:
    get:
      tags: [Internal]
      summary: Count vacancy views
      security:
        - serviceToken: []
      parameters:
        - $ref: '#/components/parameters/vacancyId'
      responses:
        '200':
          description: Views count
  /internal/v1/users/{user_id}/favorites:
    get:
      tags: [Internal]
      summary: List user favorites
      security:
        - serviceToken: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User favorites
components:
  parameters:
    vacancyId:
      name: vacancy_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceToken:
      type: apiKey
      in: header
      name: X-Service-Token
