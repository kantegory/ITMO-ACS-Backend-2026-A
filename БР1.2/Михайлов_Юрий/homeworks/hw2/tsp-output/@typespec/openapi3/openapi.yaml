paths:
  /attributes:
    post:
      operationId: AttributesApi_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int32
                required:
                  - id
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - attributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                property_id:
                  type: integer
                  format: int32
                floor:
                  type: integer
                  format: int32
                building_type:
                  type: string
                bathrooms_count:
                  type: integer
                  format: int32
                has_washing_machine:
                  type: boolean
                view_type:
                  type: string
                has_kitchen:
                  type: boolean
              required:
                - property_id
                - floor
                - building_type
                - bathrooms_count
                - has_washing_machine
                - view_type
                - has_kitchen
