components:
  schemas:
    BadRequest:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/Error'
    Booking:
      type: object
      required:
        - id
        - property_id
        - tenant_id
        - start_date
        - end_date
        - status
        - details
      properties:
        id:
          type: integer
          format: int32
        property_id:
          type: integer
          format: int32
        tenant_id:
          type: integer
          format: int32
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
        details:
          type: string
    BookingRequest:
      type: object
      required:
        - id
        - property_id
        - tenant_id
        - creation_time
        - comments
      properties:
        id:
          type: integer
          format: int32
        property_id:
          type: integer
          format: int32
        tenant_id:
          type: integer
          format: int32
        creation_time:
          type: string
          format: date-time
        comments:
          type: string
    Conversation:
      type: object
      required:
        - id
        - user1_id
        - user2_id
        - property_id
      properties:
        id:
          type: integer
          format: int32
        user1_id:
          type: integer
          format: int32
        user2_id:
          type: integer
          format: int32
        property_id:
          type: integer
          format: int32
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    Forbidden:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/Error'
    Location:
      type: object
      required:
        - address
        - city
        - country
        - latitude
        - longitude
      properties:
        address:
          type: string
        city:
          type: string
        country:
