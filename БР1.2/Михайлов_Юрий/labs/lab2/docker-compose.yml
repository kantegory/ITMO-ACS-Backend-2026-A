version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rental-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rental-network


volumes:
  rabbitmq_data:

networks:
  rental-network:
    driver: bridge