components:
  schemas:
    ActionSuccessResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    AuthPayload:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        tokens:
          $ref: '#/components/schemas/AuthTokenPayload'
    AuthTokenPayload:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          format: int32
    AuthUser:
      type: object
      required:
        - id
        - role
        - firstName
        - lastName
        - email
        - phone
        - isVerified
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        isVerified:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
    AvailableTable:
      type: object
      required:
        - id
        - tableNumber
        - capacity
      properties:
        id:
          type: string
        tableNumber:
          type: string
        capacity:
          type: integer
          format: int32
