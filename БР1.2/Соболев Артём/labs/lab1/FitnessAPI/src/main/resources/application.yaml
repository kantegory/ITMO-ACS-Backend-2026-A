spring:
  application:
    name: fitnessAPI

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: ${MAIL_HOST}
    port: 587
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true

server:
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    operationsSorter: method
    tags-sorter: alpha
    doc-expansion: list
    display-request-duration: true
    try-it-out-enabled: true
    with-credentials: true

app:
  i18n:
    basename: classpath:i18n/messages/messages,classpath:i18n/errors/errors,classpath:i18n/validations/validations
    encoding: UTF-8
    fallback-to-system-locale: false
    cache-seconds: 0
  security:
    cookie:
      secure: false
      max-age: ${REFRESH_TTL}
      same-site: Lax
      cookie-name: refresh_token
      path: /api/v1/auth
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 15m
    refresh-token:
      ttl: ${REFRESH_TTL}
      pepper: ${REFRESH_PEPPER}
      length: 64
    password-reset-token:
      ttl: ${PASSWORD_RESET_TTL}
      pepper: ${PASSWORD_RESET_PEPPER}
      length: 32
    email-verification-token:
      ttl: ${EMAIL_VERIFICATION_TTL}
      pepper: ${EMAIL_VERIFICATION_PEPPER}
      length: 32
    session:
      max-sessions: 5
