services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: ${DB_USERNAME:-fitness}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fitness}
    ports:
      - "15433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d fitness"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    environment:
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      REFRESH_TTL: ${REFRESH_TTL:-30d}
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  media-service:
    build:
      context: .
      args:
        SERVICE: media-service
    environment:
      MEDIA_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/media_service
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "127.0.0.1:8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  training-service:
    build:
      context: .
      args:
        SERVICE: training-service
    environment:
      TRAINING_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/training_service
      MEDIA_SERVICE_BASE_URL: http://media-service:8080/api/v1
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "127.0.0.1:8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media-service:
        condition: service_started

  blog-service:
    build:
      context: .
      args:
        SERVICE: blog-service
    environment:
      BLOG_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/blog_service
      MEDIA_SERVICE_BASE_URL: http://media-service:8080/api/v1
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "127.0.0.1:8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media-service:
        condition: service_started

  progress-service:
    build:
      context: .
      args:
        SERVICE: progress-service
    environment:
      PROGRESS_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/progress_service
      TRAINING_SERVICE_BASE_URL: http://training-service:8080/api/v1
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      training-service:
        condition: service_started

  user-training-interaction-service:
    build:
      context: .
      args:
        SERVICE: user-training-interaction-service
    environment:
      USER_TRAINING_INTERACTION_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/user_training_interaction_service
      TRAINING_SERVICE_BASE_URL: http://training-service:8080/api/v1
      DB_USERNAME: ${DB_USERNAME:-fitness}
      DB_PASSWORD: ${DB_PASSWORD:-fitness}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REFRESH_PEPPER: ${REFRESH_PEPPER:-dev-refresh-pepper}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-fitness}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fitness}
    ports:
      - "127.0.0.1:8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      training-service:
        condition: service_started

volumes:
  postgres-data:
