spring:
  config:
    import: optional:classpath:common-lib-application.yaml
  application:
    name: media-service
  datasource:
    url: ${MEDIA_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/media_service}
    username: ${MEDIA_SERVICE_DB_USERNAME:${DB_USERNAME:postgres}}
    password: ${MEDIA_SERVICE_DB_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:fitness}
    password: ${RABBITMQ_PASSWORD:fitness}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
