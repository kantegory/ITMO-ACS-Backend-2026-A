openapi: 3.0.3
info:
  title: Fitness API Microservices
  version: 1.0.0
  description: >
    Агрегированная OpenAPI-спецификация микросервисной версии платформы
    фитнес-тренировок. Каждый путь привязан к тому сервису и порту, на котором
    он опубликован в docker-compose.yml.
servers:
  - url: http://localhost:8081/api/v1
    description: user-service
  - url: http://localhost:8082/api/v1
    description: media-service
  - url: http://localhost:8083/api/v1
    description: training-service
  - url: http://localhost:8084/api/v1
    description: blog-service
  - url: http://localhost:8085/api/v1
    description: progress-service
tags:
  - name: Auth
    description: user-service
  - name: Profile
    description: user-service
  - name: Video
    description: media-service
  - name: Exercise
    description: training-service
  - name: Training
    description: training-service
  - name: Training Relation
    description: training-service
  - name: Tag
    description: training-service
  - name: Type
    description: training-service
  - name: Article
    description: blog-service
  - name: Category
    description: blog-service
  - name: Article Comment
    description: blog-service
  - name: Progress
    description: progress-service
  - name: Favourite Training
    description: progress-service
  - name: Training Rating
    description: progress-service
  - name: Training Session
    description: progress-service
  - name: Training Session Exercise
    description: progress-service
security:
  - bearerAuth: []
paths:
  /auth/register:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    post:
      tags: [Auth]
      operationId: register
      summary: Register new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
      responses:
        "201":
          description: Account registered
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/login:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    post:
      tags: [Auth]
      operationId: login
      summary: Log in to account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/refresh:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh token
      security: []
      parameters:
        - $ref: "#/components/parameters/RefreshTokenCookie"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          headers:
            Set-Cookie:
              $ref: "#/components/headers/RefreshCookie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /auth/logout:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out current session
      security: []
      parameters:
        - $ref: "#/components/parameters/RefreshTokenCookie"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Logged out
          headers:
            Set-Cookie:
              $ref: "#/components/headers/DeleteRefreshCookie"
  /profiles:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    post:
      tags: [Profile]
      operationId: createProfile
      summary: Create own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileRequest"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
    patch:
      tags: [Profile]
      operationId: updateProfile
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /profiles/me:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    get:
      tags: [Profile]
      operationId: getMyProfile
      summary: Get own profile
      responses:
        "200":
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /profiles/{username}:
    servers:
      - url: http://localhost:8081/api/v1
        description: user-service
    get:
      tags: [Profile]
      operationId: getProfileByUsername
      summary: Get profile by username
      security: []
      parameters:
        - $ref: "#/components/parameters/Username"
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /videos:
    servers:
      - url: http://localhost:8082/api/v1
        description: media-service
    post:
      tags: [Video]
      operationId: createVideo
      summary: Create video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoRequest"
      responses:
        "201":
          description: Video created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /videos/{videoId}:
    servers:
      - url: http://localhost:8082/api/v1
        description: media-service
    get:
      tags: [Video]
      operationId: getVideoById
      summary: Get video by id
      security: []
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "200":
          description: Video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Video]
      operationId: updateVideo
      summary: Update video
      parameters:
        - $ref: "#/components/parameters/VideoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoRequest"
      responses:
        "200":
          description: Video updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Video]
      operationId: deleteVideo
      summary: Delete video
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "204":
          description: Video deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /exercises:
    servers:
      - url: http://localhost:8083/api/v1
        description: training-service
    get:
      tags: [Exercise]
      operationId: getExercises
      summary: Get exercises
      security: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          example: push
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Exercises
          content:
