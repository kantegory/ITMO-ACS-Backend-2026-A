components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Authorization: Bearer <accessToken>"
  headers:
    RefreshCookie:
      description: HttpOnly cookie with refresh token
      schema:
        type: string
        example: refresh_token=abc123; Path=/api/v1/auth; HttpOnly; SameSite=Lax
    DeleteRefreshCookie:
      description: Deletes refresh token cookie
      schema:
        type: string
        example: refresh_token=; Max-Age=0; Path=/api/v1/auth; HttpOnly; SameSite=Lax
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
      example: ["id,asc"]
    RefreshTokenCookie:
      name: refresh_token
      in: cookie
      required: false
      schema:
        type: string
    Username:
      name: username
      in: path
      required: true
      schema:
        type: string
        maxLength: 64
      example: user1
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      example: healthy
    VideoId:
      name: videoId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    ExerciseId:
      name: exerciseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TrainingId:
      name: trainingId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    TrainingExerciseId:
      name: trainingExerciseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    ArticleId:
      name: articleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
