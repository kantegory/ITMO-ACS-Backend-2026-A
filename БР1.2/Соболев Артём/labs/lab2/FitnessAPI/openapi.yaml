        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tag]
      operationId: updateTag
      summary: Update tag
      parameters:
        - $ref: "#/components/parameters/Slug"
      requestBody:
        required: true
        content:
          application/json:
