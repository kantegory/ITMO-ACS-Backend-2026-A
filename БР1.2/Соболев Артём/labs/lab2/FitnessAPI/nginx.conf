server {
    listen 80;
    server_name 157.22.230.153 _;

    client_max_body_size 20m;

    location = / {
        return 302 /api/v1/swagger-ui/index.html;
    }

    location = /api/v1/swagger {
        return 301 /api/v1/swagger-ui/index.html;
    }

    location = /api/v1/swagger/ {
        return 301 /api/v1/swagger-ui/index.html;
    }

    location = /api/v1/swagger-ui {
        return 301 /api/v1/swagger-ui/index.html;
    }

    location ~ ^/api/v1/swagger/(user|media|training|blog|progress|user-training-interaction)/?$ {
        return 301 /api/v1/swagger-ui/index.html;
    }

    location /api/v1/swagger-ui/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/v3/api-docs/swagger-config {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"configUrl":"/api/v1/v3/api-docs/swagger-config","displayRequestDuration":true,"docExpansion":"list","operationsSorter":"method","tagsSorter":"alpha","tryItOutEnabled":true,"urls":[{"name":"user-service","url":"/api/v1/docs/user"},{"name":"media-service","url":"/api/v1/docs/media"},{"name":"training-service","url":"/api/v1/docs/training"},{"name":"blog-service","url":"/api/v1/docs/blog"},{"name":"progress-service","url":"/api/v1/docs/progress"},{"name":"user-training-interaction-service","url":"/api/v1/docs/user-training-interaction"}],"urls.primaryName":"user-service","validatorUrl":"","withCredentials":true}';
    }

    location = /api/v1/docs/user {
        proxy_pass http://127.0.0.1:8081/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/docs/media {
        proxy_pass http://127.0.0.1:8082/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/docs/training {
        proxy_pass http://127.0.0.1:8083/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/docs/blog {
        proxy_pass http://127.0.0.1:8084/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/docs/progress {
        proxy_pass http://127.0.0.1:8085/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/docs/user-training-interaction {
        proxy_pass http://127.0.0.1:8086/api/v1/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
