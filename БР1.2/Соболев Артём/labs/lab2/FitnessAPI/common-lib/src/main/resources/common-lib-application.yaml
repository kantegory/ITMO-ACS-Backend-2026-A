server:
  servlet:
    context-path: /api/v1

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  swagger-ui:
    operationsSorter: method
    tags-sorter: alpha
    doc-expansion: list
    display-request-duration: true
    try-it-out-enabled: true
    with-credentials: true

app:
  i18n:
    basename: classpath:i18n/common/errors,classpath:i18n/common/validations,classpath:i18n/messages/messages,classpath:i18n/errors/errors,classpath:i18n/validations/validations
    encoding: UTF-8
    fallback-to-system-locale: false
    cache-seconds: 0
  security:
    jwt:
      secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      access-token-expiration: 15m
    refresh-token:
      ttl: ${REFRESH_TTL:30d}
      pepper: ${REFRESH_PEPPER:change-me-refresh-pepper}
      length: 64
    session:
      max-sessions: 5
    cookie:
      secure: ${COOKIE_SECURE:false}
      max-age: ${REFRESH_TTL:30d}
      same-site: Lax
      cookie-name: refresh_token
      path: /api/v1/auth
