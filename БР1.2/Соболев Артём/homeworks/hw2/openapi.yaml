openapi: 3.0.3
info:
  title: Платформа для фитнес-тренировок и здоровья
  version: 1.0.0
  description:
    "Спецификация OpenAPI для backend-приложения платформы фитнес-тренировок
    и здоровья. API охватывает работу с пользователями, тренировками, упражнениями, планами тренировок,
    прогрессом, избранным, завершёнными тренировками, а также статьями и комментариями.
    "
servers:
  - url: http://localhost:8080/api/v1
    description: Локальная среда разработки
tags:
  - name: Auth
  - name: Profile
  - name: Sessions
  - name: Trainings
  - name: Exercises
  - name: Workout Plans
  - name: Favourites
  - name: Completed Trainings
  - name: Progress
  - name: Articles
  - name: Comments
  - name: Reference Data
  - name: Videos
  - name: Admin Users
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Зарегистрировать нового пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь успешно зарегистрирован
          headers:
            Set-Cookie:
              description: HttpOnly cookie с refresh-токеном
              schema:
                type: string
                example: refreshToken=abc.def.ghi; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/UserAlreadyExists"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Войти в систему

      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешная авторизация
          headers:
            Set-Cookie:
              description: HttpOnly cookie с refresh-токеном
              schema:
                type: string
                example: refreshToken=abc.def.ghi; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Обновить access-токен
      security: []
      description: |
        Обновляет access-токен по refresh-токену, переданному в HttpOnly cookie
      parameters:
        - in: cookie
          name: refreshToken
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Токены успешно обновлены
          headers:
            Set-Cookie:
              description: HttpOnly cookie с refresh-токеном
              schema:
                type: string
                example: refreshToken=abc.def.ghi; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/RefreshTokenInvalid"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Выйти из текущей сессии
      description: "Роли: USER, TRAINER, ADMIN"
      responses:
        "204":
          description: Выход успешно выполнен
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Выйти со всех устройств
      description: "Роли: USER, TRAINER, ADMIN Завершает все активные сессии текущего пользователя."
      responses:
        "204":
          description: Выход со всех устройств выполнен
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/email-verification/request:
    post:
      tags:
        - Auth
      summary: Отправить запрос верификации почтового адреса

      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "202":
          description: Письмо для верификации отправлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /auth/email-verification/confirm:
    post:
      tags:
        - Auth
      summary: Подтвердить верификацию почтового адреса

      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Почтовый адрес успешно верифицирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/EmailVerificationTokenNotFound"
  /auth/password-reset/request:
    post:
      tags:
        - Auth
      summary: Отправить запрос на восстановление пароля

      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "202":
          description: Запрос на восстановление пароля успешно отправлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /auth/password-reset/confirm:
    post:
      tags:
        - Auth
      summary: Подтвердить сброс пароля по токену

      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordConfirmRequest"
      responses:
        "200":
          description: Пароль успешно сброшен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/PasswordResetTokenNotFound"
  /users/me:
    get:
      tags:
        - Profile
      summary: Получить профиль текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      responses:
        "200":
          description: Профиль текущего пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags:
        - Profile
      summary: Обновить профиль текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Профиль успешно обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/me/password:
    patch:
      tags:
        - Profile
      summary: Изменить пароль текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Пароль успешно изменён
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/me/sessions:
    get:
      tags:
        - Sessions
      summary: Получить активные сессии текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      responses:
        "200":
          description: Список активных сессий
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Sessions
      summary: Отозвать все сессии, кроме текущей
      description: "Роли: USER, TRAINER, ADMIN"
      responses:
        "204":
          description: Остальные сессии отозваны
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/me/sessions/{sessionId}:
    delete:
      tags:
        - Sessions
      summary: Отозвать конкретную сессию
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Сессия отозвана
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/SessionNotFound"
  /trainings:
    get:
      tags:
        - Trainings
      summary: Получить список тренировок

      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - name: search
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            $ref: "#/components/schemas/TrainingLevel"
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Постраничный список тренировок
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPageResponse"
    post:
      tags:
        - Trainings
      summary: Создать тренировку
      description: "Роли: TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingRequest"
      responses:
        "201":
          description: Тренировка создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/TrainingAlreadyExists"
  /trainings/{trainingId}:
    get:
      tags:
        - Trainings
      summary: Получить тренировку по идентификатору

      security: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "200":
          description: Детали тренировки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDetailsResponse"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
    patch:
      tags:
        - Trainings
      summary: Обновить тренировку
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingRequest"
      responses:
        "200":
          description: Тренировка обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
    delete:
      tags:
        - Trainings
      summary: Удалить тренировку
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "204":
          description: Тренировка удалена
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
  /trainings/{trainingId}/ratings:
    get:
      tags:
        - Trainings
      summary: Получить сводку рейтинга тренировки

      security: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "200":
          description: Сводка рейтинга
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRatingSummaryResponse"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
    post:
      tags:
        - Trainings
      summary: Оценить тренировку
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateTrainingRequest"
      responses:
        "201":
          description: Оценка создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRatingResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
        "409":
          $ref: "#/components/responses/TrainingRatingAlreadyExists"
    patch:
      tags:
        - Trainings
      summary: Обновить оценку тренировки текущим пользователем
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateTrainingRequest"
      responses:
        "200":
          description: Оценка обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRatingResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
    delete:
      tags:
        - Trainings
      summary: Удалить оценку тренировки текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "204":
          description: Оценка удалена
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TrainingRatingNotFound"
  /trainings/{trainingId}/favourite:
    post:
      tags:
        - Favourites
      summary: Добавить тренировку в избранное
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "201":
          description: Добавлено в избранное
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavouriteTrainingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
        "409":
          $ref: "#/components/responses/TrainingAlreadyInFavourites"
    delete:
      tags:
        - Favourites
      summary: Удалить тренировку из избранного
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "204":
          description: Удалено из избранного
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/TrainingNotFound"
  /users/me/favourites:
    get:
      tags:
        - Favourites
      summary: Получить избранные тренировки текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Список избранных тренировок
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavouriteTrainingPageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /exercises:
    get:
      tags:
        - Exercises
      summary: Получить список упражнений

      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - name: search
          in: query
          schema:
            type: string
        - name: bodyPart
          in: query
          schema:
            $ref: "#/components/schemas/BodyPart"
        - name: level
          in: query
          schema:
            $ref: "#/components/schemas/TrainingLevel"
      responses:
        "200":
          description: Постраничный список упражнений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExercisePageResponse"
    post:
      tags:
        - Exercises
      summary: Создать упражнение
      description: "Роли: TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseRequest"
      responses:
        "201":
          description: Упражнение создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/VideoNotFound"
  /exercises/{exerciseId}:
    get:
      tags:
        - Exercises
      summary: Получить упражнение по идентификатору

      security: []
      parameters:
        - $ref: "#/components/parameters/ExerciseId"
      responses:
        "200":
          description: Детали упражнения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseDetailsResponse"
        "404":
          $ref: "#/components/responses/ExerciseNotFound"
    patch:
      tags:
        - Exercises
      summary: Обновить упражнение
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/ExerciseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExerciseRequest"
      responses:
        "200":
          description: Упражнение обновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ExerciseNotFound"
    delete:
      tags:
        - Exercises
      summary: Удалить упражнение
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/ExerciseId"
      responses:
        "204":
          description: Упражнение удалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ExerciseNotFound"
  /workout-plans:
    get:
      tags:
        - Workout Plans
      summary: Получить список планов тренировок

      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - name: search
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            $ref: "#/components/schemas/TrainingLevel"
      responses:
        "200":
          description: Постраничный список планов тренировок
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlanPageResponse"
    post:
      tags:
        - Workout Plans
      summary: Создать план тренировок
      description: "Роли: TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutPlanRequest"
      responses:
        "201":
          description: План тренировок создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlanDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /workout-plans/{planId}:
    get:
      tags:
        - Workout Plans
      summary: Получить план тренировок по идентификатору

      security: []
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Детали плана тренировок
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlanDetailsResponse"
        "404":
          $ref: "#/components/responses/WorkoutPlanNotFound"
    patch:
      tags:
        - Workout Plans
      summary: Обновить план тренировок
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkoutPlanRequest"
      responses:
        "200":
          description: План тренировок обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutPlanDetailsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/WorkoutPlanNotFound"
    delete:
      tags:
        - Workout Plans
      summary: Удалить план тренировок
      description: "Роли: TRAINER, ADMIN"
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "204":
          description: План тренировок удалён
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/WorkoutPlanNotFound"
  /users/me/workout-plans:
    get:
      tags:
        - Workout Plans
      summary: Получить планы тренировок текущего пользователя
      description: "Роли: USER, TRAINER, ADMIN"
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/UserWorkoutPlanStatus"
      responses:
        "200":
          description: Планы тренировок текущего пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserWorkoutPlanResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Workout Plans
      summary: Назначить план тренировок текущему пользователю
      description: "Роли: USER, TRAINER, ADMIN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
