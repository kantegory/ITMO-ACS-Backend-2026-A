components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
        example: createdAt,desc
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TrainingId:
      name: trainingId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ExerciseId:
      name: exerciseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserWorkoutPlanId:
      name: userWorkoutPlanId
      in: path
