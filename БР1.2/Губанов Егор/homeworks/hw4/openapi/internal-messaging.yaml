openapi: 3.0.3
info:
  title: Messaging Service — Internal API
  version: 1.0.0
servers:
  - url: http://messaging:3004
security:
  - InternalKey: []
paths:
  /internal/v1/users/{userId}/messages:
    get:
      summary: Сообщения пользователя для history
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageOut'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    InternalKey:
      type: apiKey
      in: header
      name: X-Internal-Key
  schemas:
    MessageOut:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sender_id:
          type: string
        receiver_id:
          type: string
        property_id:
          type: string
        content:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
