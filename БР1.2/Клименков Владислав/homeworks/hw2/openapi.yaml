openapi: 3.0.0
info:
  title: RecipeHub API
  description: API для обмена рецептами и кулинарных блогов
  version: 1.0.0


paths:
  # ==================== Authentication ====================
  
  /auth/register:
    post:
      tags: [Authentication]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        "201":
          description: Пользователь создан
        "400":
          description: Ошибка валидации
  
  /auth/login:
    post:
      tags: [Authentication]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Неверные данные
  
  # ==================== Users ====================
  
  /users/me:
    get:
      tags: [Users]
      summary: Получить профиль текущего пользователя
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFullRead'
    patch:
      tags: [Users]
      summary: Обновить профиль текущего пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        "200":
          description: Обновлённый профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFullRead'
        "400":
          description: Ошибка валидации
    delete:
      tags: [Users]
      summary: Удалить текущего пользователя
      responses:
        "204":
          description: Аккаунт удалён
  
  /users/{id}:
    get:
      tags: [Users]
      summary: Получить публичный профиль пользователя
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Публичный профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicRead'
        "400":
          description: Ошибка валидации
        "404":
          description: Пользователь не найден
  
  # ==================== Directories ====================
  
  /dish-types:
    get:
      tags: [Directories]
      summary: Получить список всех типов блюд
      responses:
        "200":
          description: Список всех типов блюд
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishTypeReadList'
    post:
      tags: [Directories]
      summary: Добавить тип блюда (только админ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishTypeCreate'
      responses:
        "201":
          description: Добавленный тип блюда
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishTypeRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
  
  /dish-types/{id}:
    patch:
      tags: [Directories]
      summary: Изменить тип блюда (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishTypeUpdate'
      responses:
        "200":
          description: Обновлённый тип блюда
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishTypeRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Тип блюда не найден
    delete:
      tags: [Directories]
      summary: Удалить тип блюда (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Тип блюда удалён
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Тип блюда не найден
  
  /ingredients:
    get:
      tags: [Directories]
      summary: Получить список всех ингредиентов
      responses:
        "200":
          description: Список всех ингредиентов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientReadList'
    post:
      tags: [Directories]
      summary: Добавить ингредиент (только админ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientCreate'
      responses:
        "201":
          description: Ингредиент добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
  
  /ingredients/{id}:
    patch:
      tags: [Directories]
      summary: Изменить ингредиент (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientUpdate'
      responses:
        "200":
          description: Обновлённый ингредиент
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Ингредиент не найден
    delete:
      tags: [Directories]
      summary: Удалить ингредиент (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Ингредиент удалён
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Ингредиент не найден
  
  /units:
    get:
      tags: [Directories]
      summary: Получить список всех единиц измерения
      responses:
        "200":
          description: Список всех единиц измерения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitReadList'
    post:
      tags: [Directories]
      summary: Добавить единицу измерения (только админ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitCreate'
      responses:
        "201":
          description: Добавленная единица измерения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
  
  /units/{id}:
    patch:
      tags: [Directories]
      summary: Изменить единицу измерения (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitUpdate'
      responses:
        "200":
          description: Обновлённая единица измерения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Единица измерения не найдена
    delete:
      tags: [Directories]
      summary: Удалить единицу измерения (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Единица измерения удалена
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Единица измерения не найдена
  
  # ==================== Recipes ====================
  
  /recipes:
    get:
      tags: [Recipes]
      summary: Получить список всех рецептов
      responses:
        "200":
          description: Список всех рецептов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeShortReadList'
    post:
      tags: [Recipes]
      summary: Добавить рецепт
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCreate'
      responses:
        "201":
          description: Добавленный рецепт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeFullRead'
        "400":
          description: Ошибка валидации
  
  /recipes/{id}:
    get:
      tags: [Recipes]
      summary: Получить рецепт
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Рецепт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeFullRead'
        "404":
          description: Рецепт не найден
    patch:
      tags: [Recipes]
      summary: Обновить рецепт (автор или админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeUpdate'
      responses:
        "200":
          description: Обновлённый рецепт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeFullRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён (не автор или админ)
        "404":
          description: Рецепт не найден
    delete:
      tags: [Recipes]
      summary: Удалить рецепт (автор или админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Рецепт удалён
        "403":
          description: Доступ запрещён (не автор или админ)
        "404":
          description: Рецепт не найден
  
  /users/me/recipes:
    get:
      tags: [Recipes]
      summary: Получить список всех рецептов текущего пользователя
      responses:
        "200":
          description: Список рецептов текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeShortReadList'
  
  /recipes/{id}/rating:
    post:
      tags: [Recipes]
      summary: Добавить/обновить оценку рецепту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingRequest'
      responses:
        "200":
          description: Оценка добавлена/обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingRead'
        "400":
          description: Ошибка валидации
        "404":
          description: Рецепт не найден
    delete:
      tags: [Recipes]
      summary: Удалить оценку у рецепта
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Оценка удалена
        "404":
          description: Рецепт или оценка не найдены
          
  # ==================== Steps ====================
  
  /recipes/{id}/steps:
    get:
      tags: [Steps]
      summary: Получить список всех шагов рецепта
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Список всех шагов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepReadList'
        "404":
          description: Рецепт не найден
    post:
      tags: [Steps]
      summary: Добавить шаг к рецепту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepCreate'
      responses:
        "201":
          description: Добавленный шаг
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepRead'
        "400":
          description: Ошибка валидации
        "404":
          description: Рецепт не найден
    
  /recipes/{recipe_id}/steps/{step_id}:
    get:
      tags: [Steps]
      summary: Получить шаг рецепта
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: step_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Шаг рецепта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepRead'
        "404":
          description: Рецепт или шаг не найден
    patch:
      tags: [Steps]
      summary: Обновить шаг рецепта
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: step_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepUpdate'
      responses:
        "200":
          description: Обновлённый шаг рецепта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepRead'
        "400":
          description: Ошибка валидации
        "404":
          description: Рецепт или шаг не найден
    delete:
      tags: [Steps]
      summary: Удалить шаг рецепта
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: step_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Шаг удалён
        "404":
          description: Рецепт или шаг не найден
      
  # ==================== Comments ====================
  
  /recipes/{id}/comments:
    get:
      tags: [Comments]
      summary: Получить список всех комментариев к рецепту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Список комментариев
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentReadList'
    post:
      tags: [Comments]
      summary: Добавить комментарий к рецепту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        "201":
          description: Добавленный комментарий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentRead'
        "400":
          description: Ошибка валидации
        "404":
          description: Рецепт не найден
  
  /recipes/{recipe_id}/comments/{comment_id}:
    get:
      tags: [Comments]
      summary: Получить комментарий к рецепту
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Комментарий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentRead'
        "404":
          description: Рецепт или комментарий не найден 
    patch:
      tags: [Comments]
      summary: Изменить комментарий к рецепту (автор или админ)
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdate'
      responses:
        "200":
          description: Обновлённый комментарий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentRead'
        "400":
          description: Ошибка валидации
        "403":
          description: Доступ запрещён
        "404":
          description: Рецепт или комментарий не найден
    delete:
      tags: [Comments]
      summary: Удалить комментарий к рецепту (автор или админ)
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Комментарий удалён
        "403":
          description: Доступ запрещён
        "404":
          description: Рецепт или комментарий не найден
  
  /recipes/{recipe_id}/comments/{comment_id}/like:
    post:
      tags: [Comments]
      summary: Поставить лайк комментарию к рецепту
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Лайк поставлен
        "204":
          description: Лайк уже стоит
        "404":
          description: Рецепт или комментарий не найден
    delete:
      tags: [Comments]
      summary: Удалить лайк у комментария к рецепту
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
        - name: comment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Лайк удалён
        "404":
          description: Рецепт или комментарий не найден
  
  # ==================== Subscriptions ====================
  
  /users/{id}/subscribe:
    post:
      tags: [Subscriptions]
      summary: Подписаться на кулинара
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Подписка осуществлена
        "204":
          description: Подписка уже есть
        "404":
          description: Пользователь не найден
    delete:
      tags: [Subscriptions]
      summary: Отменить подписку на кулинара
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Подписка отменена
        "404":
          description: Пользователь не найден
  
  /users/me/subscriptions:
    get:
      tags: [Subscriptions]
      summary: Получить список всех подписок
      responses:
        "200":
          description: Список с подписками
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicReadList'
  
  /users/me/subscribers:
    get:
      tags: [Subscriptions]
      summary: Получить список всех подписчиков (только общие данные)
      responses:
        "200":
          description: Список подписчиков
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicReadList'
  
  # ==================== Saved Recipes ====================
  
  /users/me/saved-recipes:
    get:
      tags: [SavedRecipes]
      summary: Получить список всех сохранённых рецептов
      responses:
        "200":
          description: Список сохранённых рецептов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeShortReadList'
  
  /recipes/{id}/save:
    post:
      tags: [SavedRecipes]
      summary: Сохранить рецепт
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Рецепт сохранён
        "204":
          description: Рецепт уже сохранён
        "404":
          description: Рецепт не найден
    delete:
      tags: [SavedRecipes]
      summary: Убрать рецепт из сохранённого
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Рецепт убран из сохранённого
        "404":
          description: Рецепт не найден
  
  # ==================== Feed ====================
  
  /users/me/feed:
    get:
      tags: [Feed]
      summary: Получить список рецептов от подписок
      responses:
        "200":
          description: Список рецептов от подписок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeShortReadList'
  
  # ==================== Admin ====================
  
  /admin/users:
    get:
      tags: [Admin]
      summary: Получить список всех пользователей с полными данными (только админ)
      responses:
        "200":
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFullReadList'
        "403":
          description: Доступ запрещён (не админ)
  
  /admin/users/{id}:
    get:
      tags: [Admin]
      summary: Получить полные данные пользователя (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFullRead'
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Пользователь не найден
    delete:
      tags: [Admin]
      summary: Удалить пользователя (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Пользователь удалён
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Пользователь не найден
  
  /admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Изменить роль пользователя (только админ)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        "200":
          description: Обновлённая роль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFullRead'
        "403":
          description: Доступ запрещён (не админ)
        "404":
          description: Пользователь не найден
  
  
components:
  schemas:
    # ==================== User ====================
    
    # ----- Read -----
  
    UserPublicRead:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        bio:
          type: string
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time
    
    UserFullRead:
      allOf:
        - $ref: '#/components/schemas/UserPublicRead'
        - type: object
          properties:
            email:
              type: string
              format: email
            is_verified:
              type: boolean
            updated_at:
              type: string
              format: date-time
    
    UserFullReadList:
      type: array
      items:
        $ref: '#/components/schemas/UserFullRead'
    
    UserPublicReadList:
      type: array
      items:
        $ref: '#/components/schemas/UserPublicRead'
    
    # ----- Create -----
      
    UserCreate:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        bio:
          type: string
    
    # ----- Update -----
    
    UserUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        bio:
          type: string
        password:
          type: string
          format: password
    
    # ==================== UserRole ====================
    
    # ----- Update -----
    
    RoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, admin]
    
    # ==================== Auth ====================
    
    # ----- Request -----
    
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          
    # ----- Response -----
  
    AuthResponse:
      type: object
      properties:
        token:
          type: string
    
    # ==================== DishTypeRead ====================
    
    # ----- Read -----
    
    DishTypeRead:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    DishTypeReadList:
      type: array
      items:
        $ref: '#/components/schemas/DishTypeRead'
    
    # ----- Create -----
        
    DishTypeCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
    
    # ----- Update -----
    
    DishTypeUpdate:
      type: object
      required: [title]
      properties:
        title:
          type: string
    
    # ==================== IngredientRead ====================
    
    # ----- Read -----
    
    IngredientRead:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    IngredientReadList:
      type: array
      items:
        $ref: '#/components/schemas/IngredientRead'
        
    # ----- Create -----
    
    IngredientCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
    
    # ----- Update -----
    
    IngredientUpdate:
      type: object
      required: [title]
      properties:
        title:
          type: string
    
    # ==================== UnitRead ====================
    
    # ----- Read -----
    
    UnitRead:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        abbreviation:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UnitReadList:
      type: array
      items:
        $ref: '#/components/schemas/UnitRead'
    
    # ----- Create -----
    
    UnitCreate:
      type: object
      properties:
        title:
          type: string
        abbreviation:
          type: string
    
    # ----- Update -----
    
    UnitUpdate:
      type: object
      properties:
        title:
          type: string
        abbreviation:
          type: string
    
    # ==================== Recipe ====================
    
    # ----- Read -----
    
    RecipeShortRead:
      type: object
      properties:
        id:
          type: integer
        author:
          $ref: '#/components/schemas/UserPublicRead'
        dish_type:
          $ref: '#/components/schemas/DishTypeRead'
        ingredients:
          $ref: '#/components/schemas/RecipeIngredientReadList'
        media:
          $ref: '#/components/schemas/MediaReadList'
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        rating_avg:
          type: number
          format: float
        
    RecipeFullRead:
      allOf:
        - $ref: '#/components/schemas/RecipeShortRead'
        - type: object
          properties:
            is_published:
              type: boolean
            steps:
              $ref: '#/components/schemas/StepReadList'
            
    RecipeShortReadList:
      type: array
      items:
        $ref: '#/components/schemas/RecipeShortRead'
    
    # ----- Create -----
    
    RecipeCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        dish_type_id:
          type: integer
        is_published:
          type: boolean
          default: false
        ingredients:
          $ref: '#/components/schemas/RecipeIngredientCreateList'
        media:
          $ref: '#/components/schemas/MediaCreateList'
        steps:
          $ref: '#/components/schemas/StepCreateList'
    
    # ----- Update -----
    
    RecipeUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        dish_type_id:
          type: integer
        is_published:
          type: boolean
        ingredients:
          $ref: '#/components/schemas/RecipeIngredientUpdateList'
        media:
          $ref: '#/components/schemas/MediaUpdateList'
        steps:
          $ref: '#/components/schemas/StepUpdateList'
    
    # ==================== RecipeIngredient ====================
    
    # ----- Read -----
    
    RecipeIngredientRead:
      type: object
      properties:
        ingredient:
          $ref: '#/components/schemas/IngredientRead'
        unit:
          $ref: '#/components/schemas/UnitRead'
        quantity:
          type: number
          format: float
        alt_unit_text:
          type: string
        preparation_note:
          type: string
    
    RecipeIngredientReadList:
      type: array
      items:
        $ref: '#/components/schemas/RecipeIngredientRead'
    
    # ----- Create -----
    
    RecipeIngredientCreate:
      type: object
      properties:
        ingredient_id:
          type: integer
        unit_id:
          type: integer
        quantity:
          type: number
        alt_unit_text:
          type: string
        preparation_note:
          type: string
    
    RecipeIngredientCreateList:
      type: array
      items:
        $ref: '#/components/schemas/RecipeIngredientCreate'
    
    # ----- Update -----
    
    RecipeIngredientUpdate:
      type: object
      properties:
        ingredient_id:
          type: integer
        unit_id:
          type: integer
        quantity:
          type: number
        alt_unit_text:
          type: string
        preparation_note:
          type: string
          
    RecipeIngredientUpdateList:
      type: array
      items:
        $ref: '#/components/schemas/RecipeIngredientUpdate'
    
    # ==================== Steps ====================
    
    # ----- Read -----
    
    StepRead:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        title:
          type: string
        description:
          type: string
        media:
          $ref: '#/components/schemas/MediaReadList'
    
    StepReadList:
      type: array
      items:
        $ref: '#/components/schemas/StepRead'
    
    # ----- Create -----
    
    StepCreate:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        description:
          type: string
        media:
          $ref: '#/components/schemas/MediaCreateList'
          
    StepCreateList:
      type: array
      items:
        $ref: '#/components/schemas/StepCreate'
    
    # ----- Update -----
    
    StepUpdate:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        description:
          type: string
        media:
          $ref: '#/components/schemas/MediaUpdateList'
          
    StepUpdateList:
      type: array
      items:
        $ref: '#/components/schemas/StepUpdate'
    
    # ==================== Media ====================
    
    # ----- Read -----
    
    MediaRead:
      type: object
      properties:
        media_type:
          type: string
          enum: [photo, video]
        media_url:
          type: string
          format: uri
        sort_order:
          type: integer
    
    MediaReadList:
      type: array
      items:
        $ref: '#/components/schemas/MediaRead'
    
    # ----- Create -----
    
    MediaCreate:
      type: object
      properties:
        media_type:
          type: string
          enum: [photo, video]
        media_url:
          type: string
          format: uri
        sort_order:
          type: integer
    
    MediaCreateList:
      type: array
      items:
        $ref: '#/components/schemas/MediaCreate'
    
    # ----- Update -----
    
    MediaUpdate:
      type: object
      properties:
        media_type:
          type: string
          enum: [photo, video]
        media_url:
          type: string
          format: uri
        sort_order:
          type: integer
    
    MediaUpdateList:
      type: array
      items:
        $ref: '#/components/schemas/MediaUpdate'
    
    # ==================== Rating ====================
    
    # ----- Read -----
    
    RatingRead:
      type: object
      properties:
        rating_avg:
          type: number
        user_rating:
          type: integer
    
    # ----- Request = Create + Update -----
    
    RatingRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
    
    # ==================== Comment ====================
    
    # ----- Read -----
    
    CommentRead:
      type: object
      properties:
        id:
          type: integer
        user:
          $ref: '#/components/schemas/UserPublicRead'
        recipe_id:
          type: integer
        text:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_liked:
          type: boolean
        likes_count:
          type: integer
    
    CommentReadList:
      type: array
      items:
        $ref: '#/components/schemas/CommentRead'
    
    # ----- Create -----
    
    CommentCreate:
      type: object
      properties:
        text:
          type: string
      required: [text]
    
    # ----- Update -----
    
    CommentUpdate:
      type: object
      properties:
        text:
          type: string
      required: [text]
