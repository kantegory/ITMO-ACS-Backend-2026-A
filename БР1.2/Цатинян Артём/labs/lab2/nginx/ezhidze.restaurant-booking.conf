server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ezhidze.ru www.ezhidze.ru _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name ezhidze.ru www.ezhidze.ru _;

    ssl_certificate /etc/letsencrypt/live/ezhidze.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ezhidze.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 302 /catalog/docs;
    }

    location = /identity/docs {
        return 302 /identity/swagger-ui/index.html;
    }

    location = /catalog/docs {
        return 302 /catalog/swagger-ui/index.html;
    }

    location = /booking/docs {
        return 302 /booking/swagger-ui/index.html;
    }

    location = /review/docs {
        return 302 /review/swagger-ui/index.html;
    }

    location = /identity/swagger-ui/swagger-initializer.js {
        default_type application/javascript;
        return 200 'window.onload = function() { window.ui = SwaggerUIBundle({ dom_id: "#swagger-ui", deepLinking: true, presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset], plugins: [SwaggerUIBundle.plugins.DownloadUrl], layout: "StandaloneLayout", configUrl: "/identity/v3/api-docs/swagger-config", validatorUrl: "" }); };';
    }

    location = /catalog/swagger-ui/swagger-initializer.js {
        default_type application/javascript;
        return 200 'window.onload = function() { window.ui = SwaggerUIBundle({ dom_id: "#swagger-ui", deepLinking: true, presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset], plugins: [SwaggerUIBundle.plugins.DownloadUrl], layout: "StandaloneLayout", configUrl: "/catalog/v3/api-docs/swagger-config", validatorUrl: "" }); };';
    }

    location = /booking/swagger-ui/swagger-initializer.js {
        default_type application/javascript;
        return 200 'window.onload = function() { window.ui = SwaggerUIBundle({ dom_id: "#swagger-ui", deepLinking: true, presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset], plugins: [SwaggerUIBundle.plugins.DownloadUrl], layout: "StandaloneLayout", configUrl: "/booking/v3/api-docs/swagger-config", validatorUrl: "" }); };';
    }

    location = /review/swagger-ui/swagger-initializer.js {
        default_type application/javascript;
        return 200 'window.onload = function() { window.ui = SwaggerUIBundle({ dom_id: "#swagger-ui", deepLinking: true, presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset], plugins: [SwaggerUIBundle.plugins.DownloadUrl], layout: "StandaloneLayout", configUrl: "/review/v3/api-docs/swagger-config", validatorUrl: "" }); };';
    }

    location = /identity/v3/api-docs/swagger-config {
        default_type application/json;
        return 200 '{"configUrl":"/identity/v3/api-docs/swagger-config","oauth2RedirectUrl":"https://ezhidze.ru/identity/swagger-ui/oauth2-redirect.html","url":"/identity/v3/api-docs","validatorUrl":""}';
    }

    location = /catalog/v3/api-docs/swagger-config {
        default_type application/json;
        return 200 '{"configUrl":"/catalog/v3/api-docs/swagger-config","oauth2RedirectUrl":"https://ezhidze.ru/catalog/swagger-ui/oauth2-redirect.html","url":"/catalog/v3/api-docs","validatorUrl":""}';
    }

    location = /booking/v3/api-docs/swagger-config {
        default_type application/json;
        return 200 '{"configUrl":"/booking/v3/api-docs/swagger-config","oauth2RedirectUrl":"https://ezhidze.ru/booking/swagger-ui/oauth2-redirect.html","url":"/booking/v3/api-docs","validatorUrl":""}';
    }

    location = /review/v3/api-docs/swagger-config {
        default_type application/json;
        return 200 '{"configUrl":"/review/v3/api-docs/swagger-config","oauth2RedirectUrl":"https://ezhidze.ru/review/swagger-ui/oauth2-redirect.html","url":"/review/v3/api-docs","validatorUrl":""}';
    }

    location /identity/ {
        proxy_pass http://127.0.0.1:8081/;
    }

    location /catalog/ {
        proxy_pass http://127.0.0.1:8082/;
    }

    location /booking/ {
        proxy_pass http://127.0.0.1:8083/;
    }

    location /review/ {
        proxy_pass http://127.0.0.1:8084/;
    }
}
