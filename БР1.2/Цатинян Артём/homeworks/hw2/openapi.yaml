openapi: 3.0.3
info:
  title: Restaurant Table Booking API
  version: 1.0.0
  description: |
    REST API for a restaurant table booking application.
    Specification is prepared for homework 2 of the backend course.
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
  - name: Users
  - name: Reference Data
  - name: Restaurants
  - name: Bookings
  - name: Reviews
  - name: Admin

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags: [Users, Admin]
      summary: "Admin: get paginated user list"
      parameters:
        - in: query
          name: search
          schema:
            type: string
            maxLength: 100
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, email, firstName, lastName]
            default: createdAt
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Users, Admin]
      summary: "Admin: create user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      tags: [Users, Admin]
      summary: "Admin: get user by id"
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Users, Admin]
      summary: "Admin: update user"
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Users, Admin]
      summary: "Admin: delete user"
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cuisines:
    get:
      tags: [Reference Data]
      summary: Get list of available cuisines
      security: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
            maxLength: 80
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name]
            default: name
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Cuisine list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cuisine'
    post:
      tags: [Reference Data, Admin]
      summary: "Admin: create cuisine"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuisineUpsertRequest'
      responses:
        '201':
          description: Cuisine created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cuisine'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cuisine already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cuisines/{cuisineId}:
    get:
      tags: [Reference Data, Admin]
      summary: "Admin: get cuisine by id"
      parameters:
        - $ref: '#/components/parameters/CuisineId'
      responses:
        '200':
          description: Cuisine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cuisine'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cuisine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Reference Data, Admin]
      summary: "Admin: update cuisine"
      parameters:
        - $ref: '#/components/parameters/CuisineId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuisineUpsertRequest'
      responses:
        '200':
          description: Cuisine updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cuisine'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cuisine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cuisine already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Reference Data, Admin]
      summary: "Admin: delete cuisine"
      parameters:
        - $ref: '#/components/parameters/CuisineId'
      responses:
        '204':
          description: Cuisine deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cuisine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants:
    get:
      tags: [Restaurants]
      summary: Search restaurants with filters
      security: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
            maxLength: 200
        - in: query
          name: cuisineId
          schema:
            type: string
            format: uuid
        - in: query
          name: city
          schema:
            type: string
            maxLength: 120
        - in: query
          name: priceSegment
          schema:
            $ref: '#/components/schemas/PriceSegment'
        - in: query
          name: guestsCount
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: fromTime
          schema:
            type: string
            format: time
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, rating, reviewCount, priceSegment, createdAt]
            default: rating
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated list of restaurants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantPage'
        '400':
          description: Invalid filter values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Restaurants, Admin]
      summary: "Admin: create restaurant"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantUpsertRequest'
      responses:
        '201':
          description: Restaurant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetails'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}:
    get:
      tags: [Restaurants]
      summary: Get restaurant details
      security: []
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
      responses:
        '200':
          description: Restaurant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetails'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Restaurants, Admin]
      summary: "Admin: update restaurant"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantUpsertRequest'
      responses:
        '200':
          description: Restaurant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetails'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Restaurants, Admin]
      summary: "Admin: delete restaurant"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
      responses:
        '204':
          description: Restaurant deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/availability:
    get:
      tags: [Restaurants]
      summary: Get available booking slots for a restaurant
      security: []
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: guestsCount
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - in: query
          name: bookingDurationMinutes
          schema:
            type: integer
            minimum: 30
            maximum: 240
            default: 120
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Available booking slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilitySlot'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/tables:
    get:
      tags: [Restaurants, Admin]
      summary: "Admin: get restaurant tables"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - in: query
          name: zoneName
          schema:
            type: string
            maxLength: 80
        - in: query
          name: minSeats
          schema:
            type: integer
            minimum: 1
        - in: query
          name: maxSeats
          schema:
            type: integer
            minimum: 1
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [tableNumber, seatsCount, zoneName]
            default: tableNumber
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated restaurant table list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantTablePage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Restaurants, Admin]
      summary: "Admin: create restaurant table"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantTableUpsertRequest'
      responses:
        '201':
          description: Restaurant table created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantTable'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Table number already exists for this restaurant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/tables/{tableId}:
    get:
      tags: [Restaurants, Admin]
      summary: "Admin: get restaurant table by id"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Restaurant table details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantTable'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant or table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Restaurants, Admin]
      summary: "Admin: update restaurant table"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantTableUpsertRequest'
      responses:
        '200':
          description: Restaurant table updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantTable'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant or table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Table number already exists for this restaurant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Restaurants, Admin]
      summary: "Admin: delete restaurant table"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - $ref: '#/components/parameters/TableId'
      responses:
        '204':
          description: Restaurant table deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant or table not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/menu:
    get:
      tags: [Restaurants]
      summary: Get restaurant menu grouped by category
      security: []
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - in: query
          name: menuCategoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
            maxLength: 160
        - in: query
          name: isAvailable
          schema:
            type: boolean
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [categorySortOrder, itemName, priceMinor]
            default: categorySortOrder
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Restaurant menu
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuCategoryWithItems'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/menu-categories:
    get:
      tags: [Restaurants, Admin]
      summary: "Admin: get menu categories"
      parameters:
        - $ref: '#/components/parameters/RestaurantId'
        - in: query
          name: search
          schema:
            type: string
            maxLength: 120
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: sortBy
          schema:
