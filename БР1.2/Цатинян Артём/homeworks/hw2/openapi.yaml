          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Reviews, Admin]
      summary: "Admin: delete review"
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '204':
          description: Review deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    CuisineId:
      in: path
      name: cuisineId
      required: true
      schema:
        type: string
        format: uuid
    RestaurantId:
      in: path
      name: restaurantId
      required: true
      schema:
        type: string
        format: uuid
    TableId:
      in: path
      name: tableId
      required: true
      schema:
        type: string
        format: uuid
    MenuCategoryId:
      in: path
      name: menuCategoryId
      required: true
      schema:
        type: string
        format: uuid
    MenuItemId:
      in: path
      name: menuItemId
      required: true
      schema:
        type: string
        format: uuid
    PhotoId:
      in: path
      name: photoId
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      in: path
      name: bookingId
      required: true
      schema:
        type: string
        format: uuid
    ReviewId:
      in: path
      name: reviewId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, phone]
      properties:
        email:
          type: string
          format: email
          example: artem.tsatnyan@example.com
        password:
          type: string
          minLength: 8
          maxLength: 64
          example: StrongPass123
        firstName:
          type: string
          maxLength: 100
          example: Артём
        lastName:
          type: string
          maxLength: 100
          example: Цатнян
        phone:
          type: string
          maxLength: 32
          example: +79990000000

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 64

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 32

    UserRole:
      type: string
      enum: [CUSTOMER, ADMIN]
      example: CUSTOMER

    AdminCreateUserRequest:
      type: object
      required: [email, password, firstName, lastName, phone, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 64
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 32
        role:
          $ref: '#/components/schemas/UserRole'

    AdminUpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 32
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean

    AuthResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, user]
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, email, firstName, lastName, phone, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time

    Cuisine:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Итальянская

    CuisineUpsertRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 80
          example: Итальянская

    PriceSegment:
      type: string
      enum: [LOW, MEDIUM, HIGH]
      example: MEDIUM

    Address:
      type: object
      required: [country, city, street, building]
      properties:
        country:
          type: string
          example: Russia
        city:
          type: string
          example: Saint Petersburg
        street:
          type: string
          example: Невский проспект
        building:
          type: string
          example: 12
        postalCode:
          type: string
          nullable: true
          example: '191025'

    WorkingHours:
      type: object
      required: [weekDay, opensAt, closesAt, isClosed]
      properties:
        weekDay:
          type: string
          enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
        opensAt:
          type: string
          format: time
          nullable: true
          example: '12:00:00'
        closesAt:
          type: string
          format: time
          nullable: true
          example: '23:00:00'
        isClosed:
          type: boolean

    RestaurantUpsertRequest:
      type: object
      required: [name, phone, address, priceSegment]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        phone:
          type: string
          maxLength: 32
        email:
          type: string
          format: email
          nullable: true
        address:
          $ref: '#/components/schemas/Address'
        priceSegment:
          $ref: '#/components/schemas/PriceSegment'
        bookingPolicy:
          type: string
          nullable: true
        cuisineIds:
          type: array
          items:
            type: string
            format: uuid
        workingHours:
          type: array
          items:
            $ref: '#/components/schemas/WorkingHours'
        isActive:
          type: boolean

    RestaurantTable:
      type: object
      required: [id, restaurantId, tableNumber, seatsCount, isActive]
      properties:
        id:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        tableNumber:
          type: string
        seatsCount:
          type: integer
        zoneName:
          type: string
          nullable: true
        isActive:
          type: boolean

    RestaurantTableUpsertRequest:
      type: object
      required: [tableNumber, seatsCount]
      properties:
        tableNumber:
          type: string
          maxLength: 20
        seatsCount:
          type: integer
          minimum: 1
          maximum: 20
        zoneName:
          type: string
          maxLength: 80
          nullable: true
        isActive:
          type: boolean

    RestaurantSummary:
      type: object
      required: [id, name, address, priceSegment, cuisines, rating, reviewCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        shortDescription:
          type: string
          nullable: true
        address:
          $ref: '#/components/schemas/Address'
        priceSegment:
          $ref: '#/components/schemas/PriceSegment'
        cuisines:
          type: array
          items:
            $ref: '#/components/schemas/Cuisine'
        rating:
          type: number
          format: double
          example: 4.7
        reviewCount:
          type: integer
          example: 128

    RestaurantDetails:
      allOf:
        - $ref: '#/components/schemas/RestaurantSummary'
        - type: object
          required: [description, phone, email, bookingPolicy, workingHours, photos]
          properties:
            description:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email
            bookingPolicy:
              type: string
            workingHours:
              type: array
              items:
                $ref: '#/components/schemas/WorkingHours'
            photos:
              type: array
              items:
                $ref: '#/components/schemas/RestaurantPhoto'

    RestaurantPhoto:
      type: object
      required: [id, imageUrl, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        imageUrl:
          type: string
          format: uri
        sortOrder:
          type: integer

    RestaurantPhotoUpsertRequest:
      type: object
      required: [imageUrl, sortOrder]
      properties:
        imageUrl:
          type: string
          format: uri
        sortOrder:
          type: integer

    MenuCategory:
      type: object
      required: [id, restaurantId, name, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        name:
          type: string
        sortOrder:
          type: integer

    MenuCategoryUpsertRequest:
      type: object
      required: [name, sortOrder]
      properties:
        name:
          type: string
          maxLength: 120
        sortOrder:
          type: integer

    MenuItem:
      type: object
      required: [id, name, menuCategoryId, priceMinor, currencyCode, isAvailable]
      properties:
        id:
          type: string
          format: uuid
        menuCategoryId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        priceMinor:
          type: integer
          example: 89000
        currencyCode:
          type: string
          example: RUB
        isAvailable:
          type: boolean

    MenuItemUpsertRequest:
      type: object
      required: [menuCategoryId, name, priceMinor, currencyCode]
      properties:
        menuCategoryId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 160
        description:
          type: string
          nullable: true
        priceMinor:
          type: integer
          minimum: 0
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3
        isAvailable:
          type: boolean

    MenuCategoryWithItems:
      type: object
      required: [id, name, sortOrder, items]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sortOrder:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'

    AvailabilitySlot:
      type: object
      required: [tableId, tableNumber, startsAt, endsAt, seatsCount]
      properties:
        tableId:
          type: string
          format: uuid
        tableNumber:
          type: string
          example: T-12
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        seatsCount:
          type: integer
          minimum: 1

    CreateBookingRequest:
      type: object
      required: [restaurantId, tableId, startsAt, endsAt, guestsCount]
      properties:
        restaurantId:
          type: string
          format: uuid
        tableId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        guestsCount:
          type: integer
          minimum: 1
          maximum: 20
        specialRequests:
          type: string
          maxLength: 1000
          nullable: true

    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, COMPLETED, CANCELLED]
      example: CONFIRMED

    Booking:
      type: object
      required: [id, status, guestsCount, startsAt, endsAt, restaurant, table, createdAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BookingStatus'
        guestsCount:
          type: integer
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        specialRequests:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        restaurant:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        table:
          type: object
          required: [id, tableNumber, seatsCount]
          properties:
            id:
              type: string
              format: uuid
            tableNumber:
              type: string
            seatsCount:
              type: integer

    AdminUpdateBookingRequest:
      type: object
      properties:
        tableId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        guestsCount:
          type: integer
          minimum: 1
          maximum: 20
        status:
          $ref: '#/components/schemas/BookingStatus'
        specialRequests:
          type: string
          maxLength: 1000
          nullable: true

    CreateReviewRequest:
      type: object
      required: [bookingId, rating]
      properties:
        bookingId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 2000
          nullable: true

    Review:
      type: object
      required: [id, bookingId, rating, author, createdAt]
      properties:
        id:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        author:
          type: object
          required: [id, firstName, lastName]
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
            lastName:
              type: string

    ReviewUpdateRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 2000
          nullable: true

    UserPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    RestaurantTablePage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RestaurantTable'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    MenuCategoryPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuCategory'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    MenuItemPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    RestaurantPhotoPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RestaurantPhoto'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    RestaurantPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RestaurantSummary'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    BookingPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    ReviewPage:
      type: object
      required: [items, page, size, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [timestamp, status, error, message, path]
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-04-01T20:15:00Z'
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed for field email
        path:
          type: string
          example: /api/v1/auth/register
        details:
          type: array
          items:
            type: string
