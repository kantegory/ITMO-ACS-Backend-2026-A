    # ── RABBITMQ EVENT SCHEMAS ──

    UserRegisteredEvent:
      description: |
        Exchange: auth | Routing key: user.registered
        Publisher: auth-service | Consumer: notification-service
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: integer
          example: 42
        email:
          type: string
          format: email
          example: v.persuk@example.com
        first_name:
          type: string
          example: Виктория

    ReservationCreatedEvent:
      description: |
        Exchange: reservations | Routing key: reservation.created
        Publisher: reservation-service | Consumer: notification-service
      type: object
      required: [reservation_id, user_id, table_id, restaurant_id, reservation_time, guest_number]
      properties:
        reservation_id:
          type: integer
          example: 101
        user_id:
          type: integer
          example: 42
        table_id:
          type: integer
          example: 15
        restaurant_id:
          type: integer
          example: 7
        reservation_time:
          type: string
          format: date-time
          example: "2026-06-01T19:00:00Z"
        guest_number:
          type: integer
          example: 2

    ReservationCancelledEvent:
      description: |
        Exchange: reservations | Routing key: reservation.cancelled
        Publisher: reservation-service | Consumer: notification-service
      type: object
      required: [reservation_id, user_id]
      properties:
        reservation_id:
          type: integer
          example: 101
        user_id:
          type: integer
          example: 42
        reason:
          type: string
          example: Отменено пользователем

    RestaurantStatusChangedEvent:
      description: |
        Exchange: restaurants | Routing key: restaurant.status_changed
        Publisher: restaurant-service | Consumer: notification-service
      type: object
      required: [restaurant_id, old_status, new_status, owner_user_id]
      properties:
        restaurant_id:
          type: integer
          example: 7
        restaurant_name:
          type: string
          example: Sakura Garden
        old_status:
          type: string
          enum: [Pending, Verified, Rejected]
          example: Pending
        new_status:
          type: string
          enum: [Pending, Verified, Rejected]
          example: Verified
        owner_user_id:
          type: integer
          example: 5

    ReviewCreatedEvent:
      description: |
        Exchange: reviews | Routing key: review.created
        Publisher: review-service | Consumer: restaurant-service (пересчёт рейтинга)
      type: object
      required: [review_id, restaurant_id, user_id, rating]
      properties:
        review_id:
          type: integer
          example: 200
        restaurant_id:
          type: integer
          example: 7
        user_id:
          type: integer
          example: 42
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          example: Отличная еда, рекомендую!

    ReviewDeletedEvent:
      description: |
        Exchange: reviews | Routing key: review.deleted
        Publisher: review-service | Consumer: restaurant-service (пересчёт рейтинга)
      type: object
      required: [review_id, restaurant_id]
      properties:
        review_id:
          type: integer
          example: 200
        restaurant_id:
          type: integer
          example: 7
