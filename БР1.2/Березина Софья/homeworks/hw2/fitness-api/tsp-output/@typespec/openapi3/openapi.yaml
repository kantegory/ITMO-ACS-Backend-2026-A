openapi: 3.0.0
info:
  title: Fitness Platform API
  version: 0.0.0
tags:
  - name: Authentication
  - name: Users
  - name: Progress
  - name: Workouts
  - name: User Workouts
  - name: Blog
  - name: Admin Workouts
  - name: Admin Blog
paths:
  /admin/blog/posts:
    post:
      operationId: AdminBlog_createPost
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPost'
      tags:
        - Admin Blog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlogPostRequest'
  /admin/blog/posts/{post_id}:
    put:
      operationId: AdminBlog_updatePost
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPost'
      tags:
        - Admin Blog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlogPostRequest'
    delete:
      operationId: AdminBlog_deletePost
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Admin Blog
  /admin/workouts:
    post:
      operationId: AdminWorkouts_createWorkout
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
      tags:
        - Admin Workouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
  /admin/workouts/{workout_id}:
    put:
      operationId: AdminWorkouts_updateWorkout
      parameters:
        - name: workout_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
      tags:
        - Admin Workouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
    delete:
      operationId: AdminWorkouts_deleteWorkout
      parameters:
        - name: workout_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Admin Workouts
  /auth/login:
    post:
      operationId: Auth_login
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /auth/logout:
    post:
      operationId: Auth_logout
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Authentication
  /auth/refresh:
    post:
      operationId: Auth_refresh
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                required:
                  - access_token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
  /auth/register:
    post:
      operationId: Auth_register
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
  /blog/posts:
    get:
      operationId: Blog_getPosts
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BlogCategory'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogPost'
      tags:
        - Blog
  /blog/posts/{id}:
    get:
      operationId: Blog_getPostById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPost'
      tags:
        - Blog
  /progress:
    get:
      operationId: Progress_getProgress
      parameters:
        - name: start_date
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: end_date
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProgress'
      tags:
        - Progress
    post:
      operationId: Progress_addProgress
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProgress'
      tags:
        - Progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProgressRequest'
  /progress/stats:
    get:
      operationId: Progress_getStats
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - week
              - month
              - year
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressStats'
      tags:
        - Progress
  /user/workouts:
    get:
      operationId: UserWorkouts_getUserWorkouts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserWorkoutStatus'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserWorkout'
      tags:
        - User Workouts
    post:
      operationId: UserWorkouts_assignWorkout
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkout'
      tags:
        - User Workouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignWorkoutRequest'
  /user/workouts/{user_workout_id}:
    patch:
      operationId: UserWorkouts_updateUserWorkout
      parameters:
        - name: user_workout_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWorkout'
      tags:
        - User Workouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserWorkoutRequest'
  /users/me:
    get:
      operationId: Users_getMyProfile
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  profile:
                    $ref: '#/components/schemas/UserProfile'
                required:
                  - user
                  - profile
      tags:
        - Users
  /users/me/password:
    put:
      operationId: Users_changePassword
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
  /users/me/profile:
    patch:
      operationId: Users_updateProfile
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
  /workouts:
    get:
      operationId: Workouts_getWorkouts
      parameters:
        - $ref: '#/components/parameters/WorkoutFilterParams.type'
        - $ref: '#/components/parameters/WorkoutFilterParams.difficulty_level'
        - $ref: '#/components/parameters/WorkoutFilterParams.duration_min_min'
        - $ref: '#/components/parameters/WorkoutFilterParams.duration_min_max'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workout'
      tags:
        - Workouts
  /workouts/{workout_id}:
    get:
      operationId: Workouts_getWorkoutById
      parameters:
        - name: workout_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  workout:
                    $ref: '#/components/schemas/Workout'
                required:
                  - workout
      tags:
        - Workouts
  /workouts/{workout_id}/exercises:
    get:
      operationId: Workouts_getWorkoutExercises
      parameters:
        - name: workout_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      tags:
        - Workouts
components:
  parameters:
    WorkoutFilterParams.difficulty_level:
      name: difficulty_level
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/DifficultyLevel'
      explode: false
    WorkoutFilterParams.duration_min_max:
      name: duration_min_max
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    WorkoutFilterParams.duration_min_min:
      name: duration_min_min
      in: query
      required: false
      schema:
        type: integer
        format: int32
      explode: false
    WorkoutFilterParams.type:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/WorkoutType'
      explode: false
  schemas:
    ActivityLevel:
      type: string
      enum:
        - sedentary
        - light
        - moderate
        - active
        - very_active
    AssignWorkoutRequest:
      type: object
      required:
        - workout_id
      properties:
        workout_id:
          type: string
        scheduled_date:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - access_token
        - refresh_token
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
    BlogCategory:
      type: string
      enum:
        - nutrition
        - health
        - motivation
        - recovery
        - science
    BlogPost:
      type: object
      required:
        - id
        - title
        - content
        - category
        - author_id
        - created_at
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        featured_image:
          type: string
        category:
          $ref: '#/components/schemas/BlogCategory'
        author_id:
          type: string
        created_at:
          type: string
          format: date-time
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 6
    CreateBlogPostRequest:
      type: object
      required:
        - title
        - content
        - category
      properties:
        title:
          type: string
        content:
          type: string
        featured_image:
          type: string
        category:
          $ref: '#/components/schemas/BlogCategory'
    CreateProgressRequest:
      type: object
      required:
        - date
        - weight_kg
      properties:
        date:
          type: string
          format: date
        height_cm:
          type: number
          format: float
        weight_kg:
          type: number
          format: float
        muscle_mass_kg:
          type: number
          format: float
    CreateWorkoutRequest:
      type: object
      required:
        - title
        - type
        - difficulty_level
        - duration_min
      properties:
        title:
          type: string
        type:
          $ref: '#/components/schemas/WorkoutType'
        difficulty_level:
          $ref: '#/components/schemas/DifficultyLevel'
        description:
          type: string
        duration_min:
          type: integer
          format: int32
        video_url:
          type: string
        instructions:
          type: string
        exercises:
          type: array
          items:
            type: string
    DifficultyLevel:
      type: string
      enum:
        - beginner
        - intermediate
        - advanced
    ErrorResponse:
      type: object
      required:
        - error
        - message
        - status_code
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
          format: int32
    FitnessLevel:
      type: string
      enum:
        - beginner
        - intermediate
        - advanced
        - professional
    Gender:
      type: string
      enum:
        - male
        - female
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ProgressStats:
      type: object
      required:
        - weight_change
        - muscle_change
        - start_date
        - end_date
        - measurements
      properties:
        weight_change:
          type: number
          format: float
        muscle_change:
          type: number
          format: float
        start_date:
          type: string
        end_date:
          type: string
        measurements:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              weight_kg:
                type: number
                format: float
              muscle_mass_kg:
                type: number
                format: float
            required:
              - date
              - weight_kg
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - full_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        full_name:
          type: string
    ResourceId:
      type: object
      required:
        - id
      properties:
        id:
          type: string
    Timestamps:
      type: object
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        fitness_level:
          $ref: '#/components/schemas/FitnessLevel'
        height_cm:
          type: number
          format: float
        weight_kg:
          type: number
          format: float
        activity_level:
          $ref: '#/components/schemas/ActivityLevel'
        avatar_url:
          type: string
    UpdateUserWorkoutRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/UserWorkoutStatus'
        rating:
          type: integer
          format: int32
    User:
      type: object
      required:
        - id
        - email
        - role
        - created_at
        - updated_at
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserProfile:
      type: object
      required:
        - id
        - user_id
      properties:
        id:
          type: string
        user_id:
          type: string
        full_name:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        fitness_level:
          $ref: '#/components/schemas/FitnessLevel'
        height_cm:
          type: number
          format: float
        weight_kg:
          type: number
          format: float
        activity_level:
          $ref: '#/components/schemas/ActivityLevel'
        avatar_url:
          type: string
    UserProgress:
      type: object
      required:
        - id
        - user_id
        - date
        - weight_kg
      properties:
        id:
          type: string
        user_id:
          type: string
        date:
          type: string
          format: date
        height_cm:
          type: number
          format: float
        weight_kg:
          type: number
          format: float
        muscle_mass_kg:
          type: number
          format: float
    UserRole:
      type: string
      enum:
        - user
        - admin
        - trainer
    UserWorkout:
      type: object
      required:
        - id
        - user_id
        - workout_id
        - status
      properties:
        id:
          type: integer
          format: int32
        user_id:
          type: string
        workout_id:
          type: string
        status:
          $ref: '#/components/schemas/UserWorkoutStatus'
        scheduled_date:
          type: string
        completed_date:
          type: string
          format: date-time
        rating:
          type: integer
          format: int32
    UserWorkoutStatus:
      type: string
      enum:
        - scheduled
        - in_progress
        - completed
        - skipped
    Workout:
      type: object
      required:
        - id
        - title
        - type
        - difficulty_level
        - duration_min
        - created_by
        - created_at
      properties:
        id:
          type: string
        title:
          type: string
        type:
          $ref: '#/components/schemas/WorkoutType'
        difficulty_level:
          $ref: '#/components/schemas/DifficultyLevel'
        description:
          type: string
        duration_min:
          type: integer
          format: int32
        video_url:
          type: string
        instructions:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
    WorkoutType:
      type: string
      enum:
        - cardio
        - strength
        - hiit
        - yoga
        - pilates
        - stretching
servers:
  - url: http://localhost:3000/api/v1
    description: Local server
    variables: {}
