services:
  # ── Shared Database ────────────────────────────────────────────────────────

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_db
      POSTGRES_PASSWORD: app_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  # ── Message Broker ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # ── Services ───────────────────────────────────────────────────────────────

  auth-service:
    build: ./services/auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      APP_PORT: 3001
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      JWT_ACCESS_TOKEN_LIFETIME: 300
      JWT_REFRESH_TOKEN_LIFETIME: 604800
      SERVICE_TOKEN: internal-service-token
      USER_SERVICE_URL: http://user-service:3002/api/v1
    depends_on:
      - db

  user-service:
    build: ./services/user-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      APP_PORT: 3002
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      SERVICE_TOKEN: internal-service-token
      REVIEW_SERVICE_URL: http://review-service:3006/api/v1
    depends_on:
      - db

  property-service:
    build: ./services/property-service
    restart: always
    ports:
      - "3003:3003"
    environment:
      APP_PORT: 3003
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      SERVICE_TOKEN: internal-service-token
      USER_SERVICE_URL: http://user-service:3002/api/v1
      REVIEW_SERVICE_URL: http://review-service:3006/api/v1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - db
      - rabbitmq

  rental-service:
    build: ./services/rental-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      APP_PORT: 3004
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      SERVICE_TOKEN: internal-service-token
      USER_SERVICE_URL: http://user-service:3002/api/v1
      PROPERTY_SERVICE_URL: http://property-service:3003/api/v1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - db
      - rabbitmq

  messaging-service:
    build: ./services/messaging-service
    restart: always
    ports:
      - "3005:3005"
    environment:
      APP_PORT: 3005
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      SERVICE_TOKEN: internal-service-token
      USER_SERVICE_URL: http://user-service:3002/api/v1
    depends_on:
      - db

  review-service:
    build: ./services/review-service
    restart: always
    ports:
      - "3006:3006"
    environment:
      APP_PORT: 3006
      APP_HOST: 0.0.0.0
      APP_API_PREFIX: /api/v1
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: app_db
      DB_USER: app_db
      DB_PASSWORD: app_db
      JWT_SECRET_KEY: supersecret
      SERVICE_TOKEN: internal-service-token
      RENTAL_SERVICE_URL: http://rental-service:3004/api/v1
      PROPERTY_SERVICE_URL: http://property-service:3003/api/v1
      USER_SERVICE_URL: http://user-service:3002/api/v1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - db
      - rabbitmq

  api-gateway:
    build: ./services/api-gateway
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_PORT: 8000
      APP_HOST: 0.0.0.0
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      PROPERTY_SERVICE_URL: http://property-service:3003
      RENTAL_SERVICE_URL: http://rental-service:3004
      MESSAGING_SERVICE_URL: http://messaging-service:3005
      REVIEW_SERVICE_URL: http://review-service:3006
    depends_on:
      - auth-service
      - user-service
      - property-service
      - rental-service
      - messaging-service
      - review-service

volumes:
  db-data:
  rabbitmq-data:
