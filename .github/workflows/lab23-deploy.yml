name: Lab23 Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lab23-deploy.yml"
      - "scripts/lab23/**"
      - "infra/nginx/**"
      - "БР1.2/Алексеев Андрей/labs/lab23/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LAB23_SSH_HOST }}
          username: ${{ secrets.LAB23_SSH_USER }}
          key: ${{ secrets.LAB23_SSH_KEY }}
          command_timeout: 1h
          script: |
            export APP_ROOT="$HOME/apps/itmo-acs-backend"
            export BRANCH=main
            export REPO_URL='https://github.com/pxdkxvan/ITMO-ACS-Backend-2026-A.git'
            mkdir -p "$(dirname "$APP_ROOT")"
            if [ ! -d "$APP_ROOT/.git" ]; then
              rm -rf "$APP_ROOT"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_ROOT"
            fi
            if [ -n "$(git -C "$APP_ROOT" status --porcelain 2>/dev/null || true)" ]; then
              rm -rf "$APP_ROOT"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_ROOT"
            fi
            git -C "$APP_ROOT" fetch origin "$BRANCH"
            git -C "$APP_ROOT" checkout "$BRANCH"
            git -C "$APP_ROOT" reset --hard "origin/$BRANCH"
            bash "$APP_ROOT/scripts/lab23/deploy_remote.sh"
            bash "$APP_ROOT/scripts/lab23/configure_nginx.sh" "$APP_ROOT/infra/nginx/lab23.conf"
