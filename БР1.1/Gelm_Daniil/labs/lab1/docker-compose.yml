services:
  postgres:
    image: postgres:16-alpine
    container_name: job_search_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_search
    ports:
      - "5433:5432"
    volumes:
      - job_search_data:/var/lib/postgresql/data

volumes:
  job_search_data:
