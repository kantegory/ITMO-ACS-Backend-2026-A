openapi: 3.0.3
info:
  title: Межсервисное API (внутренние вызовы)
  description: |
    Эндпоинты для синхронного взаимодействия между микросервисами системы бронирования.
    Аутентификация — заголовок `X-Internal-Token` (общий секрет в конфигурации сервисов).
  version: "1.0.0"

tags:
  - name: user-internal
  - name: restaurant-internal

paths:
  /internal/users/{userId}:
    get:
      tags: [user-internal]
      summary: Получить пользователя по идентификатору
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Internal-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "403":
          description: Неверный внутренний токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/tables/{tableId}:
    get:
      tags: [restaurant-internal]
      summary: Проверить столик и принадлежность ресторану
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: restaurant_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Internal-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Столик найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableInternal"
        "400":
          description: Не передан restaurant_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Неверный внутренний токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Столик не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TableInternal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_number:
          type: string
        capacity:
          type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
