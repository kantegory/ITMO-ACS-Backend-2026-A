services:
  postgres:
    image: postgres:17-alpine
    container_name: vacancies-postgres-express
    environment:
      POSTGRES_USER: vacancies
      POSTGRES_PASSWORD: vacancies
      POSTGRES_DB: vacancies
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacancies -d vacancies"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
