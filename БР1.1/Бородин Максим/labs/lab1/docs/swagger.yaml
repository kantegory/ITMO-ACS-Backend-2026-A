openapi: 3.0.3
info:
  title: Restaurant Table Booking API
  description: REST API для приложения бронирования столиков в ресторане
  version: 1.0.0
  contact:
    name: Бородин Максим, БР1.1
  license:
    name: MIT

servers:
  - url: http://api.restaurant-booking.example.com
    description: Продуктовый сервер
  - url: http://localhost:8080
    description: Локальный сервер разработки

security: []

tags:
  - name: auth
    description: Аутентификация и регистрация
  - name: profile
    description: Личный кабинет пользователя
  - name: restaurants
    description: Рестораны, меню, отзывы
  - name: bookings
    description: Бронирования столиков
  - name: admin
    description: Административные операции

paths:
  /register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Регистрация нового пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Вход пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Получить профиль текущего пользователя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: Список ресторанов с фильтрацией
      security: []
      parameters:
        - name: cuisine
          in: query
          schema:
            type: string
          description: Фильтр по типу кухни
        - name: location
          in: query
          schema:
            type: string
          description: Фильтр по расположению
        - name: price_range
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 3
          description: Фильтр по ценовому диапазону (1=бюджетно, 2=средне, 3=дорого)
        - name: search
          in: query
          schema:
            type: string
          description: Поиск по названию
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список ресторанов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RestaurantShort'
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  /restaurants/{id}:
    get:
      operationId: getRestaurant
      tags: [restaurants]
      summary: Информация о ресторане
      security: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Детальная информация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /restaurants/{id}/menu:
    get:
      operationId: getRestaurantMenu
      tags: [restaurants]
      summary: Меню ресторана
      security: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Список позиций меню
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MenuItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /restaurants/{id}/reviews:
    get:
      operationId: listRestaurantReviews
      tags: [restaurants]
      summary: Отзывы о ресторане
      security: []
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список отзывов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  total:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: addRestaurantReview
      tags: [restaurants]
      summary: Добавить отзыв о ресторане
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddReviewRequest'
      responses:
        '201':
          description: Отзыв добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /restaurants/{id}/tables/availability:
    get:
      operationId: getTableAvailability
      tags: [restaurants]
      summary: Доступные столики на дату
      security: []
      parameters:
        - $ref: '#/components/parameters/ID'
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Дата в формате YYYY-MM-DD
        - name: time_from
          in: query
          schema:
            type: string
            example: "18:00"
          description: Начало желаемого интервала (HH:MM)
        - name: time_to
          in: query
          schema:
            type: string
            example: "20:00"
          description: Конец желаемого интервала (HH:MM)
        - name: guests
          in: query
          schema:
            type: integer
            minimum: 1
          description: Количество гостей
      responses:
        '200':
          description: Список столиков с признаком доступности
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TableAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Создать бронирование
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bookings/my:
    get:
      operationId: getMyBookings
      tags: [bookings]
      summary: История бронирований текущего пользователя
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список бронирований
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Отменить бронирование
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Бронирование отменено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/restaurants:
    post:
      operationId: adminCreateRestaurant
      tags: [admin]
      summary: Создать ресторан (только admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '201':
          description: Ресторан создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/restaurants/{id}/tables:
    post:
      operationId: adminCreateTable
      tags: [admin]
      summary: Добавить столик в ресторан (только admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        '201':
          description: Столик добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: Все бронирования (только admin)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список всех бронирований
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Нет доступа
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Конфликт данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: email already exists

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT токен

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time

    RestaurantShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cuisine_type:
          type: string
        location:
          type: string
        price_range:
          type: integer
          minimum: 1
          maximum: 3
        avg_rating:
          type: number
          format: float

    RestaurantDetail:
      allOf:
        - $ref: '#/components/schemas/RestaurantShort'
        - type: object
          properties:
            description:
              type: string
            photos:
              type: array
              items:
                type: string
            created_at:
              type: string
              format: date-time

    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    AddReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    Table:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_number:
          type: integer
        capacity:
          type: integer

    TableAvailability:
      allOf:
        - $ref: '#/components/schemas/Table'
        - type: object
          properties:
            is_available:
              type: boolean

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        booked_date:
          type: string
          format: date
        time_from:
          type: string
          example: "18:00"
        time_to:
          type: string
          example: "20:00"
        guests_count:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        created_at:
          type: string
          format: date-time

    CreateBookingRequest:
      type: object
      required: [table_id, booked_date, time_from, time_to, guests_count]
      properties:
        table_id:
          type: string
          format: uuid
        booked_date:
          type: string
          format: date
        time_from:
          type: string
          example: "18:00"
        time_to:
          type: string
          example: "20:00"
        guests_count:
          type: integer
          minimum: 1

    CreateRestaurantRequest:
      type: object
      required: [name, cuisine_type, location, price_range]
      properties:
        name:
          type: string
        description:
          type: string
        cuisine_type:
          type: string
        location:
          type: string
        price_range:
          type: integer
          minimum: 1
          maximum: 3

    CreateTableRequest:
      type: object
      required: [table_number, capacity]
      properties:
        table_number:
          type: integer
        capacity:
          type: integer
          minimum: 1
