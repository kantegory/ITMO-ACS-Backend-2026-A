openapi: 3.0.3
info:
  title: Job Search API
  description: REST API для сайта поиска работы (университетский проект)
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
  - name: Candidate
  - name: Employer
  - name: Vacancies
  - name: References
  - name: System

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/register/candidate:
    post:
      tags: [Auth]
      summary: Регистрация соискателя
      operationId: registerCandidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCandidateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/register/employer:
    post:
      tags: [Auth]
      summary: Регистрация работодателя
      operationId: registerEmployer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmployerRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /candidate/profile:
    get:
      tags: [Candidate]
      summary: Профиль соискателя
      security: [{ bearerAuth: [] }]
      operationId: getCandidateProfile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Candidate]
      summary: Обновить профиль соискателя
      security: [{ bearerAuth: [] }]
      operationId: updateCandidateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCandidateProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /candidate/resume:
    get:
      tags: [Candidate]
      summary: Получить резюме
      security: [{ bearerAuth: [] }]
      operationId: getResume
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Candidate]
      summary: Создать или обновить резюме
      security: [{ bearerAuth: [] }]
      operationId: upsertResume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertResumeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /candidate/resume/experiences:
    post:
      tags: [Candidate]
      summary: Добавить опыт работы
      security: [{ bearerAuth: [] }]
      operationId: addWorkExperience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkExperienceInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkExperience'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /candidate/resume/experiences/{id}:
    put:
      tags: [Candidate]
      summary: Обновить опыт работы
      security: [{ bearerAuth: [] }]
      operationId: updateWorkExperience
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkExperienceInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkExperience'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Candidate]
      summary: Удалить опыт работы
      security: [{ bearerAuth: [] }]
      operationId: deleteWorkExperience
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /candidate/resume/educations:
    post:
      tags: [Candidate]
      summary: Добавить образование
      security: [{ bearerAuth: [] }]
      operationId: addEducation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Education'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /candidate/resume/educations/{id}:
    put:
      tags: [Candidate]
      summary: Обновить образование
      security: [{ bearerAuth: [] }]
      operationId: updateEducation
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EducationInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Education'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Candidate]
      summary: Удалить образование
      security: [{ bearerAuth: [] }]
      operationId: deleteEducation
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /employer/profile:
    get:
      tags: [Employer]
      summary: Профиль работодателя
      security: [{ bearerAuth: [] }]
      operationId: getEmployerProfile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Employer]
      summary: Обновить профиль работодателя
      security: [{ bearerAuth: [] }]
      operationId: updateEmployerProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployerProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /employer/vacancies:
    get:
      tags: [Employer]
      summary: Список вакансий работодателя
      security: [{ bearerAuth: [] }]
      operationId: listEmployerVacancies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Employer]
      summary: Создать вакансию
      security: [{ bearerAuth: [] }]
      operationId: createVacancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVacancyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /employer/vacancies/{id}:
    get:
      tags: [Employer]
      summary: Вакансия работодателя по ID
      security: [{ bearerAuth: [] }]
      operationId: getEmployerVacancy
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Employer]
      summary: Обновить вакансию
      security: [{ bearerAuth: [] }]
      operationId: updateVacancy
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVacancyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Employer]
      summary: Удалить вакансию
      security: [{ bearerAuth: [] }]
      operationId: deleteVacancy
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /employer/vacancies/{id}/publish:
    patch:
      tags: [Employer]
      summary: Опубликовать вакансию
      security: [{ bearerAuth: [] }]
      operationId: publishVacancy
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /employer/vacancies/{id}/unpublish:
    patch:
      tags: [Employer]
      summary: Снять вакансию с публикации
      security: [{ bearerAuth: [] }]
      operationId: unpublishVacancy
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vacancies:
    get:
      tags: [Vacancies]
      summary: Поиск опубликованных вакансий
      operationId: searchVacancies
      parameters:
        - name: industry_id
          in: query
          schema:
            type: string
            format: uuid
        - name: experience_level_id
          in: query
          schema:
            type: string
            format: uuid
        - name: salary_min
          in: query
          description: Минимальная желаемая зарплата соискателя
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          description: Поиск по названию
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /vacancies/{id}:
    get:
      tags: [Vacancies]
      summary: Детали опубликованной вакансии
      operationId: getVacancyById
      parameters:
        - $ref: '#/components/parameters/UuidPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /industries:
    get:
      tags: [References]
      summary: Список отраслей
      operationId: listIndustries
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Industry'

  /experience-levels:
    get:
      tags: [References]
      summary: Список уровней опыта
      operationId: listExperienceLevels
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExperienceLevel'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UuidPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict (e.g. duplicate email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: array
              items:
                type: string

    RegisterCandidateRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string
          minLength: 2

    RegisterEmployerRequest:
      type: object
      required: [email, password, company_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        company_name:
          type: string
          minLength: 2

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [candidate, employer]

    CandidateProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        phone:
          type: string
        city:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true

    UpdateCandidateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
        city:
          type: string
        birth_date:
          type: string
          format: date

    Resume:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        skills:
          type: string
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperience'
        educations:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        updated_at:
          type: string
          format: date-time

    UpsertResumeRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        skills:
          type: string

    WorkExperience:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_name:
          type: string
        position:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        description:
          type: string
        sort_order:
          type: integer

    WorkExperienceInput:
      type: object
      required: [company_name, position, start_date]
      properties:
        company_name:
          type: string
        position:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        description:
          type: string
        sort_order:
          type: integer

    Education:
      type: object
      properties:
        id:
          type: string
          format: uuid
        institution:
          type: string
        degree:
          type: string
        graduation_year:
          type: integer
        sort_order:
          type: integer

    EducationInput:
      type: object
      required: [institution, degree, graduation_year]
      properties:
        institution:
          type: string
        degree:
          type: string
        graduation_year:
          type: integer
        sort_order:
          type: integer

    EmployerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_name:
          type: string
        company_description:
          type: string
        website:
          type: string
        logo_url:
          type: string

    UpdateEmployerProfileRequest:
      type: object
      properties:
        company_name:
          type: string
        company_description:
          type: string
        website:
          type: string
        logo_url:
          type: string

    Industry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    ExperienceLevel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        min_years:
          type: integer
        max_years:
          type: integer
          nullable: true

    VacancyListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        salary_from:
          type: integer
          nullable: true
        salary_to:
          type: integer
          nullable: true
        salary_currency:
          type: string
        location:
          type: string
        is_published:
          type: boolean
        industry:
          $ref: '#/components/schemas/Industry'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevel'
        company_name:
          type: string

    VacancyDetail:
      allOf:
        - $ref: '#/components/schemas/VacancyListItem'
        - type: object
          properties:
            description:
              type: string
            requirements:
              type: string
            employer:
              $ref: '#/components/schemas/EmployerProfile'
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    VacancyListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VacancyListItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CreateVacancyRequest:
      type: object
      required: [title, description, requirements, industry_id, experience_level_id]
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        industry_id:
          type: string
          format: uuid
        experience_level_id:
          type: string
          format: uuid
        salary_from:
          type: integer
        salary_to:
          type: integer
        salary_currency:
          type: string
          default: RUB
        location:
          type: string
        is_published:
          type: boolean
          default: false

    UpdateVacancyRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        industry_id:
          type: string
          format: uuid
        experience_level_id:
          type: string
          format: uuid
        salary_from:
          type: integer
        salary_to:
          type: integer
        salary_currency:
          type: string
        location:
          type: string
        is_published:
          type: boolean
