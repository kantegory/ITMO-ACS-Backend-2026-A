services:
  postgres:
    image: postgres:15-alpine
    container_name: job-search-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobsearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobsearch"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: job-search-api:latest
    container_name: job-search-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jobsearch?sslmode=disable
      JWT_SECRET: secret-key-for-lab1
      PORT: "8080"
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: