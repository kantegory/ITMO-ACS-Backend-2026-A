basePath: /api/v1
definitions:
  model.Booking:
    properties:
      created_at:
        type: string
      end_date:
        type: string
      guests_count:
        type: integer
      id:
        type: string
      price_total:
        type: number
      property_id:
        type: string
      start_date:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  model.CreateBookingRequest:
    properties:
      end_date:
        type: string
      guests_count:
        type: integer
      property_id:
        type: string
      start_date:
        type: string
    required:
    - end_date
    - guests_count
    - property_id
    - start_date
    type: object
  model.CreatePropertyRequest:
    properties:
      address:
        type: string
      amenity_ids:
        items:
          type: string
        type: array
      area_m2:
        type: number
      beds:
        type: integer
      check_in_time:
        type: string
      check_out_time:
        type: string
      city:
        type: string
      description:
        type: string
      max_guests:
        type: integer
      price_per_night:
        type: number
      property_type:
        type: string
      rooms:
        type: integer
      rules:
        type: string
      title:
        type: string
    required:
    - city
    - description
    - max_guests
    - price_per_night
    - property_type
    - title
    type: object
  model.CreateReviewRequest:
    properties:
      booking_id:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
      text:
        type: string
    required:
    - booking_id
    - rating
    type: object
  model.ErrorResponse:
    properties:
      code:
        type: integer
      details: {}
      message:
        type: string
    type: object
  model.Favorite:
    properties:
      created_at:
        type: string
      property_id:
        type: string
      user_id:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.Message:
    properties:
      chat_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      sender_id:
        type: string
      text:
        type: string
    type: object
  model.PaginatedResponse:
    properties:
      items: {}
      pagination:
        $ref: '#/definitions/model.Pagination'
    type: object
  model.Pagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  model.Property:
    properties:
      address:
        type: string
      area_m2:
        type: number
      beds:
        type: integer
      check_in_time:
        type: string
      check_out_time:
        type: string
      city:
        type: string
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      id:
        type: string
      lat:
        type: number
      lon:
        type: number
      max_guests:
        type: integer
      owner_id:
        type: string
      price_per_night:
        type: number
      property_type:
        type: string
      rooms:
        type: integer
      rules:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  model.Review:
    properties:
      author_id:
        type: string
      booking_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      property_id:
        type: string
      rating:
        type: integer
      text:
        type: string
    type: object
  model.SendMessageRequest:
    properties:
      text:
        type: string
    required:
    - text
    type: object
  model.TokenResponse:
    properties:
      access_token:
        type: string
    type: object
  model.UpdateBookingStatusRequest:
    properties:
      status:
        enum:
        - approved
        - rejected
        - cancelled
        - completed
        type: string
    required:
    - status
    type: object
  model.UpdatePropertyRequest:
    properties:
      amenity_ids:
        items:
          type: string
        type: array
      city:
        type: string
      description:
        type: string
      max_guests:
        type: integer
      price_per_night:
        type: number
      rooms:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
  model.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      phone:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API для сервиса аренды недвижимости
  title: Rental API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Учётные данные
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "401":
          description: Неверный email или пароль
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные для регистрации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "409":
          description: Email или телефон уже занят
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /bookings:
    get:
      parameters:
      - description: Фильтр по статусу
        in: query
        name: status
        type: string
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Мои бронирования (арендатор)
      tags:
      - bookings
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные бронирования
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Объявление не найдено
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "409":
          description: Даты пересекаются
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "422":
          description: Некорректные даты
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать бронирование
      tags:
      - bookings
  /bookings/{bookingId}:
    get:
      parameters:
      - description: ID бронирования
        in: path
        name: bookingId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Booking'
        "403":
          description: Нет доступа
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить бронирование по ID
      tags:
      - bookings
    patch:
      consumes:
      - application/json
      description: approved/rejected/completed — только владелец; cancelled — арендатор
        или владелец
      parameters:
      - description: ID бронирования
        in: path
        name: bookingId
        required: true
        type: string
      - description: Новый статус
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateBookingStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить статус бронирования
      tags:
      - bookings
  /chats:
    get:
      parameters:
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Список чатов пользователя
      tags:
      - chats
  /chats/{chatId}/messages:
    get:
      parameters:
      - description: ID чата
        in: path
        name: chatId
        required: true
        type: string
      - default: 50
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "403":
          description: Не участник чата
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Сообщения чата
      tags:
      - chats
    post:
      consumes:
      - application/json
      parameters:
      - description: ID чата
        in: path
        name: chatId
        required: true
        type: string
      - description: Текст сообщения
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.SendMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Message'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "403":
          description: Не участник чата
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отправить сообщение
      tags:
      - chats
  /favorites:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Property'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Избранные объявления
      tags:
      - favorites
  /favorites/{propertyId}:
    delete:
      parameters:
      - description: ID объявления
        in: path
        name: propertyId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить из избранного
      tags:
      - favorites
    post:
      parameters:
      - description: ID объявления
        in: path
        name: propertyId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Favorite'
        "404":
          description: Объявление не найдено
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "409":
          description: Уже в избранном
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Добавить в избранное
      tags:
      - favorites
  /properties:
    get:
      parameters:
      - description: Город
        in: query
        name: city
        type: string
      - description: Тип (apartment, house, ...)
        in: query
        name: property_type
        type: string
      - description: Минимальная цена за ночь
        in: query
        name: price_min
        type: number
      - description: Максимальная цена за ночь
        in: query
        name: price_max
        type: number
      - description: Кол-во комнат
        in: query
        name: rooms
        type: integer
      - description: Вместимость
        in: query
        name: max_guests
        type: integer
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Список объявлений
      tags:
      - properties
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные объявления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Property'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать объявление
      tags:
      - properties
  /properties/{propertyId}:
    delete:
      parameters:
      - description: ID объявления
        in: path
        name: propertyId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Не владелец
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить объявление
      tags:
      - properties
    get:
      parameters:
      - description: ID объявления
        in: path
        name: propertyId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Property'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Получить объявление по ID
      tags:
      - properties
    patch:
      consumes:
      - application/json
      parameters:
      - description: ID объявления
        in: path
        name: propertyId
        required: true
        type: string
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdatePropertyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Property'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "403":
          description: Не владелец
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить объявление
      tags:
      - properties
  /reviews:
    post:
      consumes:
      - application/json
      description: Только арендатор, у которого статус бронирования completed
      parameters:
      - description: Данные отзыва
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateReviewRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Review'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "403":
          description: Не арендатор этого бронирования
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Бронирование не найдено
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "409":
          description: Отзыв уже существует или бронирование не завершено
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Оставить отзыв
      tags:
      - reviews
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Текущий пользователь
      tags:
      - users
  /users/me/owner/bookings:
    get:
      parameters:
      - description: Фильтр по статусу
        in: query
        name: status
        type: string
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Бронирования моих объявлений (владелец)
      tags:
      - bookings
  /users/me/properties:
    get:
      parameters:
      - default: 20
        description: Лимит
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Мои объявления
      tags:
      - properties
securityDefinitions:
  BearerAuth:
    description: 'Введите токен в формате: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
