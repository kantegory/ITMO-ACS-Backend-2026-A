services:
  postgres:
    image: postgres:16-alpine
    container_name: rental_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rental_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./user-service/migrations:/migrations/user
      - ./property-service/migrations:/migrations/property
      - ./booking-service/migrations:/migrations/booking
      - ./chat-service/migrations:/migrations/chat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rental_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rental_broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: rental_user_service
    ports:
      - "8081:8081"
    environment:
      ENV: docker
      WEB_PORT: ":8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: user_db
      DB_SSLMODE: disable
      JWT_SECRET: supersecretkey
    depends_on:
      postgres:
        condition: service_healthy

  property-service:
    build:
      context: ./property-service
      dockerfile: Dockerfile
    container_name: rental_property_service
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      ENV: docker
      WEB_PORT: ":8082"
      GRPC_PORT: ":9082"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: property_db
      DB_SSLMODE: disable
      JWT_SECRET: supersecretkey
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: rental_booking_service
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      ENV: docker
      WEB_PORT: ":8083"
      GRPC_PORT: ":9083"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: booking_db
      DB_SSLMODE: disable
      JWT_SECRET: supersecretkey
      PROPERTY_SERVICE_URL: "property-service:9082"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      property-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: rental_chat_service
    ports:
      - "8084:8084"
    environment:
      ENV: docker
      WEB_PORT: ":8084"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: chat_db
      DB_SSLMODE: disable
      JWT_SECRET: supersecretkey
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: rental_api_gateway
    ports:
      - "8080:8080"
    environment:
      WEB_PORT: ":8080"
      USER_SERVICE_URL: "http://user-service:8081"
      PROPERTY_SERVICE_GRPC_URL: "property-service:9082"
      BOOKING_SERVICE_GRPC_URL: "booking-service:9083"
      CHAT_SERVICE_URL: "http://chat-service:8084"
    depends_on:
      - user-service
      - property-service
      - booking-service
      - chat-service

volumes:
  pgdata:
