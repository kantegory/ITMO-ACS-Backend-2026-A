syntax = "proto3";

package propertypublic;

option go_package = "internal/pb/propertypb";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service PropertyService {
  rpc ListProperties(ListPropertiesRequest) returns (PropertyListResponse) {
    option (google.api.http) = {
      get: "/api/v1/properties"
    };
  }

  rpc GetProperty(GetPropertyRequest) returns (Property) {
    option (google.api.http) = {
      get: "/api/v1/properties/{property_id}"
    };
  }

  rpc CreateProperty(CreatePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/api/v1/properties"
      body: "*"
    };
  }

  rpc UpdateProperty(UpdatePropertyRequest) returns (Property) {
    option (google.api.http) = {
      patch: "/api/v1/properties/{property_id}"
      body: "*"
    };
  }

  rpc DeleteProperty(DeletePropertyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/properties/{property_id}"
    };
  }

  rpc ListMyProperties(ListMyPropertiesRequest) returns (PropertyListResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/me/properties"
    };
  }

  rpc ListFavorites(google.protobuf.Empty) returns (FavoriteListResponse) {
    option (google.api.http) = {
      get: "/api/v1/favorites"
    };
  }

  rpc AddFavorite(AddFavoriteRequest) returns (Favorite) {
    option (google.api.http) = {
      post: "/api/v1/favorites/{property_id}"
      body: "*"
    };
  }

  rpc RemoveFavorite(RemoveFavoriteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/favorites/{property_id}"
    };
  }
}

message Pagination {
  int32 limit = 1;
  int32 offset = 2;
  int32 total = 3;
}

message Property {
  string id = 1;
  string owner_id = 2;
  string title = 3;
  string description = 4;
  string property_type = 5;
  double price_per_night = 6;
  string currency = 7;
  string city = 8;
  optional string address = 9;
  optional double lat = 10;
  optional double lon = 11;
  optional int32 rooms = 12;
  optional int32 beds = 13;
  int32 max_guests = 14;
  optional double area_m2 = 15;
  optional string check_in_time = 16;
  optional string check_out_time = 17;
  optional string rules = 18;
  string status = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp updated_at = 21;
}

message PropertyListResponse {
  repeated Property items = 1;
  Pagination pagination = 2;
}

message FavoriteListResponse {
  repeated Property items = 1;
}

message GetPropertyRequest {
  string property_id = 1;
}

message ListPropertiesRequest {
  optional string city = 1;
  optional string property_type = 2;
  optional double price_min = 3;
  optional double price_max = 4;
  optional int32 rooms = 5;
  optional int32 max_guests = 6;
  int32 limit = 7;
  int32 offset = 8;
}

message ListMyPropertiesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message CreatePropertyRequest {
  string title = 1;
  string description = 2;
  string property_type = 3;
  double price_per_night = 4;
  string city = 5;
  int32 max_guests = 6;
  optional string address = 7;
  optional int32 rooms = 8;
  optional int32 beds = 9;
  optional double area_m2 = 10;
  optional string check_in_time = 11;
  optional string check_out_time = 12;
  optional string rules = 13;
  repeated string amenity_ids = 14;
}

message UpdatePropertyRequest {
  string property_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional double price_per_night = 4;
  optional string city = 5;
  optional int32 max_guests = 6;
  optional int32 rooms = 7;
  optional string status = 8;
  repeated string amenity_ids = 9;
}

message DeletePropertyRequest {
  string property_id = 1;
}

message AddFavoriteRequest {
  string property_id = 1;
}

message RemoveFavoriteRequest {
  string property_id = 1;
}

message Favorite {
  string user_id = 1;
  string property_id = 2;
  google.protobuf.Timestamp created_at = 3;
}
