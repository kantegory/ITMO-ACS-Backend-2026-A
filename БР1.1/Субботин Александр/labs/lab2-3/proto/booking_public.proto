syntax = "proto3";

package bookingpublic;

option go_package = "internal/pb/bookingpb";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service BookingService {
  rpc CreateBooking(CreateBookingRequest) returns (Booking) {
    option (google.api.http) = {
      post: "/api/v1/bookings"
      body: "*"
    };
  }

  rpc ListBookings(ListBookingsRequest) returns (BookingListResponse) {
    option (google.api.http) = {
      get: "/api/v1/bookings"
    };
  }

  rpc GetBooking(GetBookingRequest) returns (Booking) {
    option (google.api.http) = {
      get: "/api/v1/bookings/{booking_id}"
    };
  }

  rpc UpdateBookingStatus(UpdateBookingStatusRequest) returns (Booking) {
    option (google.api.http) = {
      patch: "/api/v1/bookings/{booking_id}"
      body: "*"
    };
  }

  rpc ListOwnerBookings(ListBookingsRequest) returns (BookingListResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/me/owner/bookings"
    };
  }

  rpc CreateReview(CreateReviewRequest) returns (Review) {
    option (google.api.http) = {
      post: "/api/v1/reviews"
      body: "*"
    };
  }
}

message Pagination {
  int32 limit = 1;
  int32 offset = 2;
  int32 total = 3;
}

message Booking {
  string id = 1;
  string property_id = 2;
  string tenant_id = 3;
  string start_date = 4;
  string end_date = 5;
  int32 guests_count = 6;
  double price_total = 7;
  string status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Review {
  string id = 1;
  string booking_id = 2;
  string property_id = 3;
  string author_id = 4;
  int32 rating = 5;
  optional string text = 6;
  google.protobuf.Timestamp created_at = 7;
}

message BookingListResponse {
  repeated Booking items = 1;
  Pagination pagination = 2;
}

message ListBookingsRequest {
  optional string status = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message CreateBookingRequest {
  string property_id = 1;
  string start_date = 2;
  string end_date = 3;
  int32 guests_count = 4;
}

message GetBookingRequest {
  string booking_id = 1;
}

message UpdateBookingStatusRequest {
  string booking_id = 1;
  string status = 2;
}

message CreateReviewRequest {
  string booking_id = 1;
  int32 rating = 2;
  optional string text = 3;
}
