syntax = "proto3";

package property;

option go_package = "internal/pb";

service PropertyInternal {
  rpc GetByID(GetPropertyRequest) returns (PropertyResponse);

  rpc ListIDsByOwner(ListIDsByOwnerRequest) returns (ListIDsByOwnerResponse);
}

message GetPropertyRequest {
  string property_id = 1;
}

message PropertyResponse {
  string id = 1;
  string owner_id = 2;
  double price_per_night = 3;
  string title = 4;
  string status = 5;
}

message ListIDsByOwnerRequest {
  string owner_id = 1;
}

message ListIDsByOwnerResponse {
  repeated string property_ids = 1;
}
