  # ══════════════════════════════════════
  # APPLICATION-SERVICE — Public (server: :3004)
  # ══════════════════════════════════════

  /api/v1/applications:
    post:
      tags: [Applications]
      operationId: createApplication
      summary: Откликнуться на вакансию (только SEEKER)
      description: |
        Создаёт отклик. Перед созданием:
        1. Вызывает resume-service GET /internal/resumes/:resumeId — проверяет существование и владельца
        2. Вызывает vacancy-service GET /internal/vacancies/:vacancyId — проверяет существование

        После создания публикует событие `application.created` в RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Отклик создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Резюме или вакансия не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 404
                message: Resume not found
        '409':
          description: Отклик с этим резюме уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 409
                message: Already applied with this resume
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/applications/my:
    get:
      tags: [Applications]
      operationId: getMyApplications
      summary: Мои отклики (только SEEKER)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/applications/{applicationId}:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Applications]
      operationId: getApplication
      summary: Детали отклика (SEEKER — свой, EMPLOYER — на свою вакансию)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/applications/{applicationId}/status:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Applications]
      operationId: updateApplicationStatus
      summary: Сменить статус отклика (только EMPLOYER — автор вакансии)
      description: |
        После смены статуса публикует событие `application.status_changed` в RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationStatusRequest'
            example:
              status: INVITED
      responses:
        '200':
          description: Статус обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

