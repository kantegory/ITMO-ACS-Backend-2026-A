openapi: 3.0.3
info:
  title: Jobby — Microservices API
  description: |
    REST API для сайта по поиску работы, реализованный в виде микросервисной архитектуры.

    ## Сервисы
    | Сервис | Порт | Описание |
    |---|---|---|
    | user-service | 3001 | Аутентификация, регистрация, профили |
    | vacancy-service | 3002 | Компании, вакансии |
    | resume-service | 3003 | Резюме соискателей |
    | application-service | 3004 | Отклики на вакансии |
    | dictionary-service | 3005 | Справочники (read-only) |

    ## Аутентификация
    JWT хранится в `httpOnly` cookie (`access_token`). Каждый сервис самостоятельно верифицирует токен через `process.env.JWT_SECRET`.

    ## Внутренние эндпоинты (inter-service)
    Эндпоинты с префиксом `/internal/` предназначены исключительно для вызовов между сервисами внутри Docker-сети. Они не доступны снаружи и не требуют JWT — вместо этого используется проверка `X-Internal-Secret` заголовка.
  version: 2.0.0

servers:
  - url: http://localhost:3001
    description: user-service
  - url: http://localhost:3002
    description: vacancy-service
  - url: http://localhost:3003
    description: resume-service
  - url: http://localhost:3004
    description: application-service
  - url: http://localhost:3005
    description: dictionary-service

security:
  - cookieAuth: []

tags:
  - name: Auth
    description: "[user-service] Регистрация и вход"
  - name: Profile
    description: "[user-service] Профили соискателей и работодателей"
  - name: User Internal
    description: "[user-service] Внутренние эндпоинты для других сервисов"
  - name: Companies
    description: "[vacancy-service] Компании"
  - name: Vacancies
    description: "[vacancy-service] Вакансии"
  - name: Vacancy Internal
    description: "[vacancy-service] Внутренние эндпоинты"
  - name: Resumes
    description: "[resume-service] Резюме"
  - name: Resume Internal
    description: "[resume-service] Внутренние эндпоинты"
  - name: Applications
    description: "[application-service] Отклики"
  - name: Dictionaries
    description: "[dictionary-service] Справочники"
  - name: Dictionary Internal
    description: "[dictionary-service] Внутренние эндпоинты"

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
    internalSecret:
      type: apiKey
      in: header
      name: X-Internal-Secret
      description: Секрет для межсервисных запросов (из env INTERNAL_SECRET)

  responses:
    Unauthorized:
      description: Не передан или невалидный JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 401
            message: Unauthorized
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 403
            message: Forbidden
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 404
            message: Not found
    Conflict:
      description: Ресурс уже существует
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 409
            message: Already exists
    UnprocessableEntity:
      description: Ошибка валидации тела запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:

    # ── Errors ──
    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad request

    ValidationErrorResponse:
      type: object
      required: [statusCode, message, errors]
      properties:
        statusCode:
          type: integer
          example: 422
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # ── Auth / User ──
    RegisterStep1Request:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: ivan@example.com
        phone:
          type: string
          example: "+79001234567"
        password:
          type: string
          minLength: 8
          example: strongpass123
        role:
          type: string
          enum: [SEEKER, EMPLOYER]

    RegisterSeekerRequest:
      type: object
      required: [firstName, lastName, cityId]
      properties:
        firstName:
          type: string
          example: Иван
        lastName:
          type: string
          example: Петров
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [MALE, FEMALE]
          nullable: true
        cityId:
          type: string
          format: uuid

    RegisterEmployerRequest:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          example: Ольга
        lastName:
          type: string
          example: Смирнова
        position:
          type: string
          nullable: true
          example: HR Manager
        companyId:
          type: string
          format: uuid
          nullable: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserShort'

    UserShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [SEEKER, EMPLOYER, ADMIN]
        profile:
          nullable: true
          description: SeekerProfile или EmployerProfile в зависимости от role

    SeekerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [MALE, FEMALE]
          nullable: true
        city:
          $ref: '#/components/schemas/CityShort'
        email:
          type: string
        phone:
          type: string
          nullable: true

    EmployerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
          nullable: true
        email:
          type: string
        company:
          $ref: '#/components/schemas/CompanyShort'
          nullable: true

    UpdateSeekerProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [MALE, FEMALE]
        cityId:
          type: string
          format: uuid
        phone:
          type: string

    UpdateEmployerProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
        companyId:
          type: string
          format: uuid
          nullable: true

    # ── Internal: user-service ──
    InternalUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [SEEKER, EMPLOYER, ADMIN]
        phone:
          type: string
          nullable: true

    InternalSeeker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        cityId:
          type: string
          format: uuid
          nullable: true

    InternalEmployer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        companyId:
          type: string
          format: uuid
          nullable: true

    # ── Company ──
    CompanyShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        logoUrl:
          type: string
          nullable: true

    CompanyDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        industry:
          $ref: '#/components/schemas/IndustryItem'
          nullable: true
        city:
          $ref: '#/components/schemas/CityShort'
          nullable: true

    CreateCompanyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: ООО Технологии
        description:
          type: string
        website:
          type: string
          example: https://example.com
        logoUrl:
          type: string
        industryId:
          type: string
          format: uuid
        cityId:
          type: string
          format: uuid

    # ── Vacancy ──
    VacancyShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        company:
          $ref: '#/components/schemas/CompanyShort'
          nullable: true
        city:
          $ref: '#/components/schemas/CityShort'
          nullable: true
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, TO, NEGOTIABLE]
        salaryFixed:
          type: integer
          nullable: true
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        currency:
          type: string
          example: RUB
        isRemote:
          type: boolean
        experienceYearsMin:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time

    VacancyDetail:
      allOf:
        - $ref: '#/components/schemas/VacancyShort'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            conditions:
              type: string
              nullable: true
            requirementsNote:
              type: string
              nullable: true
            experienceYearsMax:
              type: integer
              nullable: true
            employmentType:
              $ref: '#/components/schemas/EmploymentTypeItem'
              nullable: true
            industry:
              $ref: '#/components/schemas/IndustryItem'
              nullable: true
            skills:
              type: array
              items:
                $ref: '#/components/schemas/VacancySkillItem'
            employer:
              $ref: '#/components/schemas/EmployerShort'
            createdAt:
              type: string
              format: date-time

    CreateVacancyRequest:
      type: object
      required: [title, salaryType, companyId]
      properties:
        title:
          type: string
          example: Backend Developer
        description:
          type: string
        conditions:
          type: string
        requirementsNote:
          type: string
        cityId:
          type: string
          format: uuid
        industryId:
          type: string
          format: uuid
        employmentTypeId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, TO, NEGOTIABLE]
        salaryFixed:
          type: integer
          nullable: true
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        currency:
          type: string
          default: RUB
        experienceYearsMin:
          type: integer
          nullable: true
        experienceYearsMax:
          type: integer
          nullable: true
        isRemote:
          type: boolean
          default: false
        isPublished:
          type: boolean
          default: false
        skills:
          type: array
          items:
            type: object
            required: [skillId]
            properties:
              skillId:
                type: string
                format: uuid

    UpdateVacancyRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        conditions:
          type: string
        requirementsNote:
          type: string
        cityId:
          type: string
          format: uuid
        industryId:
          type: string
          format: uuid
        employmentTypeId:
          type: string
          format: uuid
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, TO, NEGOTIABLE]
        salaryFixed:
          type: integer
        salaryMin:
          type: integer
        salaryMax:
          type: integer
        currency:
          type: string
        experienceYearsMin:
          type: integer
        experienceYearsMax:
          type: integer
        isRemote:
          type: boolean
        isPublished:
          type: boolean

    VacancySkillItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skill:
          $ref: '#/components/schemas/SkillShort'

    AddVacancySkillRequest:
      type: object
      required: [skillId]
      properties:
        skillId:
          type: string
          format: uuid

    InternalVacancy:
      type: object
      description: Минимальные данные вакансии для межсервисного использования
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        employerId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        isPublished:
          type: boolean

    # ── Resume ──
    ResumeShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        isPublished:
          type: boolean
        experienceMonths:
          type: integer
        updatedAt:
          type: string
          format: date-time

    ResumeDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
          nullable: true
        isPublished:
          type: boolean
        experienceMonths:
          type: integer
        city:
          $ref: '#/components/schemas/CityShort'
          nullable: true
        skills:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSkillItem'
        workExperience:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperienceItem'
        education:
          type: array
          items:
            $ref: '#/components/schemas/EducationItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateResumeRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Backend-разработчик
        summary:
          type: string
        isPublished:
          type: boolean
          default: false

    UpdateResumeRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        isPublished:
          type: boolean

    ResumeSkillItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skill:
          $ref: '#/components/schemas/SkillShort'
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]

    AddResumeSkillRequest:
      type: object
      required: [skillId, level]
      properties:
        skillId:
          type: string
          format: uuid
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]

    WorkExperienceItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyName:
          type: string
        role:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        isCurrent:
          type: boolean

    CreateWorkExperienceRequest:
      type: object
      required: [companyName, role, startDate]
      properties:
        companyName:
          type: string
          example: ООО Ромашка
        role:
          type: string
          example: Senior Developer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        isCurrent:
          type: boolean
          default: false

    EducationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        degreeType:
          type: string
          example: BACHELOR
        institution:
          type: string
        programName:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true

    CreateEducationRequest:
      type: object
      required: [degreeTypeId, institution]
      properties:
        degreeTypeId:
          type: string
          format: uuid
        institution:
          type: string
          example: ИТМО
        programName:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    InternalResume:
      type: object
      description: Минимальные данные резюме для межсервисного использования
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        jobSeekerId:
          type: string
          format: uuid
        seekerUserId:
          type: string
          format: uuid
        isPublished:
          type: boolean
        experienceMonths:
          type: integer

    # ── Application ──
    ApplicationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vacancy:
          $ref: '#/components/schemas/VacancyShort'
        resume:
          $ref: '#/components/schemas/ResumeShort'
        coverLetter:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, VIEWED, INVITED, REJECTED, ACCEPTED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateApplicationRequest:
      type: object
      required: [vacancyId, resumeId]
      properties:
        vacancyId:
          type: string
          format: uuid
        resumeId:
          type: string
          format: uuid
        coverLetter:
          type: string
          example: Хочу работать в вашей команде...

    UpdateApplicationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [VIEWED, INVITED, REJECTED, ACCEPTED]

    # ── Dictionaries ──
    CountryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Россия

    CityShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Санкт-Петербург
        country:
          $ref: '#/components/schemas/CountryItem'

    IndustryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Информационные технологии

    SkillShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: TypeScript

    EmploymentTypeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: FULL_TIME

    DegreeTypeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: BACHELOR

    EmployerShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
          nullable: true

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ══════════════════════════════════════
  # USER-SERVICE — Public (server: :3001)
  # ══════════════════════════════════════

  /api/v1/auth/register/step1:
    post:
      tags: [Auth]
      operationId: authRegisterStep1
      summary: Шаг 1 — создание учётной записи
      description: Создаёт запись User, возвращает temporaryToken для шага 2
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStep1Request'
            example:
              email: ivan@example.com
              password: strongpass123
              role: SEEKER
      responses:
        '201':
          description: Учётная запись создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  temporaryToken:
                    type: string
                    description: JWT действует 15 минут, только для шага 2
        '409':
          description: Email уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 409
                message: Email already in use
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/auth/register/seeker:
    post:
      tags: [Auth]
      operationId: authRegisterSeeker
      summary: Шаг 2 — профиль соискателя
      description: Требует temporaryToken из шага 1 в cookie. Создаёт JobSeeker, выдаёт полный JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSeekerRequest'
      responses:
        '201':
          description: Профиль создан, возвращает полный JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Город не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 404
                message: City not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/v1/auth/register/employer:
    post:
      tags: [Auth]
      operationId: authRegisterEmployer
      summary: Шаг 2 — профиль работодателя
      description: Требует temporaryToken из шага 1 в cookie. Создаёт Employer, выдаёт полный JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmployerRequest'
      responses:
        '201':
          description: Профиль создан, возвращает полный JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Компания не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 404
                message: Company not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

