openapi: 3.0.3
info:
  title: Jobby API
  description: |
    REST API для сайта по поиску работы.
    **Авторизация** — JWT хранится в `httpOnly` cookie (`access_token`). Браузер отправляет куку автоматически. JS токен не видит.
  version: 2.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local dev

security:
  - cookieAuth: []

tags:
  - name: Auth
    description: Регистрация и вход
  - name: Profile
    description: Личный кабинет текущего пользователя
  - name: Resumes
    description: Резюме соискателя
  - name: Vacancies
    description: Вакансии
  - name: Applications
    description: Отклики
  - name: Companies
    description: Компании
  - name: Dictionaries
    description: Справочники — чтение (публично)
  - name: Admin Dictionaries
    description: Справочники — управление (только ADMIN)

# ─────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: |
        httpOnly JWT cookie. Устанавливается сервером через Set-Cookie при логине.
        Клиент отправляет запросы с withCredentials: true.

  # ─── REUSABLE RESPONSES ───
  responses:
    Unauthorized:
      description: Не передан или невалидный JWT токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 401
            message: Unauthorized
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 403
            message: Forbidden
    Conflict:
      description: Ресурс уже существует
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 409
            message: Already exists
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 404
            message: Not found
    UnprocessableEntity:
      description: Ошибка валидации тела запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  # ─── SCHEMAS ───
  schemas:

    # ── Errors ──
    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Bad request

    ValidationErrorResponse:
      type: object
      required: [statusCode, message, errors]
      properties:
        statusCode:
          type: integer
          example: 422
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: must be a valid email

    # ── Auth ──
    RegisterStep1Request:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: ivan@example.com
        phone:
          type: string
          example: "+79001234567"
        password:
          type: string
          minLength: 8
          example: strongpass123
        role:
          type: string
          enum: [SEEKER, EMPLOYER]

    RegisterSeekerRequest:
      type: object
      required: [firstName, lastName, cityId]
      properties:
        firstName:
          type: string
          example: Иван
        lastName:
          type: string
          example: Петров
        middleName:
          type: string
          example: Сергеевич
        birthDate:
          type: string
          format: date
          example: "1995-06-15"
        gender:
          type: string
          enum: [MALE, FEMALE]
        cityId:
          type: string
          format: uuid

    RegisterEmployerRequest:
      type: object
      required: [firstName, lastName, companyId]
      properties:
        firstName:
          type: string
          example: Ольга
        lastName:
          type: string
          example: Смирнова
        position:
          type: string
          example: HR Manager
        companyId:
          type: string
          format: uuid
          description: ID существующей компании. Если компании нет — сначала создать через POST /companies

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserShort'

    UserShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [SEEKER, EMPLOYER, ADMIN]
        profile:
          description: |
            Профиль пользователя — структура зависит от role.
            SEEKER — SeekerProfile, EMPLOYER — EmployerProfile, ADMIN — null.

    # ── Profile ──
    SeekerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [MALE, FEMALE]
          nullable: true
        city:
          $ref: '#/components/schemas/CityShort'
        email:
          type: string
        phone:
          type: string
          nullable: true

    UpdateSeekerProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [MALE, FEMALE]
        cityId:
          type: string
          format: uuid
        phone:
          type: string

    EmployerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
          nullable: true
        email:
          type: string
        company:
          $ref: '#/components/schemas/CompanyShort'

    # ── Resume ──
    ResumeShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Python-разработчик
        isPublished:
          type: boolean
        experienceMonths:
          type: integer
          example: 36
        updatedAt:
          type: string
          format: date-time

    ResumeDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
          nullable: true
        isPublished:
          type: boolean
        experienceMonths:
          type: integer
        city:
          $ref: '#/components/schemas/CityShort'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSkillItem'
        workExperience:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperienceItem'
        education:
          type: array
          items:
            $ref: '#/components/schemas/EducationItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateResumeRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Backend-разработчик
        summary:
          type: string
          example: Опытный разработчик на Node.js
        cityId:
          type: string
          format: uuid
        isPublished:
          type: boolean
          default: false

    UpdateResumeRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        cityId:
          type: string
          format: uuid
        isPublished:
          type: boolean

    ResumeSkillItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skill:
          $ref: '#/components/schemas/SkillShort'
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]

    AddResumeSkillRequest:
      type: object
      required: [skillId, level]
      properties:
        skillId:
          type: string
          format: uuid
        level:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]

    WorkExperienceItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyName:
          type: string
        role:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        isCurrent:
          type: boolean

    CreateWorkExperienceRequest:
      type: object
      required: [companyName, role, startDate]
      properties:
        companyName:
          type: string
          example: ООО Ромашка
        role:
          type: string
          example: Старший разработчик
        startDate:
          type: string
          format: date
          example: "2021-03-01"
        endDate:
          type: string
          format: date
          nullable: true
        isCurrent:
          type: boolean
          default: false

    EducationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        degreeType:
          type: string
          example: BACHELOR
        institution:
          type: string
        programName:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true

    CreateEducationRequest:
      type: object
      required: [degreeTypeId, institution]
      properties:
        degreeTypeId:
          type: string
          format: uuid
        institution:
          type: string
          example: СПбГУ
        programName:
          type: string
          example: Прикладная математика и информатика
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    # ── Vacancy ──
    VacancyShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Senior NestJS Developer
        company:
          $ref: '#/components/schemas/CompanyShort'
        city:
          $ref: '#/components/schemas/CityShort'
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, NEGOTIABLE]
        salaryFixed:
          type: integer
          nullable: true
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        currency:
          type: string
          example: RUB
        isRemote:
          type: boolean
        experienceYearsMin:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time

    VacancyDetail:
      allOf:
        - $ref: '#/components/schemas/VacancyShort'
        - type: object
          properties:
            description:
              type: string
            conditions:
              type: string
              nullable: true
            requirementsNote:
              type: string
              nullable: true
            experienceYearsMax:
              type: integer
              nullable: true
            employmentType:
              $ref: '#/components/schemas/EmploymentTypeItem'
            industry:
              $ref: '#/components/schemas/IndustryItem'
            skills:
              type: array
              items:
                $ref: '#/components/schemas/VacancySkillItem'
            employer:
              $ref: '#/components/schemas/EmployerShort'
            createdAt:
              type: string
              format: date-time

    CreateVacancyRequest:
      type: object
      required: [title, salaryType, companyId]
      properties:
        title:
          type: string
          example: Backend Developer
        description:
          type: string
        conditions:
          type: string
        requirementsNote:
          type: string
        cityId:
          type: string
          format: uuid
        industryId:
          type: string
          format: uuid
        employmentTypeId:
          type: string
          format: uuid
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, NEGOTIABLE]
        salaryFixed:
          type: integer
          nullable: true
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        currency:
          type: string
          default: RUB
        experienceYearsMin:
          type: integer
          nullable: true
        experienceYearsMax:
          type: integer
          nullable: true
        isRemote:
          type: boolean
          default: false
        isPublished:
          type: boolean
          default: false
        companyId:
          type: string
          format: uuid
        skills:
          type: array
          items:
            $ref: '#/components/schemas/VacancySkillInput'

    UpdateVacancyRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        conditions:
          type: string
        requirementsNote:
          type: string
        cityId:
          type: string
          format: uuid
        industryId:
          type: string
          format: uuid
        employmentTypeId:
          type: string
          format: uuid
        salaryType:
          type: string
          enum: [FIXED, RANGE, FROM, NEGOTIABLE]
        salaryFixed:
          type: integer
          nullable: true
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        currency:
          type: string
        experienceYearsMin:
          type: integer
          nullable: true
        experienceYearsMax:
          type: integer
          nullable: true
        isRemote:
          type: boolean
        isPublished:
          type: boolean

    VacancySkillItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skill:
          $ref: '#/components/schemas/SkillShort'
        isRequired:
          type: boolean
        minLevel:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]
          nullable: true

    VacancySkillInput:
      type: object
      required: [skillId]
      properties:
        skillId:
          type: string
          format: uuid
        isRequired:
          type: boolean
          default: true
        minLevel:
          type: string
          enum: [BEGINNER, INTERMEDIATE, EXPERT]
          nullable: true

    VacancyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VacancyShort'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Application ──
    ApplicationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vacancy:
          $ref: '#/components/schemas/VacancyShort'
        resume:
          $ref: '#/components/schemas/ResumeShort'
        coverLetter:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, VIEWED, INVITED, REJECTED, ACCEPTED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApplicationDetail:
      allOf:
        - $ref: '#/components/schemas/ApplicationItem'
        - type: object
          properties:
            statusHistory:
              type: array
              items:
                $ref: '#/components/schemas/StatusHistoryItem'

    StatusHistoryItem:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, VIEWED, INVITED, REJECTED, ACCEPTED]
        comment:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time

    CreateApplicationRequest:
      type: object
      required: [vacancyId, resumeId]
      properties:
        vacancyId:
          type: string
          format: uuid
        resumeId:
          type: string
          format: uuid
        coverLetter:
          type: string
          example: Хочу работать в вашей команде, потому что...

    UpdateApplicationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [VIEWED, INVITED, REJECTED, ACCEPTED]
        comment:
          type: string
          example: Приглашаем на техническое интервью

    # ── Company ──
    CompanyShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        logoUrl:
          type: string
          nullable: true

    CompanyDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        industry:
          $ref: '#/components/schemas/IndustryItem'
        city:
          $ref: '#/components/schemas/CityShort'

    CreateCompanyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: ООО Технологии
        description:
          type: string
        website:
          type: string
          example: https://example.com
        logoUrl:
          type: string
        industryId:
          type: string
          format: uuid
        cityId:
          type: string
          format: uuid

    # ── Dictionaries ──

    CountryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Россия

    CreateCountryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Россия

    CityShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Санкт-Петербург
        country:
          $ref: '#/components/schemas/CountryItem'

    CreateCityRequest:
      type: object
      required: [name, countryId]
      properties:
        name:
          type: string
          example: Санкт-Петербург
        countryId:
          type: string
          format: uuid

    IndustryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Информационные технологии


    SkillCategoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Языки программирования

    CreateSkillCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Языки программирования

    SkillShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Python
        category:
          $ref: '#/components/schemas/SkillCategoryItem'

    EmploymentTypeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: FULL_TIME

    DegreeTypeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: BACHELOR


    CreateSkillRequest:
      type: object
      required: [name, categoryId]
      properties:
        name:
          type: string
          example: Python
        categoryId:
          type: string
          format: uuid

    CreateIndustryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CreateEmploymentTypeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CreateDegreeTypeRequest:
      type: object
      required: [name, sortOrder]
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    EmployerShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        position:
          type: string
          nullable: true

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ══════════════ AUTH ══════════════

  /auth/register/step1:
    post:
      operationId: post_auth_register_step1
      tags: [Auth]
      summary: Шаг 1 — создание учётной записи
      description: Создаёт User, возвращает temporaryToken для шага 2
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStep1Request'
      responses:
        '201':
          description: Учётная запись создана, нужно завершить профиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  temporaryToken:
                    type: string
                    description: Одноразовый токен для шага 2, действует 15 минут
                  role:
                    type: string
                    enum: [SEEKER, EMPLOYER]
        '409':
          description: Email уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 409
                message: Email already exists
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/register/seeker:
    post:
      operationId: post_auth_register_seeker
      tags: [Auth]
      summary: Шаг 2 — профиль соискателя

      description: Завершает регистрацию соискателя. Требует temporaryToken из шага 1.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSeekerRequest'
      responses:
        '201':
          description: Профиль создан, возвращает полный JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/register/employer:
    post:
      operationId: post_auth_register_employer
      tags: [Auth]
      summary: Шаг 2 — профиль работодателя

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmployerRequest'
      responses:
        '201':
          description: Профиль создан, возвращает полный JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login:
    post:
      operationId: post_auth_login
      tags: [Auth]
      summary: Вход
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 401
                message: Invalid credentials

  /auth/me:
    get:
      operationId: get_auth_me
      tags: [Auth]
      summary: Текущий пользователь + профиль
      description: |
        Возвращает данные сессии и вложенный профиль.
        Используется при загрузке приложения для инициализации стейта.
        Поле `profile` зависит от роли: SEEKER → SeekerProfile, EMPLOYER → EmployerProfile, ADMIN → null.
      responses:
        '200':
          description: OK
