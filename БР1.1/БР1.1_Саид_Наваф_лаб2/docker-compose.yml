version: '3.8'
name: lab2-microservices

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./src/auth-service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/main_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

  job-service:
    build: ./src/job-service
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/main_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

  candidate-service:
    build: ./src/candidate-service
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/main_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

  interaction-service:
    build: ./src/interaction-service
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/main_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - job-service
      - candidate-service
      - interaction-service
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
