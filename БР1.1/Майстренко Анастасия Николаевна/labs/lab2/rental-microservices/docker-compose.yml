services:
  db:
    image: postgres:16
    restart: always
    ports:
      - 15432:5432
    environment:
      POSTGRES_USER: maindb
      POSTGRES_PASSWORD: maindb
      POSTGRES_DB: maindb
    volumes:
      - ./dbs/postgres-data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
