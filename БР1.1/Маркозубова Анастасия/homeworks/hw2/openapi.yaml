openapi: 3.0.0
info:
  title: Job Search API
  version: 1.0.0
  description: API для сайта поиска работы

servers:
  - url: http://localhost:8080

paths:

# АВТОРИЗАЦИЯ / РЕГИСТРАЦИЯ

  /auth/register:
    post:
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:
                  type: string
                  format: email
                  example: test@mail.com
                password:
                  type: string
                  example: qwerty123
                role:
                  type: string
                  enum: [seeker, company]
                  example: seeker
      responses:
        '201':
          description: Пользователь создан
        '409':
          description: Пользователь уже существует

  /auth/login:
    post:
      summary: Вход
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: test@mail.com
                password:
                  type: string
                  example: qwerty123
      responses:
        '200':
          description: Успешный вход
        '401':
          description: Неверный email или пароль

# СОИСКАТЕЛЬ

  /seekers:
    post:
      summary: Создать профиль соискателя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name:
                  type: string
                  example: Анастасия
                last_name:
                  type: string
                  example: Маркозубова
                phone:
                  type: string
                  example: "+79998887766"
                bio:
                  type: string
                  example: Junior Backend Developer
                contact_info:
                  type: string
                  example: Telegram @anastasia_dev
                created_at:
                    type: string
                    format: date-time
      responses:
        '201':
          description: Профиль создан
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '409':
          description: Профиль уже существует

  /seekers/me:
    get:
      summary: Получить свой профиль соискателя
      responses:
        '200':
          description: Профиль соискателя
        '401':
          description: Пользователь не авторизован
        '404':
          description: Профиль не найден

    patch:
      summary: Обновить свой профиль соискателя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                bio:
                  type: string
                contact_info:
                  type: string
      responses:
        '200':
          description: Профиль обновлён
        '401':
          description: Пользователь не авторизован
        '404':
          description: Профиль не найден

# КОМПАНИЯ

  /companies:
    post:
      summary: Создать профиль компании
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: 
                - name
              properties:
                name:
                  type: string
                  example: Denero
                description:
                  type: string
                  example: Маркетинговое агентство
                website:
                  type: string
                  example: https://denero.ru
      responses:
        '201':
          description: Профиль компании создан
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '409':
          description: Профиль уже существует

  /companies/me:
    get:
      summary: Получить свой профиль компании
      responses:
        '200':
          description: Профиль компании
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: Denero
                  description:
                    type: string
                    example: Маркетинговое агенство
                  website:
                    type: string
                    example: https://denero.ru
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time  

        '401':
          description: Пользователь не авторизован
        '404':
          description: Профиль не найден

    patch:
      summary: Обновить свой профиль компании
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                website:
                  type: string
      responses:
        '200':
          description: Профиль обновлён
        '401':
          description: Пользователь не авторизован
        '404':
          description: Профиль не найден

  /companies/{id}:
    get:
      summary: Получить компанию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Профиль компании 
          content:
            application/json:
              schema:
                type: object
                properties:
                  company_id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: Denero
                  description:
                    type: string
                    example: Маркетинговое агенство
                  website:
                    type: string
                    example: https://denero.ru

        '404':
          description: Компания не найдена

  /companies/{id}/vacancies:
    get:
      summary: Получить все вакансии компании
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список вакансий компании
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        vacancy_id:
                          type: integer
                          example: 546
                        specialization_id:
                          type: integer
                          example: 140
                        title:
                          type: string
                          example: Backend Developer
                        description:
                          type: string
                          example: Ищем разработчика на языке Kotlin
                        salary_min:
                          type: integer
                          example: 130000
                        salary_max:
                          type: integer
                          example: 200000
                        location:
                          type: string
                          example: Москва
                        work_format:
                          type: string
                          example: remote
                        employment_type:
                          type: string
                          example: full-time
                        status:
                          type: string
                          example: active
                            
        '404':
          description: Компания не найдена    


  /resumes:
    post:
      summary: Создать резюме
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, specialization_id]
              properties:
                title:
                  type: string
                  example: Backend Developer Junior
                specialization_id:
                  type: integer
                  example: 140
                desired_salary:
                  type: integer
                  example: 100000
                experience_years:
                  type: integer
                  example: 1
                location:
                  type: string
                  example: Москва
      responses:
        '201':
          description: Резюме создано
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав

  /resumes/me:
    get:
      summary: Получить свои резюме
      responses:
        '200':
          description: Список резюме
        '401':
          description: Пользователь не авторизован

  /resumes/{id}:
    get:
      summary: Получить резюме
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные резюме
        '404':
          description: Резюме не найдено

    patch:
      summary: Обновить резюме
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                specialization_id:
                  type: integer
                desired_salary:
                  type: integer
                experience_years:
                  type: integer
                location:
                  type: string
      responses:
        '200':
          description: Резюме обновлено
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Резюме не найдено

    delete:
      summary: Удалить резюме
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Резюме удалено
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Резюме не найдено

# ОБРАЗОВАНИЕ

  /resumes/{id}/educations:
    post:
      summary: Добавить образование
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [institution, degree, field_of_study, start_date]
              properties:
                institution:
                  type: string
                  example: ИТМО
                degree:
                  type: string
                  example: Бакалавр
                field_of_study:
                  type: string
                  example: Мобильные технологии
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '201':
          description: Образование добавлено
        '404':
          description: Резюме не найдено

  /educations/{id}:
    patch:
      summary: Обновить образование
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                institution:
                  type: string
                degree:
                  type: string
                field_of_study:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '200':
          description: Образование обновлено
        '404':
          description: Запись не найдена

    delete:
      summary: Удалить образование
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Образование удалено
        '404':
          description: Запись не найдена

# ОПЫТ РАБОТЫ

  /resumes/{id}/experiences:
    post:
      summary: Добавить опыт работы
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_name, position, start_date]
              properties:
                company_name:
                  type: string
                  example: VK
                position:
                  type: string
                  example: Стажёр backend-разработчик
                description:
                  type: string
                  example: Разработка API
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '201':
          description: Опыт добавлен
        '404':
          description: Резюме не найдено

  /experiences/{id}:
    patch:
      summary: Обновить опыт работы
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name:
                  type: string
                position:
                  type: string
                description:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '200':
          description: Опыт обновлён
        '404':
          description: Запись не найдена

    delete:
      summary: Удалить опыт работы
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Опыт удалён
        '404':
          description: Запись не найдена

  /vacancies:
    get:
      summary: Поиск вакансий
      parameters:
        - in: query
          name: industry_id
          schema:
            type: integer
        - in: query
          name: specialization_id
          schema:
            type: integer
        - in: query
          name: salary_min
          schema:
            type: integer
        - in: query
          name: salary_max
          schema:
            type: integer
        - in: query
          name: experience_required
          schema:
            type: integer
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: work_format
          schema:
            type: string
        - in: query
          name: employment_type
          schema:
            type: string
      responses:
        '200':
          description: Список вакансий

    post:
      summary: Создать вакансию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - specialization_id
                - title
                - description
                - requirements
              properties:
                specialization_id:
                  type: integer
                  example: 140
                title:
                  type: string
                  example: Backend Developer
                description:
                  type: string
                  example: Ищем backend-разработчика
                requirements:
                  type: string
                  example: Kotlin, Spring Boot, PostgreSQL
                salary_min:
                  type: integer
                  example: 130000
                salary_max:
                  type: integer
                  example: 200000
                experience_required:
                  type: integer
                  example: 2
                location:
                  type: string
                  example: Москва
                work_format:
                  type: string
                  example: remote
                employment_type:
                  type: string
                  example: full-time
      responses:
        '201':
          description: Вакансия создана
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав

  /vacancies/me:
    get:
      summary: Получить свои вакансии
      responses:
        '200':
          description: Список своих вакансий
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав

  /vacancies/{id}:
    get:
      summary: Получить вакансию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные вакансии
        '404':
          description: Вакансия не найдена

    patch:
      summary: Обновить вакансию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specialization_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                requirements:
                  type: string
                salary_min:
                  type: integer
                salary_max:
                  type: integer
                experience_required:
                  type: integer
                location:
                  type: string
                work_format:
                  type: string
                employment_type:
                  type: string
                status:
                  type: string
                  example: active
      responses:
        '200':
          description: Вакансия обновлена
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Вакансия не найдена

    delete:
      summary: Удалить вакансию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Вакансия удалена
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Вакансия не найдена
          
# ОТКЛИКИ

  /vacancies/{id}/applications:
    post:
      summary: Откликнуться на вакансию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: 
              - resume_id
              properties:
                resume_id:
                  type: integer
                  example: 101
                cover_letter:
                  type: string
                  example: Хочу откликнуться на вакансию
      responses:
        '201':
          description: Отклик создан
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Вакансия или резюме не найдены
        '409':
          description: Отклик уже существует

    get:
      summary: Получить отклики на вакансию
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список откликов
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Вакансия не найдена

  /applications/me:
    get:
      summary: Получить свои отклики
      responses:
        '200':
          description: Список своих откликов
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав

  /applications/{id}/status:
    patch:
      summary: Изменить статус отклика
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: 
              - status
              properties:
                status:
                  type: string
                  enum: [sent, viewed, invited, rejected]
                  example: invited
      responses:
        '200':
          description: Статус обновлён
        '404':
          description: Отклик не найден

# СПРАВОЧНИКИ

  /industries:
    get:
      summary: Получить список отраслей
      responses:
        '200':
          description: Список отраслей

  /specializations:
    get:
      summary: Получить список специализаций
      responses:
        '200':
          description: Список специализаций
          

  /industries/{id}/specializations:
    get:
      summary: Получить специализации индустрии
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список специализаций индустрии
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        specialization_id:
                          type: integer
                          example: 140
                        name:
                          type: string
                          example: Backend Development
        '404':
          description: Индустрия не найдена
    