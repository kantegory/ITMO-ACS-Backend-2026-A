services:
  db:
    image: postgres:16-alpine
    container_name: rental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental
      POSTGRES_DB: rental
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d rental"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rental_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: rental
      DB_PASSWORD: rental
      DB_NAME: rental
      JWT_SECRET: change-me-in-prod
      JWT_EXPIRES_IN: 3600
    ports:
      - "8080:8080"

volumes:
  pgdata:
