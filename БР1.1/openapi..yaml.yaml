openapi: 3.0.3
info:
  title: Job Search Service API
  description: REST API для сервиса поиска работы (8 таблиц БД)
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Локальный сервер разработки

tags:
  - name: auth
    description: Аутентификация и регистрация
  - name: users
    description: Пользователи
  - name: applicants
    description: Соискатели
  - name: employers
    description: Работодатели
  - name: resumes
    description: Резюме
  - name: work_experience
    description: Опыт работы
  - name: vacancies
    description: Вакансии
  - name: categories
    description: Категории вакансий
  - name: applications
    description: Отклики

paths:
  # ─── AUTH (Таблица 1: пользователи) ────────────────────
  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "said@example.com"
              password: "securepass123"
              phone: "+79001234567"
              role: "applicant"
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email уже занят

  /auth/login:
    post:
      tags: [auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные данные

  # ─── USERS (Таблица 1: пользователи) ───────────────────
  /users/me:
    get:
      tags: [users]
      summary: Профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      tags: [users]
      summary: Обновить профиль
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Обновлён

  # ─── APPLICANTS (Таблица 2: соискатели) ────────────────
  /applicants/me:
    get:
      tags: [applicants]
      summary: Профиль соискателя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные соискателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Applicant'
    put:
      tags: [applicants]
      summary: Обновить профиль соискателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicantRequest'
      responses:
        '200':
          description: Обновлён

  # ─── EMPLOYERS (Таблица 3: работодатели) ───────────────
  /employers/me:
    get:
      tags: [employers]
      summary: Профиль работодателя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные работодателя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employer'
    put:
      tags: [employers]
      summary: Обновить профиль работодателя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployerRequest'
      responses:
        '200':
          description: Обновлён

  # ─── CATEGORIES (Таблица 4: категории) ─────────────────
  /categories:
    get:
      tags: [categories]
      summary: Список категорий вакансий
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags: [categories]
      summary: Создать категорию (админ)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Категория создана

  /categories/{id}:
    get:
      tags: [categories]
      summary: Детали категории
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные категории
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  # ─── RESUMES (Таблица 5: резюме) ───────────────────────
  /resumes:
    get:
      tags: [resumes]
      summary: Мои резюме
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeListResponse'
    post:
      tags: [resumes]
      summary: Создать резюме
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResumeRequest'
            example:
              desired_position: "Backend Developer"
              expected_salary: 150000
              experience: 3
              about: "Опыт разработки на Node.js..."
      responses:
        '201':
          description: Резюме создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'

  /resumes/{id}:
    get:
      tags: [resumes]
      summary: Детали резюме
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные резюме
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeDetail'
        '404':
          description: Не найдено
    put:
      tags: [resumes]
      summary: Обновить резюме
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeRequest'
      responses:
        '200':
          description: Обновлёно
    delete:
      tags: [resumes]
      summary: Удалить резюме
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Удалено

  # ─── WORK EXPERIENCE (Таблица 8: опыт) ─────────────────
  /resumes/{id}/experience:
    get:
      tags: [work_experience]
      summary: Список опыта работы для резюме
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список опыта работы
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkExperience'
        '404':
          description: Резюме не найдено
    post:
      tags: [work_experience]
      summary: Добавить опыт работы в резюме
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkExperienceRequest'
            example:
              company_name: "ООО ТехКомпания"
              position: "Backend Developer"
              start_date: "2022-01-15"
              end_date: "2024-12-31"
              responsibilities: "Разработка API на Node.js"
              is_current: false
      responses:
        '201':
          description: Опыт работы добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkExperience'
        '400':
          description: Ошибка валидации
        '404':
          description: Резюме не найдено

  /resumes/{resume_id}/experience/{exp_id}:
    get:
      tags: [work_experience]
      summary: Детали опыта работы
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
        - name: exp_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные опыта работы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkExperience'
        '404':
          description: Не найдено
    put:
      tags: [work_experience]
      summary: Обновить опыт работы
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
        - name: exp_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkExperienceRequest'
      responses:
        '200':
          description: Обновлён
        '404':
          description: Не найдено
    delete:
      tags: [work_experience]
      summary: Удалить опыт работы
      security:
        - bearerAuth: []
      parameters:
        - name: resume_id
          in: path
          required: true
          schema:
            type: integer
        - name: exp_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Удалён
        '404':
          description: Не найдено

  # ─── VACANCIES (Таблица 6: вакансии) ───────────────────
  /vacancies:
    get:
      tags: [vacancies]
      summary: Поиск вакансий с фильтрацией
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
          description: Фильтр по категории
        - name: salary_min
          in: query
          schema:
            type: integer
          description: Мин. зарплата
        - name: salary_max
          in: query
          schema:
            type: integer
          description: Макс. зарплата
        - name: experience_required
          in: query
          schema:
            type: integer
          description: Требуемый опыт
        - name: city
          in: query
          schema:
            type: string
          description: Город
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Список вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
    post:
      tags: [vacancies]
      summary: Создать вакансию (работодатель)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVacancyRequest'
            example:
              title: "Senior Backend Developer"
              description: "Разработка микросервисов"
              requirements: "Опыт от 3 лет"
              working_conditions: "Офис/Удалёнка"
              salary_min: 200000
              salary_max: 300000
              experience_required: 3
              city: "Москва"
              address: "ул. Ленина, 10"
              category_id: 1
      responses:
        '201':
          description: Вакансия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vacancy'

  /vacancies/{id}:
    get:
      tags: [vacancies]
      summary: Детали вакансии
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные вакансии
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDetail'
        '404':
          description: Не найдено
    put:
      tags: [vacancies]
      summary: Обновить вакансию
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVacancyRequest'
      responses:
        '200':
          description: Обновлена
    delete:
      tags: [vacancies]
      summary: Удалить вакансию
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Удалена

  /vacancies/{id}/applications:
    get:
      tags: [applications, vacancies]
      summary: Отклики на вакансию (работодатель)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, reviewed, accepted, rejected]
      responses:
        '200':
          description: Список откликов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  # ─── APPLICATIONS (Таблица 7: отклики) ─────────────────
  /vacancies/{id}/apply:
    post:
      tags: [applications]
      summary: Откликнуться на вакансию
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
            example:
              resume_id: 5
      responses:
        '201':
          description: Отклик отправлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '409':
          description: Уже откликнулись

  /applications:
    get:
      tags: [applications]
      summary: Мои отклики (соискатель)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, reviewed, accepted, rejected]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Список откликов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /applications/{id}:
    get:
      tags: [applications]
      summary: Детали отклика
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Данные отклика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/{id}/status:
    put:
      tags: [applications]
      summary: Изменить статус отклика (работодатель)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationStatusRequest'
            example:
              status: "accepted"
      responses:
        '200':
          description: Статус изменён
        '404':
          description: Не найдено

# ─── COMPONENTS ──────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        phone:
          type: string
        role:
          type: string
          enum: [applicant, employer]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    # ── User (Таблица 1: пользователи) ───────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [applicant, employer]
        registered_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string

    # ── Applicant (Таблица 2: соискатели) ────────────────
    Applicant:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        photo_url:
          type: string
        birth_date:
          type: string
          format: date

    UpdateApplicantRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        photo_url:
          type: string
        birth_date:
          type: string

    # ── Employer (Таблица 3: работодатели) ───────────────
    Employer:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        company_name:
          type: string
        logo_url:
          type: string
        description:
          type: string
        website:
          type: string
        inn:
          type: string

    UpdateEmployerRequest:
      type: object
      properties:
        company_name:
          type: string
        logo_url:
          type: string
        description:
          type: string
        website:
          type: string
        inn:
          type: string

    # ── Category (Таблица 4: категории) ──────────────────
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string

    # ── Resume (Таблица 5: резюме) ───────────────────────
    CreateResumeRequest:
      type: object
      required: [desired_position]
      properties:
        desired_position:
          type: string
        expected_salary:
          type: integer
        experience:
          type: integer
        about:
          type: string
        is_active:
          type: boolean
          default: true

    UpdateResumeRequest:
      type: object
      properties:
        desired_position:
          type: string
        expected_salary:
          type: integer
        experience:
          type: integer
        about:
          type: string
        is_active:
          type: boolean

    Resume:
      type: object
      properties:
        id:
          type: integer
        applicant_id:
          type: integer
        desired_position:
          type: string
        expected_salary:
          type: integer
        experience:
          type: integer
        about:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    ResumeDetail:
      allOf:
        - $ref: '#/components/schemas/Resume'
        - type: object
          properties:
            work_experience:
              type: array
              items:
                $ref: '#/components/schemas/WorkExperience'

    ResumeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Resume'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Work Experience (Таблица 8: опыт) ────────────────
    CreateWorkExperienceRequest:
      type: object
      required: [company_name, position, start_date]
      properties:
        company_name:
          type: string
        position:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        responsibilities:
          type: string
        is_current:
          type: boolean
          default: false

    UpdateWorkExperienceRequest:
      type: object
      properties:
        company_name:
          type: string
        position:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        responsibilities:
          type: string
        is_current:
          type: boolean

    WorkExperience:
      type: object
      properties:
        id:
          type: integer
        resume_id:
          type: integer
        company_name:
          type: string
        position:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        responsibilities:
          type: string
        is_current:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Vacancy (Таблица 6: вакансии) ────────────────────
    CreateVacancyRequest:
      type: object
      required: [title, description, category_id, employer_id]
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        working_conditions:
          type: string
        salary_min:
          type: integer
        salary_max:
          type: integer
        experience_required:
          type: integer
        city:
          type: string
        address:
          type: string
        is_active:
          type: boolean
          default: true
        category_id:
          type: integer
        employer_id:
          type: integer

    UpdateVacancyRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        working_conditions:
          type: string
        salary_min:
          type: integer
        salary_max:
          type: integer
        experience_required:
          type: integer
        city:
          type: string
        address:
          type: string
        is_active:
          type: boolean

    Vacancy:
      type: object
      properties:
        id:
          type: integer
        employer_id:
          type: integer
        category_id:
          type: integer
        title:
          type: string
        description:
          type: string
        requirements:
          type: string
        working_conditions:
          type: string
        salary_min:
          type: integer
        salary_max:
          type: integer
        experience_required:
          type: integer
        city:
          type: string
        address:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    VacancyDetail:
      allOf:
        - $ref: '#/components/schemas/Vacancy'
        - type: object
          properties:
            employer:
              $ref: '#/components/schemas/Employer'
            category:
              $ref: '#/components/schemas/Category'
            applications_count:
              type: integer

    VacancyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vacancy'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Application (Таблица 7: отклики) ─────────────────
    CreateApplicationRequest:
      type: object
      required: [resume_id]
      properties:
        resume_id:
          type: integer

    UpdateApplicationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, reviewed, accepted, rejected]

    Application:
      type: object
      properties:
        id:
          type: integer
        vacancy_id:
          type: integer
        resume_id:
          type: integer
        status:
          type: string
          enum: [pending, reviewed, accepted, rejected]
        applied_at:
          type: string
          format: date-time

    ApplicationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Application'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer