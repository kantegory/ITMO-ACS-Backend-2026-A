openapi: 3.0.3

info:
  title: Property Service API
  version: 1.0.0
  description: |
    Микросервис недвижимости.
    Отвечает за объекты недвижимости, изображения и удобства.

servers:
  - url: http://property-service:8080
    description: Docker network

tags:
  - name: Properties
  - name: PropertyImages
  - name: Amenities
  - name: Internal

paths:
  /properties:
    get:
      tags: [Properties]
      summary: Получить список объектов недвижимости
      parameters:
        - in: query
          name: city
          schema:
            type: string

        - in: query
          name: property_type
          schema:
            $ref: "#/components/schemas/PropertyType"

        - in: query
          name: min_price
          schema:
            type: integer
            minimum: 0

        - in: query
          name: max_price
          schema:
            type: integer
            minimum: 0

        - in: query
          name: is_verified
          schema:
            type: boolean

        - in: query
          name: is_available
          schema:
            type: boolean

        - in: query
          name: amenity_ids
          description: Фильтр по amenities
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true

        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0

      responses:
        "200":
          description: Список недвижимости
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PropertyShort"

        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      tags: [Properties]
      summary: Создать объект недвижимости
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProperty"

      responses:
        "201":
          description: Объект создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyFull"

        "400":
          $ref: "#/components/responses/BadRequest"

        "401":
          $ref: "#/components/responses/Unauthorized"

  /properties/{property_id}:
    parameters:
      - $ref: "#/components/parameters/PropertyId"

    get:
      tags: [Properties]
      summary: Получить объект недвижимости

      responses:
        "200":
          description: Объект найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyFull"

        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Properties]
      summary: Обновить объект недвижимости
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProperty"

      responses:
        "200":
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyFull"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Properties]
      summary: Удалить объект недвижимости
      security:
        - bearerAuth: []

      responses:
        "204":
          description: Удалено

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

  /properties/me:
    get:
      tags: [Properties]
      summary: Получить мои объявления
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Список объектов пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PropertyShort"

  /properties/{property_id}/images:
    parameters:
      - $ref: "#/components/parameters/PropertyId"

    get:
      tags: [PropertyImages]
      summary: Получить изображения объекта

      responses:
        "200":
          description: Список изображений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PropertyImage"

    post:
      tags: [PropertyImages]
      summary: Добавить изображение
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyImage"

      responses:
        "201":
          description: Изображение добавлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyImage"

  /images/{image_id}:
    delete:
      tags: [PropertyImages]
      summary: Удалить изображение
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: image_id
          required: true
          schema:
            type: integer

      responses:
        "204":
          description: Удалено

        "404":
          $ref: "#/components/responses/NotFound"

  /amenities:
    get:
      tags: [Amenities]
      summary: Получить список amenities

      responses:
        "200":
          description: Список удобств
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Amenity"

    post:
      tags: [Amenities]
      summary: Создать amenity
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAmenity"

      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Amenity"

  /amenities/{amenity_id}:
    patch:
      tags: [Amenities]
      summary: Обновить amenity
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: amenity_id
          required: true
          schema:
            type: integer

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAmenity"

      responses:
        "200":
          description: Обновлено

    delete:
      tags: [Amenities]
      summary: Удалить amenity
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: amenity_id
          required: true
          schema:
            type: integer

      responses:
        "204":
          description: Удалено

  /internal/properties/{property_id}:
    get:
      tags: [Internal]
      summary: Получить property для межсервисного взаимодействия
      description: Используется Rental Service и Chat Service

      parameters:
        - $ref: "#/components/parameters/PropertyId"

      responses:
        "200":
          description: Объект найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyInternal"

        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PropertyId:
      in: path
      name: property_id
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Некорректный запрос

    Unauthorized:
      description: Требуется авторизация

    Forbidden:
      description: Недостаточно прав

    NotFound:
      description: Ресурс не найден

  schemas:
    PropertyType:
      type: string
      enum:
        - APARTMENT
        - HOUSE
        - ROOM
        - STUDIO

    Amenity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreateAmenity:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateAmenity:
      type: object
      properties:
        name:
          type: string

    PropertyImage:
      type: object
      properties:
        id:
          type: integer
        property_id:
          type: integer
        image_url:
          type: string

    CreatePropertyImage:
      type: object
      required: [image_url]
      properties:
        image_url:
          type: string

    PropertyShort:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        city:
          type: string
        price_per_month:
          type: integer
        is_available:
          type: boolean

    PropertyFull:
      type: object
      properties:
        id:
          type: integer
        owner_id:
          type: integer
        title:
          type: string
        description:
          type: string
        property_type:
          $ref: "#/components/schemas/PropertyType"
        city:
          type: string
        address:
          type: string
        price_per_month:
          type: integer
        is_verified:
          type: boolean
        is_available:
          type: boolean
        amenities:
          type: array
          items:
            $ref: "#/components/schemas/Amenity"
        images:
          type: array
          items:
            $ref: "#/components/schemas/PropertyImage"

    PropertyInternal:
      type: object
      properties:
        id:
          type: integer
        owner_id:
          type: integer
        is_available:
          type: boolean
        is_verified:
          type: boolean

    CreateProperty:
      type: object
      required:
        - title
        - property_type
        - city
        - address
        - price_per_month
      properties:
        title:
          type: string
        description:
          type: string
        property_type:
          $ref: "#/components/schemas/PropertyType"
        city:
          type: string
        address:
          type: string
        price_per_month:
          type: integer
        amenity_ids:
          type: array
          items:
            type: integer

    UpdateProperty:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        city:
          type: string
        address:
          type: string
        price_per_month:
          type: integer
        is_available:
          type: boolean
        amenity_ids:
          type: array
          items:
            type: integer
