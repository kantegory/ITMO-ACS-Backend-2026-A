openapi: 3.0.3

info:
  title: Rental Service API
  version: 1.0.0
  description: |
    Микросервис управления арендой недвижимости.

servers:
  - url: http://rental-service:8080

tags:
  - name: Rentals
  - name: Dashboard
  - name: Internal

paths:
  /rentals:
    get:
      tags: [Rentals]
      summary: Получить список моих аренд
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum:
              - tenant
              - landlord
              - all
            default: all

        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/RentalStatus"

        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

        - in: query
          name: offset
          schema:
            type: integer
            default: 0

      responses:
        "200":
          description: Список аренд
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rental"

        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Rentals]
      summary: Создать заявку на аренду
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRental"

      responses:
        "201":
          description: Заявка создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalFull"

        "400":
          $ref: "#/components/responses/BadRequest"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          description: Объект недвижимости не найден

        "409":
          description: Объект уже арендован

  /rentals/{rental_id}:
    get:
      tags: [Rentals]
      summary: Получить договор аренды
      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/RentalId"

      responses:
        "200":
          description: Информация об аренде
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalFull"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Rentals]
      summary: Отменить аренду
      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/RentalId"

      responses:
        "204":
          description: Аренда отменена

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

  /rentals/{rental_id}/approve:
    patch:
      tags: [Rentals]
      summary: Подтвердить аренду
      description: Только landlord может подтвердить заявку
      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/RentalId"

      responses:
        "200":
          description: Аренда подтверждена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalFull"

        "403":
          description: Нет прав

        "409":
          description: Некорректный статус

  /rentals/{rental_id}/reject:
    patch:
      tags: [Rentals]
      summary: Отклонить заявку
      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/RentalId"

      responses:
        "200":
          description: Аренда отклонена

  /rentals/{rental_id}/complete:
    patch:
      tags: [Rentals]
      summary: Завершить аренду
      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/RentalId"

      responses:
        "200":
          description: Аренда завершена

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Личный кабинет пользователя
      description: |
        Возвращает аренды как арендатора и как владельца
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboard"

  /internal/rentals/property/{property_id}/active:
    get:
      tags: [Internal]
      summary: Проверить активную аренду объекта
      description: Используется Property Service

      parameters:
        - in: path
          name: property_id
          required: true
          schema:
            type: integer

      responses:
        "200":
          description: Статус объекта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyRentalStatus"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RentalId:
      in: path
      name: rental_id
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    Unauthorized:
      description: Требуется авторизация

    Forbidden:
      description: Недостаточно прав

    NotFound:
      description: Ресурс не найден

    BadRequest:
      description: Ошибка валидации

  schemas:
    RentalStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - ACTIVE
        - COMPLETED
        - CANCELLED

    Rental:
      type: object
      properties:
        id:
          type: integer

        property_id:
          type: integer

        tenant_id:
          type: integer

        landlord_id:
          type: integer

        start_date:
          type: string
          format: date

        end_date:
          type: string
          format: date

        total_price:
          type: integer

        status:
          $ref: "#/components/schemas/RentalStatus"

        created_at:
          type: string
          format: date-time

    RentalFull:
      allOf:
        - $ref: "#/components/schemas/Rental"
        - type: object
          properties:
            property:
              type: object
              description: DTO из Property Service

    CreateRental:
      type: object
      required:
        - property_id
        - start_date
        - end_date

      properties:
        property_id:
          type: integer

        start_date:
          type: string
          format: date

        end_date:
          type: string
          format: date

    PropertyRentalStatus:
      type: object
      properties:
        property_id:
          type: integer

        is_rented:
          type: boolean

        active_rental_id:
          type: integer
          nullable: true

    UserDashboard:
      type: object
      properties:
        as_tenant:
          type: array
          items:
            $ref: "#/components/schemas/Rental"

        as_landlord:
          type: array
          items:
            $ref: "#/components/schemas/Rental"
