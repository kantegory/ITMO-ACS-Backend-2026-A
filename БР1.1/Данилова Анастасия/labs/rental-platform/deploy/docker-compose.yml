services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - rental-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-property:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: property
      POSTGRES_PASSWORD: property
      POSTGRES_DB: property_db
    volumes:
      - property_data:/var/lib/postgresql/data
    networks:
      - rental-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property -d property_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-rental:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental
      POSTGRES_DB: rental_db
    volumes:
      - rental_data:/var/lib/postgresql/data
    networks:
      - rental-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d rental_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat_db
    volumes:
      - chat_data:/var/lib/postgresql/data
    networks:
      - rental-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rental-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: "8081"
      DB_URL: postgres://auth:auth@postgres-auth:5432/auth_db?sslmode=disable
      JWT_SECRET: dev_secret_change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rental-net

  property-service:
    build:
      context: ..
      dockerfile: services/property-service/Dockerfile
    environment:
      PORT: "8082"
      DB_URL: postgres://property:property@postgres-property:5432/property_db?sslmode=disable
      JWT_SECRET: dev_secret_change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      postgres-property:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - rental-net

  rental-service:
    build:
      context: ..
      dockerfile: services/rental-service/Dockerfile
    environment:
      PORT: "8083"
      DB_URL: postgres://rental:rental@postgres-rental:5432/rental_db?sslmode=disable
      JWT_SECRET: dev_secret_change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AUTH_SERVICE_URL: http://auth-service:8081
      PROPERTY_SERVICE_URL: http://property-service:8082
    depends_on:
      postgres-rental:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      property-service:
        condition: service_started
    networks:
      - rental-net

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    environment:
      PORT: "8084"
      DB_URL: postgres://chat:chat@postgres-chat:5432/chat_db?sslmode=disable
      JWT_SECRET: dev_secret_change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AUTH_SERVICE_URL: http://auth-service:8081
      PROPERTY_SERVICE_URL: http://property-service:8082
    depends_on:
      postgres-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      property-service:
        condition: service_started
    networks:
      - rental-net

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth-service
      - property-service
      - rental-service
      - chat-service
    networks:
      - rental-net

networks:
  rental-net:
    driver: bridge

volumes:
  auth_data:
  property_data:
  rental_data:
  chat_data:
