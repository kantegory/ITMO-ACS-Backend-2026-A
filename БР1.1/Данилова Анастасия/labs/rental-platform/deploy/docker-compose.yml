services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../infra/docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    networks:
      - rental-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U admin -d postgres && psql -U admin -d postgres -tAc \"SELECT 1 FROM pg_roles WHERE rolname='auth'\" | grep -q 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rental-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - ../services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rental-net
    restart: unless-stopped

  property-service:
    build:
      context: ..
      dockerfile: services/property-service/Dockerfile
    env_file:
      - ../services/property-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - rental-net
    restart: unless-stopped

  rental-service:
    build:
      context: ..
      dockerfile: services/rental-service/Dockerfile
    env_file:
      - ../services/rental-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      property-service:
        condition: service_started
    networks:
      - rental-net
    restart: unless-stopped

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    env_file:
      - ../services/chat-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      property-service:
        condition: service_started
    networks:
      - rental-net
    restart: unless-stopped

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth-service
      - property-service
      - rental-service
      - chat-service
    networks:
      - rental-net
    restart: unless-stopped

networks:
  rental-net:
    driver: bridge

volumes:
  pg_data:
  rabbitmq_data:
