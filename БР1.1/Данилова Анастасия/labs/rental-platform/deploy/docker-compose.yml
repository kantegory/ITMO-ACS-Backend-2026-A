services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    entrypoint: >
      sh -c "
      (sleep 5 && 
       psql -U admin -d postgres -c 'CREATE DATABASE auth_db;' || true &&
       psql -U admin -d postgres -c 'CREATE DATABASE property_db;' || true &&
       psql -U admin -d postgres -c 'CREATE DATABASE rental_db;' || true &&
       psql -U admin -d postgres -c 'CREATE DATABASE chat_db;' || true) &
       exec docker-entrypoint.sh postgres"
    networks:
      - rental-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks:
      - rental-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - ../services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rental-net

  property-service:
    build:
      context: ..
      dockerfile: services/property-service/Dockerfile
    env_file:
      - ../services/property-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rental-net

  rental-service:
    build:
      context: ..
      dockerfile: services/rental-service/Dockerfile
    env_file:
      - ../services/rental-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rental-net

  chat-service:
    build:
      context: ..
      dockerfile: services/chat-service/Dockerfile
    env_file:
      - ../services/chat-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rental-net

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - property-service
      - rental-service
      - chat-service
    networks:
      - rental-net

networks:
  rental-net:
    driver: bridge

volumes:
  pg_data: