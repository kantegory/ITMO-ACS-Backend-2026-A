upstream auth_upstream     { server auth-service:8081; }
upstream property_upstream { server property-service:8082; }
upstream rental_upstream   { server rental-service:8083; }
upstream chat_upstream     { server chat-service:8084; }

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;

    location = /health {
        return 200 '{"status":"ok","gateway":true}';
        add_header Content-Type application/json;
    }

    location ~ ^/api/(auth|users)(/.*)?$ {
        rewrite ^/api/(auth|users)(.*)$ /$1$2 break;
        proxy_pass http://auth_upstream;
    }

    location ~ ^/api/(properties|amenities|images)(/.*)?$ {
        rewrite ^/api/(properties|amenities|images)(.*)$ /$1$2 break;
        proxy_pass http://property_upstream;
    }

    location ~ ^/api/(rentals|dashboard)(/.*)?$ {
        rewrite ^/api/(rentals|dashboard)(.*)$ /$1$2 break;
        proxy_pass http://rental_upstream;
    }

    location ~ ^/api/(chats|messages)(/.*)?$ {
        rewrite ^/api/(chats|messages)(.*)$ /$1$2 break;
        proxy_pass http://chat_upstream;
    }
}