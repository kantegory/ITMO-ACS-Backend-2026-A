upstream auth_upstream {
    server auth-service:8081;
}

upstream property_upstream {
    server property-service:8082;
}

upstream rental_upstream {
    server rental-service:8083;
}

upstream chat_upstream {
    server chat-service:8084;
}

server {
    listen 80;

    location = /health {
        return 200 '{"status":"ok","gateway":true}';
        add_header Content-Type application/json;
    }

    # Auth: /api/auth/login -> /auth/login
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Users (auth service): /api/users/me -> /users/me
    location /api/users/ {
        rewrite ^/api/users/(.*)$ /users/$1 break;
        proxy_pass http://auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Properties
    location /api/properties/ {
        rewrite ^/api/properties/(.*)$ /properties/$1 break;
        proxy_pass http://property_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/properties {
        rewrite ^/api/properties$ /properties break;
        proxy_pass http://property_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Amenities & images (property service)
    location /api/amenities {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://property_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/images/ {
        rewrite ^/api/images/(.*)$ /images/$1 break;
        proxy_pass http://property_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Rentals + dashboard
    location /api/rentals/ {
        rewrite ^/api/rentals/(.*)$ /rentals/$1 break;
        proxy_pass http://rental_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/rentals {
        rewrite ^/api/rentals$ /rentals break;
        proxy_pass http://rental_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/dashboard {
        rewrite ^/api/dashboard$ /dashboard break;
        proxy_pass http://rental_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Chats & messages
    location /api/chats/ {
        rewrite ^/api/chats/(.*)$ /chats/$1 break;
        proxy_pass http://chat_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/chats {
        rewrite ^/api/chats$ /chats break;
        proxy_pass http://chat_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/messages/ {
        rewrite ^/api/messages/(.*)$ /messages/$1 break;
        proxy_pass http://chat_upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
}
