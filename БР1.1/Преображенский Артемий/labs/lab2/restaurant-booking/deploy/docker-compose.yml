services:
  auth-db:
    image: postgres:16-alpine
    restart: always
    container_name: restaurant-booking-auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth-dbdata:/var/lib/postgresql/data
      - ../auth-service/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql:ro
    networks:
      - restaurant-booking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-db:
    image: postgres:16-alpine
    restart: always
    container_name: restaurant-booking-catalog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: catalog_db
    ports:
      - "5434:5432"
    volumes:
      - catalog-dbdata:/var/lib/postgresql/data
      - ../catalog-service/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql:ro
    networks:
      - restaurant-booking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  booking-db:
    image: postgres:16-alpine
    restart: always
    container_name: restaurant-booking-booking-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: booking_db
    ports:
      - "5435:5432"
    volumes:
      - booking-dbdata:/var/lib/postgresql/data
      - ../booking-service/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql:ro
    networks:
      - restaurant-booking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: auth-service
    restart: always
    container_name: restaurant-booking-auth-service
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      AUTH_DB_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@auth-db:5432/auth_db?sslmode=disable
      AUTH_HTTP_ADDR: ":8081"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES: ${JWT_EXPIRES:-24h}
    networks:
      - restaurant-booking

  catalog-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: catalog-service
    restart: always
    container_name: restaurant-booking-catalog-service
    ports:
      - "8082:8082"
    depends_on:
      catalog-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      CATALOG_DB_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@catalog-db:5432/catalog_db?sslmode=disable
      CATALOG_HTTP_ADDR: ":8082"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      AUTH_SERVICE_URL: http://auth-service:8081
    networks:
      - restaurant-booking

  booking-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: booking-service
    restart: always
    container_name: restaurant-booking-booking-service
    ports:
      - "8083:8083"
    depends_on:
      booking-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
    environment:
      BOOKING_DB_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@booking-db:5432/booking_db?sslmode=disable
      BOOKING_HTTP_ADDR: ":8083"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CATALOG_SERVICE_URL: http://catalog-service:8082
    networks:
      - restaurant-booking

volumes:
  auth-dbdata:
    name: restaurant_booking_auth_dbdata
  catalog-dbdata:
    name: restaurant_booking_catalog_dbdata
  booking-dbdata:
    name: restaurant_booking_booking_dbdata

networks:
  restaurant-booking:
    driver: bridge
