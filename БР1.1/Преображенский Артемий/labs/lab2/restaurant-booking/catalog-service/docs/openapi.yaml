openapi: 3.0.3
info:
  title: Catalog Service API
  version: 1.0.0

servers:
  - url: http://localhost:8082

tags:
  - name: restaurants
  - name: menu
  - name: tables
  - name: reviews
  - name: service

paths:
  /api/restaurants/:
    get:
      tags: [restaurants]
      summary: Список ресторанов
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: cuisine_type
          schema: { type: string }
        - in: query
          name: price_category
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  restaurants:
                    type: array
                    items: { $ref: '#/components/schemas/Restaurant' }
    post:
      tags: [restaurants]
      summary: Создать ресторан
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RestaurantCreateRequest' }
      responses:
        '201': { description: Created }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }

  /api/restaurants/{id}/:
    get:
      tags: [restaurants]
      summary: Получить ресторан
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Restaurant' }
        '404': { description: Not found }
    delete:
      tags: [restaurants]
      summary: Удалить ресторан
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /api/restaurants/{id}/menu:
    get:
      tags: [menu]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: proteins_min
          schema: { type: number }
        - in: query
          name: proteins_max
          schema: { type: number }
        - in: query
          name: fats_min
          schema: { type: number }
        - in: query
          name: fats_max
          schema: { type: number }
        - in: query
          name: carbs_min
          schema: { type: number }
        - in: query
          name: carbs_max
          schema: { type: number }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Items:
                    type: array
                    items: { $ref: '#/components/schemas/MenuItem' }
    post:
      tags: [menu]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MenuCreateRequest' }
      responses:
        '201': { description: Created }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: Restaurant not found }

  /api/restaurants/{id}/menu/{itemID}:
    get:
      tags: [menu]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: itemID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item: { $ref: '#/components/schemas/MenuItem' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      tags: [menu]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: itemID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /api/restaurants/{id}/tables:
    get:
      tags: [tables]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Items:
                    type: array
                    items: { $ref: '#/components/schemas/Table' }
    post:
      tags: [tables]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TableCreateRequest' }
      responses:
        '201': { description: Created }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: Restaurant not found }

  /api/restaurants/{id}/tables/{tableID}:
    get:
      tags: [tables]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: tableID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  table: { $ref: '#/components/schemas/Table' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      tags: [tables]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: tableID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /api/restaurants/{id}/reviews:
    get:
      tags: [reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Items:
                    type: array
                    items: { $ref: '#/components/schemas/ReviewItem' }
    post:
      tags: [reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewBody' }
      responses:
        '201': { description: Created }
        '401': { description: Unauthorized }
        '404': { description: Restaurant not found }
        '409': { description: Conflict }

  /api/restaurants/{id}/reviews/{reviewID}:
    get:
      tags: [reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: reviewID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewItem' }
        '404': { description: Not found }
    put:
      tags: [reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: reviewID
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewBody' }
      responses:
        '200': { description: OK }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      tags: [reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: reviewID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: No Content }
        '401': { description: Unauthorized }
        '404': { description: Not found }

  /service/restaurants/{restaurantID}/tables/{tableID}:
    get:
      tags: [service]
      parameters:
        - in: path
          name: restaurantID
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: tableID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, restaurant_id, table_number, seats_count]
                properties:
                  id: { type: string, format: uuid }
                  restaurant_id: { type: string, format: uuid }
                  table_number: { type: integer }
                  seats_count: { type: integer }
        '404': { description: Not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Restaurant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        city: { type: string }
        address: { type: string }
        photos:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        price_category: { type: string }
        cuisine_type: { type: string }

    RestaurantCreateRequest:
      type: object
      required: [name, description, city, address, cuisine_type, price_category, photos]
      properties:
        name: { type: string }
        description: { type: string }
        city: { type: string }
        address: { type: string }
        cuisine_type: { type: string }
        price_category: { type: string }
        photos:
          type: array
          items: { type: string }

    MenuItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        restaurant_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        is_available: { type: boolean }
        proteins: { type: number }
        fats: { type: number }
        carbs: { type: number }
        price: { type: number }
        category: { type: string }

    MenuCreateRequest:
      type: object
      required: [name, description, price, category, is_available, proteins, fats, carbs]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        category: { type: string }
        is_available: { type: boolean }
        proteins: { type: number }
        fats: { type: number }
        carbs: { type: number }

    Table:
      type: object
      properties:
        id: { type: string, format: uuid }
        restaurant_id: { type: string, format: uuid }
        table_number: { type: integer }
        seats_count: { type: integer }

    TableCreateRequest:
      type: object
      required: [table_number, seats_count]
      properties:
        table_number: { type: integer }
        seats_count: { type: integer }

    ReviewItem:
      type: object
      required: [id, rating, text, created_at, author_name]
      properties:
        id: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        author_name: { type: string }

    ReviewBody:
      type: object
      required: [Rating, Text]
      properties:
        Rating: { type: integer, minimum: 1, maximum: 5 }
        Text: { type: string }
