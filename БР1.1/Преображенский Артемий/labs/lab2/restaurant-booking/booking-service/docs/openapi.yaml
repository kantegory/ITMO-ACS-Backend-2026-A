openapi: 3.0.3
info:
  title: Booking Service API
  version: 1.0.0
servers:
  - url: http://localhost:8083
    description: Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        guests_count:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    BookingCreateRequest:
      type: object
      required: [restaurant_id, table_id, start_time, end_time, guests_count]
      properties:
        restaurant_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        guests_count:
          type: integer
    AvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
paths:
  /api/restaurants/{id}/tables/{tableID}/availability:
    get:
      summary: Check table availability
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: tableID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: start_time
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: end_time
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Availability info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '401':
          description: Unauthorized
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Restaurant or table not found
  /api/bookings:
    post:
      summary: Create a booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '409':
          description: Table not available
        '404':
          description: Restaurant or table not found
  /api/me/bookings:
    get:
      summary: List current user's bookings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
  /api/me/bookings/{bookingID}:
    get:
      summary: Get current user's booking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Cancel current user's booking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cancelled
        '401':
          description: Unauthorized
        '404':
          description: Not found
