openapi: 3.0.3
info:
  title: Межсервисное HTTP API
  version: 1.0.0

paths:
  /service/users/{id}:
    get:
      tags: [auth-service]
      summary: Пользователь по id (catalog-service → auth-service)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Некорректный id
        '404':
          description: Пользователь не найден
        '500':
          description: Ошибка сервиса

  /service/restaurants/{restaurantID}/tables/{tableID}:
    get:
      tags: [catalog-service]
      summary: Столик по ресторану и id (booking-service → catalog-service)
      parameters:
        - name: restaurantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableBrief'
        '400':
          description: Некорректные идентификаторы
        '404':
          description: Столик не найден
        '500':
          description: Ошибка сервиса

components:
  schemas:
    User:
      type: object
      required: [id, full_name, email, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TableBrief:
      type: object
      required: [id, restaurant_id, table_number, seats_count]
      properties:
        id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_number:
          type: integer
        seats_count:
          type: integer
