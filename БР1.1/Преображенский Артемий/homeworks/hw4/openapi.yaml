openapi: 3.0.3
info:
  title: Internal Microservices API
  version: 1.0.0

paths:
  /internal/users/{id}:
    get:
      tags:
        - Internal Auth
      summary: Проверка существования пользователя
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      full_name:
                        type: string
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервиса

  /internal/restaurants/{id}:
    get:
      tags:
        - Internal Catalog
      summary: Проверка существования ресторана
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ресторан найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  restaurant:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
        '404':
          description: Ресторан не найден
        '500':
          description: Внутренняя ошибка сервиса

  /internal/restaurants/{restaurantID}/tables/{tableID}:
    get:
      tags:
        - Internal Catalog
      summary: Проверка существования столика и его принадлежности ресторану
      parameters:
        - name: restaurantID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Столик найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      restaurant_id:
                        type: string
                        format: uuid
                      seats_count:
                        type: integer
        '404':
          description: Столик не найден
        '500':
          description: Внутренняя ошибка сервиса
