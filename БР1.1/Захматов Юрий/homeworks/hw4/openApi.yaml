          required: true
          schema:
            type: integer
            format: int64
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Платёж создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

  /properties/{propertyId}/bookings/{bookingId}/payments/{id}:
    get:
      tags:
        - Payments
      summary: Получить информацию о платеже
      operationId: getPayment
      parameters:
