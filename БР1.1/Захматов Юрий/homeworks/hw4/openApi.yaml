  # ==================== CHAT SERVICE ====================
  /chats:
    get:
      tags:
        - Chats
      summary: Получить список чатов пользователя
      operationId: getChats
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'

  /chats/new:
    post:
      tags:
        - Chats
      summary: Создать новый чат
      operationId: createChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCreateRequest'
      responses:
        '200':
          description: Чат создан или уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Нельзя создать чат с самим собой
        '404':
          description: Пользователь не найден

  /chats/{chatId}:
    get:
      tags:
        - Chats
      summary: Получить сообщения в чате
      operationId: getMessages
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '403':
          description: Не участник чата

    post:
      tags:
        - Chats
      summary: Отправить сообщение в чат
      operationId: sendMessage
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Сообщение отправлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Не участник чата

  # ==================== REVIEWS SERVICE ====================
  /properties/{propertyId}/reviews:
    get:
      tags:
        - Reviews
      summary: Получить все отзывы об объявлении
      operationId: getAllReviews
      security: []
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'

    post:
      tags:
        - Reviews
      summary: Оставить отзыв (только после завершённого бронирования)
      operationId: createReview
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '200':
          description: Отзыв создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '403':
          description: Только после завершённого бронирования

  /properties/{propertyId}/reviews/{id}:
    delete:
      tags:
        - Reviews
      summary: Удалить отзыв (только автор или админ)
      operationId: deleteReview
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Отзыв удалён
        '403':
          description: Не автор или не админ