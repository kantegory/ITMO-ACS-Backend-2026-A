eureka:
    client:
        service-url:
            defaultZone: http://localhost:8081/eureka


logging:
    pattern:
        console: '%C{1.} [%-5level] %d{HH:mm:ss} - %msg%n'

server:
    port: 0

spring:
    application:
        name: auth-service

    datasource:
      url: jdbc:postgresql://localhost:5432/itmo-acs-backend-auth-service
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

    flyway:
      enabled: false
      baseline-on-migrate: true
      locations: classpath:resources/db/migration

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true



