components:
  schemas:
    AuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
        user:
          $ref: '#/components/schemas/User'
    BadRequest:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/Error'
    Booking:
      type: object
      required:
        - id
        - renter
        - property
        - startDate
        - endDate
        - bookingStatus
        - totalPrice
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        renter:
          $ref: '#/components/schemas/User'
        property:
          $ref: '#/components/schemas/Property'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        bookingStatus:
          $ref: '#/components/schemas/BookingStatus'
        totalPrice:
          type: number
          format: double
        guestsCount:
          type: integer
          format: int32
        details:
          type: string
        createdAt:
          type: string
          format: date-time
    BookingPageResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - last
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
        page:
