openapi: 3.0.0
info:
  title: Rental Service API
  version: 1.0.0
tags:
  - name: Auth
  - name: Users
  - name: Properties
  - name: Bookings
  - name: Payments
  - name: Reviews
  - name: Chats
  - name: Messages
paths:
  /auth/login:
    post:
      operationId: AuthApi_login
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
                    format: int32
                required:
                  - token
                  - refreshToken
                  - expiresIn
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
  /auth/register:
    post:
      operationId: AuthApi_register
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  email:
                    type: string
                  username:
                    type: string
                required:
                  - id
                  - email
                  - username
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phoneNumber:
                  type: string
              required:
                - username
                - email
                - password

  /auth/refresh:
    post:
      operationId: AuthApi_refresh
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
                    format: int32
                required:
                  - token
                  - refreshToken
                  - expiresIn
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken

  /bookings:
    post:
      operationId: BookingsApi_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                required:
                  - id
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conflict'
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                propertyId:
                  type: integer
                  format: int64
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                guestsCount:
                  type: integer
                  format: int32
                details:
                  type: string
              required:
                - propertyId
                - startDate
                - endDate
  /bookings/my:
    get:
      operationId: BookingsApi_my
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 0
          explode: false
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 10
          explode: false
        - name: status
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        property:
                          type: object
                          properties:
                            id:
                              type: integer
                              format: int64
                            title:
                              type: string
                            city:
                              type: string
                            mainImage:
                              type: string
                          required:
                            - id
                            - title
                            - city
                        startDate:
                          type: string
                          format: date
                        endDate:
                          type: string
                          format: date
                        bookingStatus:
                          type: string
                        totalPrice:
                          type: number
                          format: double
                        guestsCount:
                          type: integer
                          format: int32
                        createdAt:
                          type: string
                          format: date-time
                      required:
                        - id
                        - property
                        - startDate
                        - endDate
                        - bookingStatus
                        - totalPrice
                        - createdAt
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  totalElements:
                    type: integer
                    format: int64
                  totalPages:
                    type: integer
                    format: int32
                  last:
                    type: boolean
                required:
                  - content
                  - page
                  - size
                  - totalElements
                  - totalPages
                  - last
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Bookings
  /bookings/{id}:
    get:
      operationId: BookingsApi_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  renter:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      username:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      phoneNumber:
                        type: string
                    required:
                      - id
                      - username
                  property:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      title:
                        type: string
                      description:
                        type: string
                      price:
                        type: number
                        format: double
                      square:
                        type: number
                        format: float
                      type:
                        type: string
                      city:
                        type: string
                      street:
                        type: string
                      images:
                        type: array
                        items:
                          type: object
                          properties:
                            url:
                              type: string
                          required:
                            - url
                    required:
                      - id
                      - title
                      - price
                      - square
                      - type
                      - city
                      - street
                      - images
                  startDate:
                    type: string
                    format: date
                  endDate:
                    type: string
                    format: date
                  bookingStatus:
                    type: string
                  totalPrice:
                    type: number
                    format: double
                  guestsCount:
                    type: integer
                    format: int32
                  details:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                required:
                  - id
                  - renter
                  - property
                  - startDate
                  - endDate
                  - bookingStatus
                  - totalPrice
                  - createdAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Bookings
  /bookings/{id}/cancel:
    patch:
      operationId: BookingsApi_cancel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Bookings
  /bookings/{id}/confirm:
    patch:
      operationId: BookingsApi_confirm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Bookings
  /bookings/{id}/reject:
    patch:
      operationId: BookingsApi_reject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Bookings
  /chats:
    get:
      operationId: ChatsApi_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    otherUser:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        username:
                          type: string
                        firstName:
                          type: string
                        lastName:
                          type: string
                      required:
                        - id
                        - username
                    lastMessage:
                      type: object
                      properties:
                        content:
                          type: string
                        sentAt:
                          type: string
                          format: date-time
                      required:
                        - content
                        - sentAt
                    createdAt:
                      type: string
                      format: date-time
                  required:
                    - id
                    - otherUser
                    - createdAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Chats
    post:
      operationId: ChatsApi_create
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                required:
                  - id
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Chats
  /chats/{id}:
    get:
      operationId: ChatsApi_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  user1:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      username:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                    required:
                      - id
                      - username
                  user2:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      username:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                    required:
                      - id
                      - username
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        senderId:
                          type: integer
                          format: int64
                        content:
                          type: string
                        sentAt:
                          type: string
                          format: date-time
                        readAt:
                          type: string
                          format: date-time
                      required:
                        - id
                        - senderId
                        - content
                        - sentAt
                  createdAt:
                    type: string
                    format: date-time
                required:
                  - id
                  - user1
                  - user2
                  - messages
                  - createdAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Chats
  /messages:
    post:
      operationId: MessagesApi_send
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  sentAt:
                    type: string
                    format: date-time
                required:
                  - id
                  - sentAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: integer
                  format: int64
                content:
                  type: string
              required:
                - conversationId
                - content
  /messages/conversation/{conversationId}:
    get:
      operationId: MessagesApi_list
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 0
          explode: false
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 50
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        senderId:
                          type: integer
                          format: int64
                        content:
                          type: string
                        sentAt:
                          type: string
                          format: date-time
                        readAt:
                          type: string
                          format: date-time
                      required:
                        - id
                        - senderId
                        - content
                        - sentAt
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  totalElements:
                    type: integer
                    format: int64
                  totalPages:
                    type: integer
                    format: int32
                  last:
                    type: boolean
                required:
                  - content
                  - page
                  - size
                  - totalElements
                  - totalPages
                  - last
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Messages
  /payments:
    post:
      operationId: PaymentsApi_create
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  paymentUrl:
                    type: string
                required:
                  - id
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bookingId:
                  type: integer
                  format: int64
              required:
                - bookingId
  /payments/my:
    get:
      operationId: PaymentsApi_my
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 0
          explode: false
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 10
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        booking:
                          type: object
                          properties:
                            id:
                              type: integer
                              format: int64
                            property:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  format: int64
                                title:
                                  type: string
                              required:
                                - id
                                - title
                            startDate:
                              type: string
                              format: date
                            endDate:
                              type: string
                              format: date
                          required:
                            - id
                            - property
                            - startDate
                            - endDate
                        amount:
                          type: number
                          format: double
                        paymentStatus:
                          type: string
                        payedAt:
                          type: string
                          format: date-time
                        createdAt:
                          type: string
                          format: date-time
                      required:
                        - id
                        - booking
                        - amount
                        - paymentStatus
                        - createdAt
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  totalElements:
                    type: integer
                    format: int64
                  totalPages:
                    type: integer
                    format: int32
                  last:
                    type: boolean
                required:
                  - content
                  - page
                  - size
                  - totalElements
                  - totalPages
                  - last
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
        - Payments
  /payments/{id}:
    get:
      operationId: PaymentsApi_get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  booking:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      property:
                        type: object
                        properties:
                          id:
                            type: integer
                            format: int64
                          title:
                            type: string
                          price:
                            type: number
                            format: double
                        required:
                          - id
                          - title
                          - price
                      startDate:
                        type: string
                        format: date
                      endDate:
                        type: string
                        format: date
                    required:
                      - id
                      - property
                      - startDate
                      - endDate
                  amount:
                    type: number
                    format: double
                  paymentStatus:
                    type: string
                  payedAt:
                    type: string
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
                required:
                  - id
                  - booking
                  - amount
                  - paymentStatus
                  - createdAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Payments
  /payments/{id}/pay:
    post:
      operationId: PaymentsApi_pay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payedAt:
                    type: string
                    format: date-time
                required:
                  - success
                  - payedAt
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
      tags:
        - Payments
  /properties:
    get:
      operationId: PropertiesApi_list
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: type
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
