openapi: 3.0.3
info:
  title: Межсервисное HTTP API
  version: 1.0.0

paths:
  /service/users/{id}:
    get:
      tags: [interaction-service → auth-service]
      summary: Пользователь по id (interaction-service → auth-service)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBrief'
        '400':
          description: Некорректный id
        '404':
          description: Пользователь не найден
        '500':
          description: Ошибка сервиса

  /service/vacancies/{id}:
    get:
      tags: [interaction-service → job-service]
      summary: Вакансия по id (interaction-service → job-service)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyBrief'
        '400':
          description: Некорректный id
        '404':
          description: Вакансия не найдена
        '500':
          description: Ошибка сервиса

  /service/resumes/{id}:
    get:
      tags: [interaction-service → candidate-service]
      summary: Резюме по id (interaction-service → candidate-service)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeBrief'
        '400':
          description: Некорректный id
        '404':
          description: Резюме не найдено
        '500':
          description: Ошибка сервиса

  /service/users/{id}/employer:
    get:
      tags: [job-service → auth-service]
      summary: Проверка роли работодателя (job-service → auth-service)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployerCheck'
        '400':
          description: Некорректный id
        '403':
          description: Пользователь не является работодателем
        '404':
          description: Пользователь не найден
        '500':
          description: Ошибка сервиса

components:
  schemas:
    UserBrief:
      type: object
      required: [id, role, is_active]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        role:
          type: string
          enum: [employer, applicant]
        is_active:
          type: boolean
          default: true

    VacancyBrief:
      type: object
      required: [id, employer_id, title, is_active]
      properties:
        id:
          type: integer
          format: int64
        employer_id:
          type: integer
          format: int64
        title:
          type: string
        is_active:
          type: boolean
          default: true

    ResumeBrief:
      type: object
      required: [id, applicant_id, desired_position]
      properties:
        id:
          type: integer
          format: int64
        applicant_id:
          type: integer
          format: int64
        desired_position:
          type: string
        is_active:
          type: boolean
          default: true

    EmployerCheck:
      type: object
      required: [id, is_employer]
      properties:
        id:
          type: integer
          format: int64
        is_employer:
          type: boolean