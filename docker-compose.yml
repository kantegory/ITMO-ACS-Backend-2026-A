services:
  auth-db:
    image: postgres:17-alpine
    container_name: vacancies-auth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-db:
    image: postgres:17-alpine
    container_name: vacancies-profile-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: profile_db
    volumes:
      - profile_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d profile_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  vacancy-db:
    image: postgres:17-alpine
    container_name: vacancies-vacancy-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vacancy_db
    volumes:
      - vacancy_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d vacancy_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vacancies-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth
    container_name: vacancies-auth-service
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/auth_db
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      COOKIE_SECURE: ${COOKIE_SECURE}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  profile-service:
    build: ./services/profile
    container_name: vacancies-profile-service
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@profile-db:5432/profile_db
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      profile-db:
        condition: service_healthy
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  vacancy-service:
    build: ./services/vacancy
    container_name: vacancies-vacancy-service
    environment:
      PORT: 3003
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vacancy-db:5432/vacancy_db
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      vacancy-db:
        condition: service_healthy
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: vacancies-gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PROFILE_SERVICE_URL: http://profile-service:3002
      VACANCY_SERVICE_URL: http://vacancy-service:3003
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OPENAPI_PATH: /app/openapi/openapi.yaml
    depends_on:
      - auth-service
      - profile-service
      - vacancy-service

volumes:
  auth_data:
  profile_data:
  vacancy_data:
